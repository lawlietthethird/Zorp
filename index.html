          for(let i=0;i<maxFront&&!placed;i++){if(!board.front[i]){board.front[i]=copy;placed=true;}}
          if(!placed)for(let i=0;i<maxBack&&!placed;i++){if(!board.back[i]){board.back[i]=copy;placed=true;}}
          if(!placed)showNotif('Board full — no room for copy');
          else showNotif('DOUBLE DOWN — '+copy.name+' copied!');
        }
      }
      break;
    case'steadfast':
      G.steadfastActive=true;
      showNotif('STEADFAST — fatigue deals half damage this run');
      break;
  }
  renderSecondWindNode();
  renderBoard();
  updateUI();
  advanceDay();
}
function showTypeSelect(){
  setEncTitle('ZORP AWAKENS — CHOOSE YOUR PATH');
  const nonBanned=TYPES.filter(t=>!bannedTypes.includes(t.id));
  const pool=[...nonBanned].sort(()=>Math.random()-.5).slice(0,2);
  lastOfferedTypes=pool.map(t=>t.id);
  const typeCards=pool.map(t=>`<div class="to" onclick="pickType('${t.id}')" style="${TYPE_COLORS[t.id]||''}"><div class="ti">${t.icon}</div><div class="tn">${t.name}</div><div class="td">${t.desc}</div><div style="margin-top:5px;font-size:6.5px;font-family:'Cinzel',serif;letter-spacing:.04em"><span style="color:#e84060">✗ Lose Potential (+25%)</span><br><span style="color:#50e080">✓ Unlock typed items &amp; skills</span></div></div>`).join('<div style="display:flex;align-items:center;padding:0 6px;font-family:Cinzel,serif;font-size:13px;font-weight:700;color:var(--dim)">OR</div>');
  const typelessCard=`<div class="to" onclick="pickType('typeless')" style="border-color:var(--potential);margin-top:8px;max-width:280px"><div style="display:flex;align-items:center;gap:8px;justify-content:center"><div style="font-size:18px">✦</div><div><div class="tn" style="text-align:left">STAY TYPELESS</div><div class="td" style="text-align:left;margin-top:2px"><span style="color:#50e080">✓ Keep Potential (+25% to all effects)</span><br><span style="color:#50e080">✓ Unlock the next bond node</span><br><span style="color:var(--dim)">One offered type may be banned.</span></div></div></div></div>`;
  setEncBody(`<div class="dialogue"><div class="dlg-name">KIP</div>Kip stands a little different now. Something settled. You feel it too — a pull toward something. Not a name. Not a label. A direction.</div><div style="display:flex;justify-content:center;align-items:stretch">${typeCards}</div><div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-top:0"><div style="flex:1;height:1px;background:var(--border);max-width:100px"></div><span style="font-family:Cinzel,serif;font-size:8px;color:var(--dim);letter-spacing:.1em">OR</span><div style="flex:1;height:1px;background:var(--border);max-width:100px"></div></div><div style="display:flex;justify-content:center">${typelessCard}</div>`);
}
function pickType(id){
  if(id==='typeless'){
    // HEAD stays as Potential — check ban screen eligibility
    logEvent({event:'type_select',chosen:'typeless',offered:lastOfferedTypes,win_number:G.wins,banned:bannedTypes});
    const nonBanned=TYPES.filter(t=>!bannedTypes.includes(t.id));
    if(nonBanned.length>=2&&lastOfferedTypes.length>0){
      showBanScreen();
    }else{
      showSkillPick();
    }
  }else{
    G.type=id;
    const t=TYPES.find(x=>x.id===id);
    const typeSkill={id:id+'_awakening',name:t.name+' AWAKENING',icon:t.icon,desc:'Unlocks '+t.name+' items and skills.'};
    treeState['head']=typeSkill;
    // Remove Potential buff, add type awakening
    activeSkills=activeSkills.filter(s=>s.id!=='potential');
    activeSkills.push(typeSkill);
    const badge=document.getElementById('typeBadge');
    badge.textContent=t.icon+' '+t.name;badge.className='type-badge';
    badge.style.cssText=TYPE_COLORS[id]||'';
    showNotif(t.name+' chosen! Typed items now appear in shops.');
    renderSkillTree();
    logEvent({event:'type_select',chosen:id,offered:lastOfferedTypes,win_number:G.wins});
    advanceDay(); // no node pick this win for typed players
  }
}

function showBanScreen(){
  setEncTitle('BAN A TYPE — Remove From Future Offerings');
  const nonBanned=TYPES.filter(t=>!bannedTypes.includes(t.id));
  const canBan=nonBanned.length>1;
  const offered=lastOfferedTypes.map(id=>TYPES.find(t=>t.id===id)).filter(Boolean);
  const cards=offered.map(t=>{
    if(canBan){
      return '<div class="to" style="border-color:var(--honor-red)" onclick="banType(\''+t.id+'\')"><div class="ti">'+t.icon+'</div><div class="tn">'+t.name+'</div><div class="td">Remove this type from future offerings permanently.</div></div>';
    }else{
      return '<div class="to" style="opacity:.4;cursor:default"><div class="ti">'+t.icon+'</div><div class="tn">'+t.name+'</div><div class="td">Last remaining type — cannot be banned.</div></div>';
    }
  }).join('');
  setEncBody('<div class="dialogue"><div class="dlg-name">ZORP</div>"(Zorp turns away from one path.)"</div><div class="type-opts">'+cards+'</div><div class="btn-row"><button class="btn btn-d" onclick="banType(null)">SKIP — ban nothing</button></div>');
}

function banType(id){
  if(id){
    bannedTypes.push(id);
    const t=TYPES.find(x=>x.id===id);
    showNotif((t?t.name:'Type')+' banned from future offerings.');
  }else{
    showNotif('No type banned.');
  }
  renderSkillTree();
  showSkillPick();
}

// ============================================================
// SKILL PICK
// ============================================================
function showSkillPick(){
  const available=getAvailableNodes();
  if(!available.length){
    // No nodes to unlock — advance day
    advanceDay();return;
  }
  setEncTitle('BOND TREE — UNLOCK A NODE');
  // Show available nodes to choose which branch to develop
  const nodeCards=available.map(n=>'<div class="dc" onclick="selectNode(\''+n.id+'\')"><div class="di">'+rarityIcon(n.rarity)+'</div><div class="dn">'+n.label+'</div><div class="dd">'+n.rarity.toUpperCase()+' node</div><div class="dp sk-rarity rarity-'+n.rarity+'">'+n.rarity+'</div></div>').join('');
  setEncBody('<div class="dialogue"><div class="dlg-name">BOND TREE</div>"Your bond with Zorp deepens. Choose which aspect to develop."</div><div class="draft-row">'+nodeCards+'</div>');
}

function rarityIcon(r){return{prestige:'✦',beginner:'◎',intermediate:'◈',advanced:'◆',mastered:'★'}[r]||'○';}

function selectNode(nodeId){
  G.pendingSkillNode=nodeId;
  const node=getNodeById(nodeId);
  const pool=SKILLS[node.rarity]||[];
  const shuffled=[...pool].sort(()=>Math.random()-.5).slice(0,2);
  setEncTitle('CHOOSE A SKILL — '+node.rarity.toUpperCase());
  const cards=shuffled.map(sk=>'<div class="sk-card" onclick="pickSkill(\''+nodeId+'\',\''+sk.id+'\')"><div class="sk-icon">'+sk.icon+'</div><div class="sk-name">'+sk.name+'</div><div class="sk-desc">'+sk.desc+'</div><div class="sk-rarity rarity-'+node.rarity+'">'+node.rarity+'</div></div>').join('');
  setEncBody('<div class="skill-opts">'+cards+'</div>');
}

function pickSkill(nodeId,skillId){
  const node=getNodeById(nodeId);
  const skill=[...SKILLS.prestige,...SKILLS.beginner,...SKILLS.intermediate,...SKILLS.advanced,...SKILLS.mastered].find(s=>s.id===skillId);
  if(!skill)return;
  treeState[nodeId]=skill;
  activeSkills.push(skill);
  logEvent({event:'skill_pick',skill_id:skillId,skill_rarity:node.rarity,node_id:nodeId,win_number:G.wins});
  renderSkillTree();
  showNotif(skill.name+' learned!');
  advanceDay();
}

function advanceDay(){
  if(secondWindClarityPending){
    secondWindClarityPending=false;
    G.dayStep++;
    updateUI();renderBoard();renderTrack();activateCurrentNode();
    return;
  }
  if(G.consolationPending){
    G.consolationPending=false;
    G.day++;
    G.dayStep=0;
    updateUI();
    renderBoard();
    renderTrack();
    showEncounterShop(0); // Mom consolation as first event of day 2
    return;
  }
  G.day++;G.dayStep=0;updateUI();renderBoard();renderTrack();
  showNotif('Day '+G.day+' begins!');
  activateCurrentNode();
}

// ============================================================
// ITEM INFO PANEL
// ============================================================
let currentInfoItem=null;
let shopItemCache={};

function showItemInfo(item, isPlayerBoard=false, rowType=null, idx=null){
  currentInfoItem=item;
  const panel=document.getElementById('itemInfoPanel');
  panel.style.display='block';

  // Icon and name
  const iconEl=document.getElementById('iipIcon');
  const iconContent=getItemIcon(item);
  if(iconContent.startsWith('<img')){iconEl.innerHTML=iconContent;iconEl.textContent='';}
  else{iconEl.textContent=item.icon||'';iconEl.innerHTML='';}
  const upgNames=['','UPGRADED','ADVANCED','MASTERED'];
  const upgSuffix=item.upgradeLevel>0?' ['+upgNames[item.upgradeLevel]+']':'';
  const brokenSuffix=item.broken?' [BROKEN]':'';
  document.getElementById('iipName').textContent=(item.name||'')+upgSuffix+brokenSuffix;

  // Rarity badge
  const rarityEl=document.getElementById('iipRarity');
  const rar=item.itemRarity||'beginner';
  rarityEl.textContent=rar.toUpperCase();
  rarityEl.className='iip-rarity iip-rarity-'+rar;

  // Meta line
  const typeLabel=item.itemType?item.itemType.charAt(0).toUpperCase()+item.itemType.slice(1):'';
  const cdLabel=item.baseActMs?(item.baseActMs/1000).toFixed(1)+'s cooldown':'';
  const hpLabel=item.maxHp>0?item.maxHp+' hp':'';
  const usesLabel=(item.maxUses!==null&&item.maxUses!==undefined)?item.uses+'/'+item.maxUses+' uses':'';
  const metaParts=[typeLabel,cdLabel,hpLabel||usesLabel].filter(Boolean);
  document.getElementById('iipMeta').textContent=metaParts.join(' · ');

  // Stat row
  const iipStats=document.getElementById('iipStats');
  if(iipStats)iipStats.innerHTML=renderStatRow(item.stats,item);

  // Description
  document.getElementById('iipDesc').textContent=item.desc||'';

  // Flavor
  const flavorEl=document.getElementById('iipFlavor');
  if(item.flavorText){
    flavorEl.textContent='"'+item.flavorText+'"';
    flavorEl.style.display='';
  }else{
    flavorEl.style.display='none';
  }

  updateItemInfoStatus(item);

  // Sell button — only show for player board items, not during battle
  const sellRow=document.getElementById('iipSellRow');
  const sellBtn=document.getElementById('iipSellBtn');
  if(isPlayerBoard && rowType!==null && idx!==null && !G.battleRunning){
    const val=getSellValue(item);
    sellBtn.textContent='SELL FOR 🪙'+val+'g';
    sellBtn.onclick=()=>{
      if(item.isTechnique){
        showTechSellModal(item,rowType,idx);
      }else{
        const sellVal=getSellValue(item);
        const arr=rowType==='front'?board.front:board.back;
        arr[idx]=null;
        G.gold+=sellVal;
        logEvent({event:'item_sold',item_key:item.itemKey||item.id,item_rarity:item.itemRarity||'',gold_received:sellVal,upgrade_level:item.upgradeLevel||0});
        showNotif(item.name+' sold for 🪙'+sellVal+'g');
        hideItemInfo();
        updateUI();
        renderBoard();
        refreshShopAffordability();
      }
    };
    sellRow.style.display='block';
  }else{
    sellRow.style.display='none';
  }
}

function updateItemInfoStatus(item){
  if(!item||currentInfoItem!==item)return;
  const el=document.getElementById('iipStatus');
  const parts=[];
  if((item.burnStack||0)>0)parts.push('<span class="iip-stat iip-burn">🔥 '+item.burnStack+' burn</span>');
  if((item.poisonStack||0)>0)parts.push('<span class="iip-stat iip-poison">☠️ '+item.poisonStack+' poison</span>');
  if((item.hasteMs||0)>0)parts.push('<span class="iip-stat iip-haste">⚡ '+(item.hasteMs/1000).toFixed(1)+'s haste</span>');
  if((item.slowMs||0)>0)parts.push('<span class="iip-stat iip-slow">💧 '+(item.slowMs/1000).toFixed(1)+'s slow</span>');
  if(item.maxHp>0)parts.push('<span class="iip-stat" style="color:var(--dim)">'+item.hp+'/'+item.maxHp+' hp</span>');
  if((item.shield||0)>0)parts.push('<span class="iip-stat" style="color:var(--shield)">🛡 '+item.shield+' plating</span>');
  el.innerHTML=parts.join('');
}

let pendingTomeCallback=null;

function showTomeModal(title,body,reaction,callback){
  document.getElementById('tomeTitle').textContent=title;
  document.getElementById('tomeBody').textContent=body;
  document.getElementById('tomeReaction').textContent=reaction;
  pendingTomeCallback=callback;
  document.getElementById('tomeModal').style.display='flex';
}

function closeTomeModal(){
  document.getElementById('tomeModal').style.display='none';
  if(pendingTomeCallback){pendingTomeCallback();pendingTomeCallback=null;}
}

function showTechSellModal(item,row,idx){
  const popup=item.sellPopup||{title:'',body:'',reaction:''};
  document.getElementById('techSellTitle').textContent=popup.title||'';
  document.getElementById('techSellBody').textContent=popup.body||'';
  document.getElementById('techSellReaction').textContent=popup.reaction||'';
  document.getElementById('techSellConfirmBtn').onclick=()=>{
    const arr=row==='front'?board.front:board.back;
    const val=getSellValue(item);
    arr[idx]=null;
    G.gold+=val;
    logEvent({event:'technique_sold',item_key:item.itemKey||item.id,gold_received:val});
    showNotif(item.name+' sold for 🪙'+val+'g');
    closeTechSellModal();
    hideItemInfo();
    updateUI();
    renderBoard();
    refreshShopAffordability();
  };
  document.getElementById('techSellModal').style.display='flex';
}

function closeTechSellModal(){
  document.getElementById('techSellModal').style.display='none';
}

function hideItemInfo(){
  currentInfoItem=null;
  G.selectedSlot=null;
  document.getElementById('itemInfoPanel').style.display='none';
  document.querySelectorAll('.ic.sel,.ecard.sel').forEach(el=>el.classList.remove('sel'));
}

// ============================================================
// LOG / UI
// ============================================================
function refreshShopAffordability(){
  document.querySelectorAll('.dc[data-item-cost]').forEach(el=>{
    const cost=parseInt(el.dataset.itemCost,10);
    if(cost>0){
      if(G.gold>=cost)el.classList.remove('cant');
      else el.classList.add('cant');
    }
  });
}
function log(type,msg){const el=document.getElementById('battleLog');if(!el)return;const div=document.createElement('div');const t=(battleMs/1000).toFixed(1);const cls={d:'ld',h:'lh',s:'ls',a:'la',b:'lb',x:'lx'}[type]||'lx';div.innerHTML='<span class="lt">'+t+'s</span><span class="'+cls+'">'+msg+'</span>';el.appendChild(div);el.scrollTop=el.scrollHeight;}
function clearLog(){const el=document.getElementById('battleLog');if(el)el.innerHTML='';}
function updateUI(){document.getElementById('goldDisplay').textContent=G.gold;document.getElementById('honorFill').style.width=(G.honor/G.maxHonor*100)+'%';document.getElementById('honorText').textContent=G.honor+'/'+G.maxHonor;document.getElementById('winsDisplay').textContent='WINS: '+G.wins+'/6';document.getElementById('phaseBadge').textContent='DAY '+G.day;refreshShopAffordability();renderSecondWindNode();}
function renderSecondWindNode(){
  let el=document.getElementById('secondWindNode');
  if(!G.secondWindBuff){
    if(el)el.remove();
    return;
  }
  if(!el){
    el=document.createElement('div');
    el.id='secondWindNode';
    el.style.cssText='display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-family:Cinzel,serif;font-size:7px;font-weight:700;letter-spacing:.1em;border:1px solid rgba(232,64,64,.5);background:rgba(232,64,64,.1);color:#e84040;cursor:pointer;margin-top:2px;';
    el.onclick=()=>showNotif(G.secondWindBuff.name+' — '+G.secondWindBuff.desc);
    const badge=document.getElementById('typeBadge');
    if(badge&&badge.parentNode)badge.parentNode.insertBefore(el,badge.nextSibling);
  }
  el.textContent=G.secondWindBuff.icon+' '+G.secondWindBuff.name;
}
function showTreeTip(node,e){
  const tip=document.getElementById('treeTip');
  const nameEl=document.getElementById('treeTipName');
  const subEl=document.getElementById('treeTipSub');
  const descEl=document.getElementById('treeTipDesc');
  const skill=treeState[node.id];
  const rarityColors={prestige:'#c07820',beginner:'#60a060',intermediate:'#4070c0',advanced:'#9050b0',mastered:'#c07820'};
  if(skill){
    nameEl.textContent=skill.name;
    subEl.textContent=node.rarity.toUpperCase();
    subEl.style.color=rarityColors[node.rarity]||'var(--dim)';
    descEl.textContent=skill.desc;
  }else{
    const unlockable=isNodeUnlockable(node.id)&&node.id!=='head';
    nameEl.textContent=node.label+(unlockable?' — AVAILABLE':'— LOCKED');
    subEl.textContent=node.rarity.toUpperCase();
    subEl.style.color=rarityColors[node.rarity]||'var(--dim)';
    descEl.textContent=unlockable?'Win a trainer battle to unlock this node.':'Unlock the parent node first.';
  }
  const tipW=190;
  const left=Math.min(e.clientX+14,window.innerWidth-tipW-8);
  const top=Math.max(8,e.clientY-40);
  tip.style.left=left+'px';tip.style.top=top+'px';
  tip.classList.add('show');
}
function hideTreeTip(){document.getElementById('treeTip').classList.remove('show');}
let notifTimer;
function showNotif(msg,duration=2400){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');clearTimeout(notifTimer);notifTimer=setTimeout(()=>el.classList.remove('show'),duration);}

// RESET
// ============================================================
function resetRun(){
  stopBattle();
  G.gold=8;G.honor=13;G.maxHonor=13;G.wins=0;G.day=1;G.type=null;G.rivalDefeated=false;G.dayStep=0;G.selectedSlot=null;G.battleRunning=false;G.lastResult=null;G.wildChoice=null;G.pendingSkillNode=null;G.momGiftGiven=false;G.secondWindUsed=false;G.secondWindBuff=null;G.steadfastActive=false;G.consolationPending=false;
  board={front:[null,null,null],back:[null,null,null]};
  enemyBoard={front:[null,null,null],back:[null,null,null]};
  TREE_NODES.forEach(n=>treeState[n.id]=null);
  activeSkills.forEach(sk=>{sk._battleHandler=null;});
  activeSkills=[];bannedTypes=[];lastOfferedTypes=[];
  // Pre-fill HEAD with Potential — Zorp starts with it
  treeState['head']=SKILLS.prestige[0];
  activeSkills=[SKILLS.prestige[0]];
  const badge=document.getElementById('typeBadge');
  badge.textContent='✦ POTENTIAL';badge.className='type-badge type-pot';badge.style.cssText='';
  updateUI();renderBoard();renderSkillTree();renderTrack();activateCurrentNode();
  sessionId=Math.random().toString(36).slice(2,10);
  logEvent({event:'run_start'});
}

const ANALYTICS_URL='https://script.google.com/macros/s/AKfycbwmw5uU2M3iRpx2lMbF5tLm1qKokwvQhFAvey6PSxVBjfY0OjgqRauray0TPyCC33-3/exec';
let sessionId=Math.random().toString(36).slice(2,10);

function boardSnapshot(){
  return[...board.front,...board.back].filter(Boolean).map(i=>({
    key:i.itemKey||i.id,
    tier:i.upgradeLevel||0,
    type:i.itemType||'',
    row:board.front.includes(i)?'front':'back'
  }));
}

function logEvent(data){
  try{
    data.session_id=sessionId;
    data.timestamp=Date.now();
    data.day=G.day;
    data.wins=G.wins;
    data.type=G.type||'typeless';
    data.honor=G.honor;
    navigator.sendBeacon(ANALYTICS_URL,JSON.stringify(data));
  }catch(e){
    console.log('analytics error',e);
  }
}

activeSkills=[SKILLS.prestige[0]];
