let battleInterval=null,fatigueInterval=null,battleMs=0,currentBattleType='rival';
function runBattle(type){
  if(G.battleRunning)return;G.battleRunning=true;currentBattleType=type;
  // Collapse dialogue to save vertical space during battle
  const dlg=document.querySelector('.dialogue');
  if(dlg)dlg.style.display='none';
  const sb=document.getElementById('startBattleBtn');if(sb)sb.disabled=true;
  const speedBtn=document.getElementById('speedBtn');if(speedBtn)speedBtn.disabled=true;
  resetItemBattleState(board);resetItemBattleState(enemyBoard);
  // Fizzle — halve effectAmt of untargetable enemy passive items at battle start
  if(activeSkills.some(s=>s.id==='fizzle')){
    [...enemyBoard.front,...enemyBoard.back].forEach(i=>{
      if(i&&!i.broken&&i.maxHp===0){
        i.effectAmt=Math.floor((i.effectAmt||0)/2);
        i.baseEffect=Math.floor((i.baseEffect||0)/2);
        log('s','💨 Fizzle weakens '+i.name+' (effectAmt → '+i.effectAmt+')');
      }
    });
  }
  registerSkillHandlers();
  fireEvent({type:'BATTLE_START',item:null,side:null,value:null,source:null});
  clearLog();hideItemInfo();log('x','Battle starts!');battleMs=0;
  const TICK=100,FATIGUE_START=30000;
  battleInterval=setInterval(()=>{
    const step=TICK*battleSpeed;
    battleMs+=step;const rem=Math.max(0,FATIGUE_START-battleMs);
    const tt=document.getElementById('timerTxt');if(tt)tt.textContent=(rem/1000).toFixed(1)+'s';
    tickSide(board,'player',step);tickSide(enemyBoard,'enemy',step);
    // Iron Hide — expires after 10 seconds
    if(battleState.ironHideActive&&battleMs>=10000){
      battleState.ironHideActive=false;
      battleState.ironHideExpired=true;
      log('s','🦏 Iron Hide expired.');
    }
    // Predator — 3 enemy items broken → globalMult ×1.5
    if(!battleState.predatorActive&&activeSkills.some(s=>s.id==='predator')){
      const brokenCount=[...enemyBoard.front,...enemyBoard.back].filter(i=>i&&i.broken).length;
      if(brokenCount>=3){
        battleState.predatorActive=true;
        log('s','🐺 Predator activated! All effects ×1.5!');
      }
    }
    // Flow State — activates after 20 seconds of battle
    if(!battleState.flowStateActive&&battleMs>=20000&&activeSkills.some(s=>s.id==='flow_state')){
      battleState.flowStateActive=true;
      log('s','🌀 Flow State activated! All effects ×1.15!');
    }
    // Benediction — heal back row every 5 seconds
    if(activeSkills.some(s=>s.id==='benediction')){
      battleState.benedictionMs=(battleState.benedictionMs||0)+step;
      if(battleState.benedictionMs>=5000){
        battleState.benedictionMs=0;
        [...board.back].forEach(item=>{
          if(item&&!item.broken&&item.maxHp>0&&item.hp<item.maxHp){
            const actual=Math.min(item.maxHp-item.hp,15);
            item.hp+=actual;
            if(actual>0)log('h','✨ Benediction heals '+item.name+' +'+actual);
          }
        });
      }
    }
    // Ember Storm — at 20s apply 3 burn to all enemies (once per battle)
    if(activeSkills.some(s=>s.id==='ember_storm')&&!battleState.emberStormFired&&battleMs>=20000){
      battleState.emberStormFired=true;
      [...enemyBoard.front,...enemyBoard.back].forEach(i=>{if(i&&!i.broken)applyBurn(i,3,'Ember Storm','player');});
      log('a','🌋 EMBER STORM — 3 burn to all enemies!');
    }
    // Hearth — every 8s back row passively applies 1 burn to random enemy
    if(activeSkills.some(s=>s.id==='hearth')){
      battleState.hearthMs=(battleState.hearthMs||0)+step;
      if(battleState.hearthMs>=8000){
        battleState.hearthMs=0;
        const backAlive=[...board.back].filter(i=>i&&!i.broken);
        const enemyAlive=[...enemyBoard.front,...enemyBoard.back].filter(i=>i&&!i.broken);
        if(backAlive.length&&enemyAlive.length){
          const t=enemyAlive[Math.floor(Math.random()*enemyAlive.length)];
          applyBurn(t,1,'Hearth','player');
          log('a','🏠 Hearth — back row smolders!');
        }
      }
    }
    // Maelstrom (Water) — every 3s Wet enemies take 4 dmg and lose 500ms Wet
    if(activeSkills.some(s=>s.id==='maelstrom')){
      battleState.maelstromMs=(battleState.maelstromMs||0)+step;
      if(battleState.maelstromMs>=3000){
        battleState.maelstromMs=0;
        [...enemyBoard.front,...enemyBoard.back].forEach(i=>{
          if(i&&!i.broken&&isWet(i)){applyDmgTo(i,4,'Maelstrom','enemy');i.slowMs=Math.max(0,(i.slowMs||0)-500);}
        });
      }
    }
    // Deep Current (Water) — accumulate wet-seconds for speed bonus
    if(activeSkills.some(s=>s.id==='deep_current')){
      if(countWetEnemies()>0)battleState.wetSecondsAccumulated=(battleState.wetSecondsAccumulated||0)+(step/1000);
      battleState.deepCurrentBonus=Math.min(0.5,Math.floor(battleState.wetSecondsAccumulated||0)*0.01);
    }
    // Tidal Force (Water) — update active flag: faster when 3+ Wet enemies
    if(activeSkills.some(s=>s.id==='tidal_force'))battleState.tidalForceActive=countWetEnemies()>=3;
    // Tsunami (Water) — at 25s apply 5s Wet all enemies and 3s Jolt all allies (once per battle)
    if(activeSkills.some(s=>s.id==='tsunami')&&!battleState.tsunamiFired&&battleMs>=25000){
      battleState.tsunamiFired=true;
      [...enemyBoard.front,...enemyBoard.back].forEach(i=>{if(i&&!i.broken)applySlow(i,5000,'Tsunami','enemy');});
      [...board.front,...board.back].forEach(i=>{if(i&&!i.broken)applyHaste(i,3000,'Tsunami');});
      log('a','🌊 TSUNAMI — all enemies Wetted, all allies Jolted!');
    }
    // Forge (Steel) — every 10s most wounded player item gains 25 plating
    if(activeSkills.some(s=>s.id==='forge')){
      battleState.forgeTick=(battleState.forgeTick||0)+step;
      if(battleState.forgeTick>=10000){
        battleState.forgeTick=0;
        const alive=[...board.front,...board.back].filter(i=>i&&!i.broken&&i.maxHp>0);
        if(alive.length){
          const w=alive.reduce((a,b)=>(a.hp/a.maxHp)<(b.hp/b.maxHp)?a:b);
          w.shield=(w.shield||0)+25;w.maxShield=Math.max(w.maxShield||0,w.shield);
          log('s','⚒️ Forge — '+w.name+' fortified +25 plating!');
        }
      }
    }
    // Necrosis (Toxic) — enemies with 5+ poison stacks lose 3 max HP per second
    if(activeSkills.some(s=>s.id==='necrosis')){
      battleState.necrosisMs=(battleState.necrosisMs||0)+step;
      if(battleState.necrosisMs>=1000){
        battleState.necrosisMs=0;
        getHeavilyPoisonedEnemies(5).forEach(i=>{
          i.maxHp=Math.max(1,i.maxHp-3);
          if(i.hp>i.maxHp)i.hp=i.maxHp;
          log('a','💀 Necrosis — '+i.name+' max HP reduced to '+i.maxHp);
        });
      }
    }
    updateBattleBars();updateEnemyBars();
    const pKO=checkKO('player'),eKO=checkKO('enemy');
    if(pKO&&eKO){endBattle('win');return;}
    if(pKO){endBattle('lose');return;}if(eKO){endBattle('win');return;}
    if(battleMs>=FATIGUE_START&&!fatigueInterval)startFatigue();
  },TICK);
}
function resetItemBattleState(b){
  const isPlayer=b===board;
  if(isPlayer)initBattleState(); // initialize battleState before per-item processing
  const mods=getSkillMods();
  [...b.front,...b.back].forEach(item=>{
    if(!item)return;
    if(isPlayer&&item.baseMaxHp>0){
      const ul=item.upgradeLevel||0;
      item.maxHp=Math.round(item.baseMaxHp*(UPGRADE_MULTS[ul]||1))+mods.maxHpBonus;
      item.effectAmt=Math.round((item.baseEffect||0)*(UPGRADE_MULTS[ul]||1));
    }
    item.actMs=item.baseActMs||item.actMs; // always reset to base speed
    item.hp=item.maxHp;item.shield=0;item.maxShield=0;item.actElapsed=0;item.actPct=0;item.broken=false;item.uses=item.maxUses;
    item.hasteMs=0;item.slowMs=0;item._slowMaxMs=0;item.burnStack=0;item.burnTickMs=0;item.poisonStack=0;item.poisonTickMs=0;
    item._side=b===board?'player':'enemy';
    if(item.baseHitCount!==null&&item.baseHitCount!==undefined){
      item.hitCount=Math.round(item.baseHitCount*(UPGRADE_MULTS[item.upgradeLevel||0]||1));
    }
    if(item._firstActivation!==undefined)item._firstActivation=true;
    if(item._spiteCounter!==undefined)item._spiteCounter=1;
    if(item._blazeCounter!==undefined)item._blazeCounter=1;
    if(item._mithridateCount!==undefined)item._mithridateCount=0;
    if(item._miasmaTriggerCount!==undefined)item._miasmaTriggerCount=0;
    item._lastStandApplied=false;
    // Apotheosis — unupgraded player items scale to Mastered tier
    if(isPlayer&&activeSkills.some(s=>s.id==='apotheosis')){
      if((item.upgradeLevel||0)===0){
        const m=UPGRADE_MULTS[3]||2.0;
        if(item.baseMaxHp>0){item.maxHp=Math.round(item.baseMaxHp*m);item.hp=item.maxHp;}
        if(item.baseEffect){item.effectAmt=Math.round(item.baseEffect*m);}
        if(item.baseHitCount){item.hitCount=Math.round(item.baseHitCount*m);}
      }
    }
    // Refrigeration — +1 use to all provisions
    if(isPlayer&&activeSkills.some(s=>s.id==='refrigeration')){
      if(item.itemType==='provision'&&item.uses!==null){
        item.uses++;item.maxUses++;
      }
    }
  });
  // Duality — odd slots +10 effectAmt, even slots +25 maxHp (second pass so all items are reset first)
  if(isPlayer&&activeSkills.some(s=>s.id==='duality')&&!battleState.dualityApplied){
    battleState.dualityApplied=true;
    [board.front[0],board.front[2],board.back[1]].forEach(item=>{
      if(item){item.effectAmt=(item.effectAmt||0)+10;item.baseEffect=(item.baseEffect||0)+10;}
    });
    [board.front[1],board.back[0],board.back[2]].forEach(item=>{
      if(item){item.maxHp+=25;item.baseMaxHp+=25;item.hp=item.maxHp;}
    });
  }
  // Assembled — check if all 6 slots filled
  if(isPlayer){
    const allFilled=[...board.front,...board.back].every(i=>i!==null);
    battleState.assembledActive=allFilled&&activeSkills.some(s=>s.id==='assembled');
  }
  // Iron Formation (Steel) — active if front row is full (3 items)
  if(isPlayer&&activeSkills.some(s=>s.id==='iron_formation')){
    battleState.ironFormationActive=board.front.filter(i=>i!==null).length>=3;
  }
  firingEvent=false;
}
function tickSide(b,side,tickMs){
  const mods=side==='player'?getSkillMods():null;
  const isBack=i=>b.back.includes(i);
  [...b.front,...b.back].forEach(item=>{
    if(!item||item.broken)return;
    // Count down haste/slow timers
    if(item.hasteMs>0)item.hasteMs=Math.max(0,item.hasteMs-tickMs);
    if(item.slowMs>0)item.slowMs=Math.max(0,item.slowMs-tickMs);
    // Status speed modifier: haste=0.5x threshold (faster), slow=2.0x (slower), both=1.0x
    let statusSpeedMult=1.0;
    if(item.hasteMs>0&&item.slowMs===0)statusSpeedMult=0.5;
    else if(item.slowMs>0&&item.hasteMs===0)statusSpeedMult=2.0;
    // Determine slot number for per-slot speed mods
    const frontIdx=b.front.indexOf(item);
    const backIdx=b.back.indexOf(item);
    let slotNum=-1;
    if(frontIdx===0)slotNum=1;
    else if(frontIdx===1)slotNum=2;
    else if(frontIdx===2)slotNum=3;
    else if(backIdx===0)slotNum=4;
    else if(backIdx===1)slotNum=5;
    else if(backIdx===2)slotNum=6;
    // Skill speed modifiers
    let speedMult=statusSpeedMult;
    if(mods){
      speedMult*=mods.speedMult;
      if(isBack(item))speedMult*=mods.backSpeedMult;
      if(slotNum===2)speedMult*=(mods.slot2SpeedMult||1.0);
      if(slotNum===5)speedMult*=(mods.slot5SpeedMult||1.0);
    }
    const effectiveActMs=(item.baseActMs||item.actMs)*speedMult;
    if(effectiveActMs<=0)return; // technique items — no activation timer, effects via handleEvent only
    item.actElapsed+=tickMs;item.actPct=Math.min(100,item.actElapsed/effectiveActMs*100);
    if(item.actElapsed>=effectiveActMs){
      item.actElapsed=0;item.actPct=0;
      log('a',item.icon+' '+item.name+' activates!');
      // Crescendo — every 5th player activation doubles effects
      if(side==='player'&&activeSkills.some(s=>s.id==='crescendo')){
        battleState.crescendoCount++;
        if(battleState.crescendoCount>=5){battleState.crescendoCount=0;battleState.crescendoReady=true;}
      }
      const crescendoMult=(side==='player'&&battleState.crescendoReady)?2:1;
      battleState.crescendoReady=false;
      battleState.activatingItem=item;
      item.effectFn(side,Math.round((item.effectAmt||item.baseEffect||0)*crescendoMult),item);
      battleState.activatingItem=null;
      fireEvent({type:'ITEM_ACTIVATED',item:item,side:side,value:item.effectAmt||item.baseEffect||0,source:null});
      // Momentum — +4 damage to next attack
      if(side==='player'&&activeSkills.some(s=>s.id==='momentum')){
        battleState.momentumBonus+=4;
      }
      // Electric typed skill activation effects
      if(side==='player'){
        // Capacitor — count activations; at 8, Jolt entire board 2s (once per battle)
        battleState.electricActivationCount=(battleState.electricActivationCount||0)+1;
        if(activeSkills.some(s=>s.id==='capacitor')&&!battleState.capacitorFired&&battleState.electricActivationCount>=8){
          battleState.capacitorFired=true;
          [...board.front,...board.back].forEach(i=>{if(i&&!i.broken)applyHaste(i,2000,'Capacitor');});
          log('a','⚙️ Capacitor — full board Jolted 2s!');
        }
        // Feedback Loop — Jolted activating item deals 3 dmg to random enemy
        if(activeSkills.some(s=>s.id==='feedback_loop')&&isJolted(item)){
          dealDmgRandom('enemy',3,'Feedback Loop');
          log('a','⚡ Feedback Loop — '+item.name+' crackles for 3 dmg!');
        }
        // Conductor — item behind gets -0.3s activation permanently (once per item per battle)
        if(activeSkills.some(s=>s.id==='conductor')){
          const behind=getItemBehind(item,board);
          if(behind&&!battleState.conductorBonuses[behind.id]){
            battleState.conductorBonuses[behind.id]=true;
            behind.baseActMs=Math.max(500,behind.baseActMs-300);
            log('a','🔌 Conductor — '+behind.name+' charges up! -0.3s');
          }
        }
        // Overcharge — every 5th activation while Jolted fires twice
        if(activeSkills.some(s=>s.id==='overcharge')&&isJolted(item)){
          battleState.overchargeCount=(battleState.overchargeCount||0)+1;
          if(battleState.overchargeCount%5===0){
            log('a','💥 Overcharge — '+item.name+' fires twice!');
            battleState.activatingItem=item;
            item.effectFn(side,item.effectAmt||item.baseEffect||0,item);
            battleState.activatingItem=null;
          }
        }
        // Infinite Loop — 15% chance to self-Jolt for 1s on any activation
        if(activeSkills.some(s=>s.id==='infinite_loop')&&Math.random()<0.15){
          applyHaste(item,1000,'Infinite Loop');
          log('a','♾️ Infinite Loop — '+item.name+' self-Jolts!');
        }
        // Water typed skill player activation effects
        // Rampart — every player activation gives all other items 5 plating
        if(activeSkills.some(s=>s.id==='rampart')){
          [...board.front,...board.back].forEach(i=>{if(i&&!i.broken&&i!==item&&i.maxHp>0){i.shield=(i.shield||0)+5;i.maxShield=Math.max(i.maxShield||0,i.shield);}});
        }
        // Vanguard — back row activation gives front row 10 plating
        if(activeSkills.some(s=>s.id==='vanguard')&&board.back.includes(item)){
          board.front.forEach(i=>{if(i&&!i.broken&&i.maxHp>0){i.shield=(i.shield||0)+10;i.maxShield=Math.max(i.maxShield||0,i.shield);}});
        }
        // Plate Mail — every player activation gives all other items 3 plating
        if(activeSkills.some(s=>s.id==='plate_mail')){
          [...board.front,...board.back].forEach(i=>{if(i&&!i.broken&&i!==item&&i.maxHp>0){i.shield=(i.shield||0)+3;i.maxShield=Math.max(i.maxShield||0,i.shield);}});
        }
        // Colony — front row activation triggers 1 poison on random enemy (if back row has alive items)
        if(activeSkills.some(s=>s.id==='colony')){
          const isFrontRow=board.front.includes(item);
          if(isFrontRow){
            const backAlive=board.back.filter(i=>i&&!i.broken);
            if(backAlive.length){
              const enemies=[...enemyBoard.front,...enemyBoard.back]
                .filter(i=>i&&!i.broken);
              if(enemies.length){
                const t=enemies[Math.floor(Math.random()*enemies.length)];
                applyPoison(t,1,'Colony');
                log('a','🐛 Colony — front row breeds poison!');
              }
            }
          }
        }
      }
      // Water typed skill enemy activation effects
      if(side==='enemy'){
        // Drag — Wet enemy takes 3 dmg on activation
        if(isWet(item)&&activeSkills.some(s=>s.id==='drag'))applyDmgTo(item,3,'Drag','enemy');
        // Undertow — Wet enemy spreads 0.5s Wet to adjacent in same row (non-Wet only)
        if(isWet(item)&&activeSkills.some(s=>s.id==='undertow')){
          getAdjacentInRow(item,enemyBoard).forEach(adj=>{if(!isWet(adj))applySlow(adj,500,'Undertow','enemy');});
        }
      }
      // Kickstart and Friction — slot 6 triggers
      if(side==='player'&&slotNum===6){
        if(activeSkills.some(s=>s.id==='kickstart')&&battleState.kickstartCount<3){
          battleState.kickstartCount++;
          const alive=[...board.front,...board.back].filter(i=>i&&!i.broken);
          if(alive.length){
            const t=alive[Math.floor(Math.random()*alive.length)];
            applyHaste(t,2000,'Kickstart');
            log('s','⚡ Kickstart — Jolted '+t.name+' 2s ('+battleState.kickstartCount+'/3)');
          }
        }
        if(activeSkills.some(s=>s.id==='friction')&&battleState.frictionCount<3){
          battleState.frictionCount++;
          const et=[...enemyBoard.front,...enemyBoard.back].filter(i=>i&&!i.broken&&i.maxHp>0);
          if(et.length){
            const t=et[Math.floor(Math.random()*et.length)];
            applySlow(t,2000,'Friction');
            log('s','💧 Friction — Wet '+t.name+' 2s ('+battleState.frictionCount+'/3)');
          }
        }
      }
      if(item.uses!==null){item.uses--;if(item.uses<=0){item.broken=true;if(item.onBreak)item.onBreak(item);log('b',item.name+' consumed!');}}
    }
    // Burn tick — every 500ms. shield*2 reduces damage first, remainder to HP
    if(item.burnStack>0){
      item.burnTickMs+=tickMs;
      while(item.burnTickMs>=500&&item.burnStack>0){
        item.burnTickMs-=500;
        if(item.hitCount!==undefined&&item.hitCount!==null){
          item.hitCount--;
          log('d','Burn hit absorbed by '+item.name+' ('+item.hitCount+' hits remaining)');
          if(item.hitCount<=0){
            fireEvent({type:'ITEM_BROKEN',item:item,side:side,value:0,source:null});
            item.broken=true;
            if(item.onBreak)item.onBreak(item);
            log('b',item.name+' BROKEN by burn!');
          }
          item.burnStack--;
          continue;
        }
        const shieldReduction=(item.shield||0)*2;
        const hpDmg=Math.max(0,item.burnStack-shieldReduction);
        if(hpDmg>0){item.hp=Math.max(0,item.hp-hpDmg);log('d','🔥 Burn '+item.name+' -'+hpDmg+' HP');}
        else{log('d','🔥 Burn '+item.name+' absorbed by plating');}
        item.burnStack--;
        // Asbestos — extra -2 burn stacks per tick on player items
        if(side==='player'&&activeSkills.some(s=>s.id==='asbestos')){
          item.burnStack=Math.max(0,item.burnStack-2);
        }
        // Backfire — each burn tick on enemy deals 1 dmg to random enemy
        if(side==='enemy'&&activeSkills.some(s=>s.id==='backfire')){
          dealDmgRandom('enemy',1,'Backfire');
        }
        // Wildfire — 20% chance to spread 1 burn to another enemy on each burn tick
        if(side==='enemy'&&activeSkills.some(s=>s.id==='wildfire')&&Math.random()<0.20){
          const others=[...enemyBoard.front,...enemyBoard.back].filter(i=>i&&!i.broken&&i!==item);
          if(others.length){const wt=others[Math.floor(Math.random()*others.length)];applyBurn(wt,1,'Wildfire','player');}
          log('a','🌪️ Wildfire spreads!');
        }
        if(item.hp<=0&&!item.broken){checkAndBreak(item,side);}
      }
    }
    // Poison tick — every 1000ms (2000ms if Immunity active on player side, 900ms if Festering active for enemy). bypasses shield
    if(item.poisonStack>0){
      item.poisonTickMs+=tickMs;
      let poisonInterval;
      if(side==='player'&&activeSkills.some(s=>s.id==='immunity')){
        poisonInterval=2000;
      } else if(side==='enemy'&&activeSkills.some(s=>s.id==='festering')){
        poisonInterval=900;
      } else {
        poisonInterval=1000;
      }
      while(item.poisonTickMs>=poisonInterval&&item.poisonStack>0){
        item.poisonTickMs-=poisonInterval;
        if(item.hitCount!==undefined&&item.hitCount!==null){
          item.hitCount--;
          log('d','Poison hit absorbed by '+item.name+' ('+item.hitCount+' hits remaining)');
          if(item.hitCount<=0){
            fireEvent({type:'ITEM_BROKEN',item:item,side:side,value:0,source:null});
            item.broken=true;
            if(item.onBreak)item.onBreak(item);
            log('b',item.name+' BROKEN by poison!');
          }
          continue;
        }
        const pdmg=item.poisonStack;
        item.hp=Math.max(0,item.hp-pdmg);
        log('d','☠️ Poison '+item.name+' -'+pdmg+' HP');
        // Seeping — heal most wounded player ally 1 HP per enemy poison tick
        if(side==='enemy'&&activeSkills.some(s=>s.id==='seeping')){
          const alive=[...board.front,...board.back]
            .filter(i=>i&&!i.broken&&i.maxHp>0&&i.hp<i.maxHp);
          if(alive.length){
            const weakest=alive.reduce((a,b)=>(a.hp/a.maxHp)<(b.hp/b.maxHp)?a:b);
            weakest.hp=Math.min(weakest.maxHp,weakest.hp+1);
            log('h','💉 Seeping — '+weakest.name+' heals 1 HP');
          }
        }
        // Track if this tick kills for Tipping Point
        if(item.hp<=0){
          battleState.lastKillWasPoison=true;
        }
        if(item.hp<=0&&!item.broken){checkAndBreak(item,side);}
      }
    }
  });
  if(side==='player'){
    const joltedCount=[...board.front,...board.back]
      .filter(i=>i&&!i.broken&&(i.hasteMs||0)>0).length;
    if(joltedCount>0){
      battleState.joltCumulativeMs+=(tickMs*joltedCount);
      checkThunder();
    }
  }
}
function startFatigue(){
  fireEvent({type:'FATIGUE_START',item:null,side:null,value:null,source:null});
  let fMs=0;const fw=document.getElementById('fatigueWrap');if(fw)fw.style.display='block';
  fatigueInterval=setInterval(()=>{
    fMs+=500;const baseDmg=Math.min(40,2+Math.floor(fMs/2000)*3);
    const mods=getSkillMods();
    const playerDmg=Math.round(baseDmg*mods.fatigueMult);
    const dmg=baseDmg;
    const tt=document.getElementById('timerTxt');if(tt)tt.textContent='FATIGUE +'+playerDmg+'/'+(baseDmg);
    const ff=document.getElementById('fatigueFill');if(ff)ff.style.width=Math.min(100,fMs/12000*100)+'%';
    const actualPlayerDmg=G.steadfastActive?Math.round(playerDmg*0.5):playerDmg;
    [...board.front,...board.back].forEach(item=>{if(item&&item.maxHp>0&&!item.broken)applyDmgTo(item,actualPlayerDmg,'Fatigue','player');});
    [...enemyBoard.front,...enemyBoard.back].forEach(item=>{if(item&&item.maxHp>0&&!item.broken)applyDmgTo(item,Math.round(dmg*battleState.fatigueDamageMultiplier),'Fatigue','enemy');});
    updateBattleBars();updateEnemyBars();
    const pKO=checkKO('player'),eKO=checkKO('enemy');
    if(pKO&&eKO)endBattle('win');else if(pKO)endBattle('lose');else if(eKO)endBattle('win');
  },500);
}
function stopBattle(){if(battleInterval){clearInterval(battleInterval);battleInterval=null;}if(fatigueInterval){clearInterval(fatigueInterval);fatigueInterval=null;}G.battleRunning=false;battleSpeed=1;firingEvent=false;
  // Restore dialogue visibility
  const dlg=document.querySelector('.dialogue');
  if(dlg)dlg.style.display='';
}
function checkKO(side){return aliveItems(side).filter(i=>i.maxHp>0).length===0;}

function endBattle(result){
  stopBattle();G.lastResult=result;
  let title,sub,btnText='CONTINUE →',btnOnclick='continueAfterResult()';
  if(result==='win'){
    if(currentBattleType==='wild'){
      const roll=Math.random();const reward=roll<0.25?4:roll<0.75?5:6;
      const butcher=reward===4?'"You really beat the meat on this one." Coins in your hand, pity in his eyes.':reward===5?'"Decent enough." Coins on the counter, no further conversation.':'"Near perfect condition. They grade these now, you know. PSA 10, this one." You walk out richer than expected.';
      const monsterName=G.wildChoice===-1?DAY1_WILD.name:WILD_MONSTERS[G.wildChoice||0].name;
      G.gold+=reward;title='MONSTER DEFEATED';
      sub='You haul the '+monsterName+' to the butcher.<br><br><em>'+butcher+'</em><br><br>Earned 🪙'+reward+' gold.';
      logEvent({event:'wild_battle',result:'win',wild_monster:monsterName,gold_reward:reward,board:boardSnapshot(),battle_duration_ms:battleMs});
    }else{
      G.wins++;G.rivalDefeated=true;title='VICTORY';
      if(G.wins>=6){
        rivalRecord.wins++;localStorage.setItem('rivalWins',rivalRecord.wins);
        localStorage.setItem('zorpBeatGame','1');
        const isPerfect=G.honor===13;
        if(isPerfect){title='FLAWLESS';sub='Six wins. Zero losses. '+G.monsterName+' knew all along.';}
        else{sub='Six wins. The run is complete.';}
        btnText='PLAY AGAIN';btnOnclick='resetRun()';
        logEvent({event:'run_complete',wins:G.wins,honor:G.honor,perfect:isPerfect,board:boardSnapshot(),skills:activeSkills.map(s=>s.id)});
      }else{
        const trainerWinner=TRAINER_DATA[G.wins]||TRAINER_DATA[1];
        const afterWinDlg=trainerWinner.dialogueAfterWin||'';
        sub='"'+afterWinDlg.replace(/\n/g,'<br>')+'"<br><br>— '+trainerWinner.name+'<br><br>Win '+G.wins+' of 6.';
      }
      logEvent({event:'trainer_battle',result:'win',win_number:G.wins,board:boardSnapshot(),skills:activeSkills.map(s=>s.id),battle_duration_ms:battleMs,fatigue_triggered:fatigueInterval!==null});
    }
  }else{
    if(currentBattleType==='wild'){
      title='DEFEATED';
      const monsterName=G.wildChoice===-1?DAY1_WILD.name:WILD_MONSTERS[G.wildChoice||0].name;
      logEvent({event:'wild_battle',result:'lose',wild_monster:monsterName,board:boardSnapshot(),battle_duration_ms:battleMs});
      if(G.day===1){
        sub='You are literally in the tutorial. We\'re going to pretend that didn\'t happen.';btnText='MOVE ON →';
      }else{
        sub='Nothing for the butcher today.';btnText='MOVE ON →';
      }
    }else{
      const hl=G.day;G.honor=Math.max(0,G.honor-hl);title='DEFEATED';
      const trainerLoser=TRAINER_DATA[G.wins+1]||TRAINER_DATA[1];
      const afterLossDlg=trainerLoser.getDialogueAfterLoss?trainerLoser.getDialogueAfterLoss():trainerLoser.dialogueAfterLoss||'';
      if(G.wins===5){rivalRecord.losses++;localStorage.setItem('rivalLosses',rivalRecord.losses);}
      sub='"'+afterLossDlg.replace(/\n/g,'<br>')+'"<br><br>— '+trainerLoser.name+'<br><br>Lost '+hl+' honor. '+G.honor+' remaining.'+(G.honor<=0?' SECOND WIND!':'');
      btnText=G.honor<=0?'SECOND WIND...':'TRY AGAIN →';
      logEvent({event:'trainer_battle',result:'lose',win_number:G.wins,honor_lost:hl,board:boardSnapshot(),skills:activeSkills.map(s=>s.id),battle_duration_ms:battleMs,fatigue_triggered:fatigueInterval!==null});
    }
  }
  updateUI();setEncTitle(title);
  const titleClass=title==='FLAWLESS'?'re-flawless':result==='win'?'re-win':'re-lose';
  setEncBody('<div class="result-enc"><div class="re-title '+titleClass+'">'+title+'</div><div class="re-sub">'+sub+'</div><div class="btn-row"><button class="btn btn-p" onclick="'+btnOnclick+'">'+btnText+'</button></div></div>');
}

function continueAfterResult(){
  resetItemBattleState(board);
  renderBoard();
  if(G.lastResult==='win'){
    if(currentBattleType==='wild'){
      G.dayStep++;updateUI();renderBoard();renderTrack();activateCurrentNode();
    }else{
      postTrainerWin();
    }
  }else{
    if(currentBattleType==='wild'){
      G.dayStep++;updateUI();renderBoard();renderTrack();activateCurrentNode();
    }else{
      if(G.honor<=0&&!G.secondWindUsed){
        renderBoard();updateUI();renderTrack();
        showSecondWind();
      }else if(G.honor<=0&&G.secondWindUsed){
        setEncTitle('DEFEATED');
        setEncBody('<div class="result-enc"><div class="re-title re-lose">DEFEATED</div><div class="re-sub">'+G.monsterName+' gave everything.<br><br>'+G.wins+' wins.</div><div class="btn-row"><button class="btn btn-p" onclick="resetRun()">PLAY AGAIN</button></div></div>');
      }else{
        advanceDay();
      }
    }
  }
}

function postTrainerWin(){
  if(G.type===null){
    showTypeSelect();
  }else{
    showSkillPick();
  }
}

function applySecondWindBuff(buff,targetItem){
  G.secondWindBuff=buff;
  switch(buff.id){
    case'clarity':
      secondWindClarityPending=true;
      renderSecondWindNode();
      showSkillPick();
      return; // showSkillPick handles flow
    case'hardened':
      [...board.front,...board.back].filter(Boolean).forEach(item=>{
        if(item.maxHp>0){
          item.maxHp=Math.round(item.maxHp*1.5);
          item.baseMaxHp=Math.round(item.baseMaxHp*1.5);
          item.hp=item.maxHp;
        }
      });
      showNotif('HARDENED — all items +50% HP');
      break;
    case'unleashed':
      if(targetItem){
        targetItem.baseActMs=Math.round(targetItem.baseActMs*0.75);
        targetItem.actMs=targetItem.baseActMs;
        showNotif('UNLEASHED — '+targetItem.name+' activates 25% faster');
      }
      break;
    case'conviction':
      if(targetItem){
        targetItem.baseEffect=Math.round((targetItem.baseEffect||0)*1.5);
        targetItem.effectAmt=Math.round((targetItem.effectAmt||0)*1.5);
        showNotif('CONVICTION — '+targetItem.name+' effects +50%');
      }
      break;
    case'veteran':
      [...board.front,...board.back].filter(Boolean).forEach(item=>{
        if((item.upgradeLevel||0)<3)upgradeItem(item);
      });
      showNotif('VETERAN — all items upgraded one tier');
      break;
    case'double_down':
      if(targetItem){
        const f=getItemFactory(targetItem.itemKey||targetItem.id);
        if(f){
          const copy={...f(),
            upgradeLevel:targetItem.upgradeLevel||0,
            maxHp:targetItem.maxHp,
            baseMaxHp:targetItem.baseMaxHp,
            effectAmt:targetItem.effectAmt,
            baseEffect:targetItem.baseEffect,
            baseActMs:targetItem.baseActMs,
            actMs:targetItem.baseActMs,
            hp:targetItem.maxHp,
            shield:0,maxShield:0,
            actElapsed:0,actPct:0,
            broken:false,
            uses:targetItem.maxUses,
            burnStack:0,burnTickMs:0,
            poisonStack:0,poisonTickMs:0,
            hasteMs:0,slowMs:0,
          };
          const maxFront=maxFrontSlots();
          const maxBack=maxBackSlots();
          let placed=false;
          for(let i=0;i<maxFront&&!placed;i++){if(!board.front[i]){board.front[i]=copy;placed=true;}}
          if(!placed)for(let i=0;i<maxBack&&!placed;i++){if(!board.back[i]){board.back[i]=copy;placed=true;}}
          if(!placed)showNotif('Board full — no room for copy');
          else showNotif('DOUBLE DOWN — '+copy.name+' copied!');
        }
      }
      break;
    case'steadfast':
      G.steadfastActive=true;
      showNotif('STEADFAST — fatigue deals half damage this run');
      break;
  }
  renderSecondWindNode();
  renderBoard();
  updateUI();
  advanceDay();
}

function rarityIcon(r){return{prestige:'✦',beginner:'◎',intermediate:'◈',advanced:'◆',mastered:'★'}[r]||'○';}

function getSkillOffers(nodeRarity){
  const genericPool=[...(SKILLS[nodeRarity]||[])];
  const typedPool=G.type?[...(TYPED_SKILLS[G.type]?.[nodeRarity]||[])]:[];

  const pickGeneric=()=>{
    if(!genericPool.length)return null;
    const idx=Math.floor(Math.random()*genericPool.length);
    return genericPool.splice(idx,1)[0];
  };
  const pickTyped=()=>{
    if(!typedPool.length)return pickGeneric();
    const idx=Math.floor(Math.random()*typedPool.length);
    return typedPool.splice(idx,1)[0];
  };
  const maybeTyped=(chance)=>{
    if(typedPool.length&&Math.random()<chance)return pickTyped();
    return pickGeneric();
  };

  const offers=[];
  if(G.type&&typedPool.length){
    offers.push(pickTyped());
    offers.push(maybeTyped(0.25));
    offers.push(maybeTyped(0.25));
  }else{
    offers.push(pickGeneric());
    offers.push(pickGeneric());
    offers.push(pickGeneric());
  }
  return offers.filter(Boolean);
}

function selectNode(nodeId){
  G.pendingSkillNode=nodeId;
  const node=getNodeById(nodeId);
  const offers=getSkillOffers(node.rarity);
  setEncTitle('CHOOSE A SKILL — '+node.rarity.toUpperCase());
  const cards=offers.map(sk=>`
    <div class="sk-card" onclick="pickSkill('${nodeId}','${sk.id}','${sk.type||'generic'}')">
      <div class="sk-icon">${sk.icon}</div>
      <div class="sk-name">${sk.name}</div>
      ${sk.type?`<div style="font-family:Cinzel,serif;font-size:7px;color:var(--dim);margin-bottom:2px">[${sk.type.toUpperCase()}]</div>`:''}
      <div class="sk-desc">${sk.desc}</div>
      <div class="sk-rarity rarity-${node.rarity}">${node.rarity}</div>
    </div>
  `).join('');
  setEncBody(`<div class="skill-opts">${cards}</div>`);
}

function pickSkill(nodeId,skillId,skillType){
  const allSkills=[
    ...SKILLS.prestige,...SKILLS.beginner,...SKILLS.intermediate,...SKILLS.advanced,...SKILLS.mastered,
    ...(G.type?[
      ...(TYPED_SKILLS[G.type]?.beginner||[]),
      ...(TYPED_SKILLS[G.type]?.intermediate||[]),
      ...(TYPED_SKILLS[G.type]?.advanced||[]),
      ...(TYPED_SKILLS[G.type]?.mastered||[]),
    ]:[]),
  ];
  const skill=allSkills.find(s=>s.id===skillId);
  if(!skill)return;
  treeState[nodeId]=skill;
  activeSkills.push(skill);
  logEvent({event:'skill_pick',skill_id:skillId,skill_rarity:skill.rarity,node_id:nodeId,win_number:G.wins});
  renderSkillTree();
  showNotif(skill.name+' learned!');
  advanceDay();
}

function advanceDay(){
  if(secondWindClarityPending){
    secondWindClarityPending=false;

    updateUI();renderBoard();renderTrack();activateCurrentNode();

  }
  if(G.consolationPending){

    G.day++;
    G.dayStep=0;
    updateUI();
    renderBoard();
    renderTrack();
    showEncounterShop(0); // Mom consolation as first event of day 2

  }

    descEl.textContent=unlockable?'Win a trainer battle to unlock this node.':'Unlock the parent node first.';
  }
  const tipW=190;
  const left=Math.min(e.clientX+14,window.innerWidth-tipW-8);
  const top=Math.max(8,e.clientY-40);
  tip.style.left=left+'px';tip.style.top=top+'px';
  tip.classList.add('show');
}

// Demo battle — completely isolated from main game state
let demoInterval=null;
let demoResetTimeout=null;
let demoMs=0;
let demoItems={
  shield:null,
  spark:null,
};
let demoFatigueMs=0;
let demoFatigueActive=false;

function makeDemoItem(id,name,icon,maxHp,actMs,type){
  return{
    id,name,icon,maxHp,hp:maxHp,
    actMs,baseActMs:actMs,
    actElapsed:0,actPct:0,
    shield:0,maxShield:0,
    broken:false,
    type,
    effectAmt:type==='shield'?30:13,
  };
}

function initDemoItems(){
  demoItems.shield=makeDemoItem('demo_shield','Bubble Shield','🫧',200,6000,'shield');
  demoItems.spark=makeDemoItem('demo_spark','Surge','⚡',80,3000,'attack');
  demoMs=0;
  demoFatigueMs=0;
  demoFatigueActive=false;
}

function renderDemoCards(){
  const container=document.getElementById('demoBattleContainer');
  if(!container)return;
  const shield=demoItems.shield;
  const spark=demoItems.spark;
  if(!shield||!spark)return;
  const makeCard=(item)=>{
    const hpPct=item.maxHp>0?(item.hp/item.maxHp*100):0;
    const shPct=item.maxShield>0?(item.shield/item.maxShield*100):0;
    const actPct=item.actPct||0;
    const hpColor=hpPct>60?'#50e080':hpPct>30?'#e0a030':'#e84040';
    const brokenStyle=item.broken?'opacity:.3;':'';
    return`<div style="width:90px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px;text-align:center;position:relative;${brokenStyle}"><div style="font-size:22px;margin-bottom:2px">${item.broken?'✕':item.icon}</div><div style="font-family:Cinzel,serif;font-size:6px;font-weight:700;margin-bottom:2px">${item.name}</div><div style="font-size:6px;color:var(--gold);font-family:Cinzel,serif">${item.hp}/${item.maxHp}</div>${item.shield>0?`<div style="font-size:6px;color:var(--shield)">🛡${item.shield}</div>`:''}<div style="margin-top:4px;display:flex;flex-direction:column;gap:1px;">${item.maxShield>0||item.shield>0?`<div style="height:3px;background:rgba(0,0,0,.4);border-radius:2px;overflow:hidden"><div style="height:100%;width:${shPct}%;background:var(--shield);border-radius:2px"></div></div>`:''}<div style="height:3px;background:rgba(0,0,0,.4);border-radius:2px;overflow:hidden"><div style="height:100%;width:${hpPct}%;background:${hpColor};border-radius:2px"></div></div><div style="height:3px;background:rgba(0,0,0,.4);border-radius:2px;overflow:hidden"><div style="height:100%;width:${actPct}%;background:var(--act);border-radius:2px"></div></div></div>${item.broken?'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(100,80,120,.4);">✕</div>':''}</div>`;
  };
  const timerTxt=demoFatigueActive?
    `<div style="font-family:Cinzel,serif;font-size:8px;color:var(--fatigue);text-align:center">⚠ FATIGUE</div>`:
    `<div style="font-family:Cinzel,serif;font-size:8px;color:var(--gold);text-align:center">${Math.max(0,(30000-demoMs)/1000).toFixed(1)}s</div>`;
  container.innerHTML=makeCard(spark)+`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0 4px">${timerTxt}<div style="font-size:10px;color:var(--dim)">VS</div></div>`+makeCard(shield);
}

function setDemoCommentary(text){
  const el=document.getElementById('demoCommentary');
  if(el)el.textContent=text;
}

function tickDemo(){
  if(!demoItems.shield||!demoItems.spark)return;
  const TICK=100;
  demoMs+=TICK;
  const spark=demoItems.spark;
  const shield=demoItems.shield;
  // Tick Surge
  if(!spark.broken){
    spark.actElapsed+=TICK;
    spark.actPct=Math.min(100,spark.actElapsed/spark.actMs*100);
    if(spark.actElapsed>=spark.actMs){
      spark.actElapsed=0;spark.actPct=0;
      let dmg=spark.effectAmt;
      if(shield.shield>0){
        const absorbed=Math.min(shield.shield,dmg);
        shield.shield-=absorbed;dmg-=absorbed;
        setDemoCommentary('Surge hits — plating absorbs '+absorbed+' damage!');
      }else{
        setDemoCommentary('Surge hits '+shield.name+' for '+dmg+' damage!');
      }
      if(dmg>0){
        shield.hp=Math.max(0,shield.hp-dmg);
        if(shield.hp<=0){shield.broken=true;setDemoCommentary('Bubble Shield is broken!');}
      }
    }
  }
  // Tick Bubble Shield
  if(!shield.broken){
    shield.actElapsed+=TICK;
    shield.actPct=Math.min(100,shield.actElapsed/shield.actMs*100);
    if(shield.actElapsed>=shield.actMs){
      shield.actElapsed=0;shield.actPct=0;
      shield.shield=(shield.shield||0)+shield.effectAmt;
      shield.maxShield=Math.max(shield.maxShield||0,shield.shield);
      setDemoCommentary('Bubble Shield activates — gains +'+shield.effectAmt+' plating!');
    }
  }
  // Fatigue at 30s
  if(demoMs>=30000){
    if(!demoFatigueActive){
      demoFatigueActive=true;
      setDemoCommentary('Fatigue begins — both items take increasing damage!');
    }
    demoFatigueMs+=TICK;
    const fatigueDmg=Math.min(20,2+Math.floor(demoFatigueMs/2000)*2);
    if(!spark.broken){
      spark.hp=Math.max(0,spark.hp-fatigueDmg);
      if(spark.hp<=0){spark.broken=true;setDemoCommentary('Surge collapses from fatigue! Bubble Shield wins!');}
    }
    if(!shield.broken){
      shield.hp=Math.max(0,shield.hp-Math.round(fatigueDmg*0.5));
      if(shield.hp<=0){shield.broken=true;}
    }
  }
  const sparkDead=spark.broken;
  const shieldDead=shield.broken;
  if(sparkDead||shieldDead){
    renderDemoCards();
    setDemoCommentary(
      spark.broken&&!shield.broken?'Bubble Shield wins! Fatigue rewards endurance.':
      shield.broken&&!spark.broken?'Surge wins!':
      'Both broken — a tie! Ties count as wins.'
    );
    clearInterval(demoInterval);
    demoInterval=null;
    demoResetTimeout=setTimeout(()=>{
      const existing=document.getElementById('demoEndButtons');
      if(existing)existing.remove();
      const container=document.getElementById('demoBattleContainer');
      if(container&&container.parentNode){
        const endBtns=document.createElement('div');
        endBtns.id='demoEndButtons';
        endBtns.style.cssText='display:flex;gap:8px;justify-content:center;margin-top:6px;';
        endBtns.innerHTML=
          '<button class="btn btn-d" style="font-size:8px;padding:4px 10px" onclick="startDemoBattle()">↺ REPLAY</button>'+
          '<button class="btn btn-p" style="font-size:8px;padding:4px 12px" onclick="tutorialStep='+(tutorialStep+1)+';stopDemoBattle();showTutorialStep()">NEXT →</button>';
        container.parentNode.insertBefore(endBtns,container.nextSibling);
      }
      demoResetTimeout=null;
    },1500);
    return;
  }
  renderDemoCards();
}

function startDemoBattle(){
  stopDemoBattle();
  initDemoItems();
  renderDemoCards();
  setDemoCommentary('Watch the bars carefully...');
  demoInterval=setInterval(tickDemo,100);
}
function stopDemoBattle(){
  if(demoInterval){clearInterval(demoInterval);demoInterval=null;}
  if(demoResetTimeout){clearTimeout(demoResetTimeout);demoResetTimeout=null;}
  const endBtns=document.getElementById('demoEndButtons');
  if(endBtns)endBtns.remove();
  demoMs=0;
  demoFatigueMs=0;
  demoFatigueActive=false;
}

  ts.innerHTML=`
    <div style="pointer-events:all;display:flex;flex-direction:column;align-items:center;">
      <img src="${ZORP_LOGO_IMG}" style="width:70vw;max-width:340px;object-fit:contain;display:block;filter:drop-shadow(0 0 28px rgba(240,192,64,.45));"/>
      ${diffSel}
      <button onclick="startFromTitle()" style="margin-top:${hasBeat?'4vh':'8vh'};font-family:'Cinzel',serif;font-size:14px;font-weight:900;letter-spacing:.25em;padding:12px 44px;border-radius:8px;border:2px solid var(--gold);background:rgba(240,192,64,.12);color:var(--gold);cursor:pointer;text-shadow:0 0 16px rgba(240,192,64,.5);box-shadow:0 0 24px rgba(240,192,64,.15);" onmouseover="this.style.background='rgba(240,192,64,.28)'" onmouseout="this.style.background='rgba(240,192,64,.12)'">START</button>
    </div>
    <img src="${SCRUFFLING_IMG}" style="position:fixed;left:0;bottom:0;height:35vh;object-fit:contain;object-position:bottom left;pointer-events:none;filter:drop-shadow(4px 0 18px rgba(0,0,0,.65));"/>
    <img src="${THORNBACK_IMG}" style="position:fixed;right:0;bottom:0;height:35vh;object-fit:contain;object-position:bottom right;pointer-events:none;filter:drop-shadow(-4px 0 18px rgba(0,0,0,.65));transform:scaleX(-1);"/>
  `;
  document.body.appendChild(ts);
}
function selectDifficulty(d){
  localStorage.setItem('zorpDifficulty',d);
  ['easy','normal','hard'].forEach(x=>{
    const btn=document.getElementById('diff-btn-'+x);
    if(!btn)return;
    btn.style.borderColor=x===d?'var(--gold)':'var(--border)';
    btn.style.background=x===d?'rgba(240,192,64,.18)':'rgba(0,0,0,.35)';
    btn.style.color=x===d?'var(--gold)':'var(--dim)';
  });
}
function startFromTitle(){
  G.difficulty=localStorage.getItem('zorpDifficulty')||'easy';
  const ts=document.getElementById('title-screen');
  if(ts)ts.remove();
  let wm=document.getElementById('logo-watermark');
  if(!wm){
    wm=document.createElement('div');
    wm.id='logo-watermark';
    wm.style.cssText='position:fixed;bottom:8px;right:8px;z-index:999;pointer-events:none;';
    wm.innerHTML='<img src="'+ZORP_LOGO_IMG+'" style="width:64px;opacity:0.18;display:block;"/>';
    document.body.appendChild(wm);
  }else{wm.style.display='';}
  showProfessorFlow();
}

// ============================================================
// RESET
// ============================================================
function resetRun(){
  stopBattle();
  G.gold=8;G.honor=13;G.maxHonor=13;G.wins=0;G.day=1;G.type=null;G.rivalDefeated=false;G.dayStep=0;G.selectedSlot=null;G.battleRunning=false;G.lastResult=null;G.wildChoice=null;G.pendingSkillNode=null;G.momGiftGiven=false;G.secondWindUsed=false;G.secondWindBuff=null;G.steadfastActive=false;G.consolationPending=false;G.monsterType='fox';G.monsterName='Kip';
  board={front:[null,null,null],back:[null,null,null]};
  enemyBoard={front:[null,null,null],back:[null,null,null]};
  getTreeNodes().forEach(n=>treeState[n.id]=null);
  activeSkills.forEach(sk=>{sk._battleHandler=null;});
  activeSkills=[];bannedTypes=[];lastOfferedTypes=[];
  // Pre-fill prestige root with Potential — Zorp starts with it
  treeState[getPrestigeNodeId()]=SKILLS.prestige[0];
  activeSkills=[SKILLS.prestige[0]];
  const badge=document.getElementById('typeBadge');
  badge.textContent='✦ POTENTIAL';badge.className='type-badge type-pot';badge.style.cssText='';
  updateUI();renderBoard();renderSkillTree();renderTrack();
  updateFoxImage();
  sessionId=Math.random().toString(36).slice(2,10);
  logEvent({event:'run_start'});
  showTitleScreen();
}

// ============================================================
// ANALYTICS
// ============================================================
const ANALYTICS_URL='https://script.google.com/macros/s/AKfycbwmw5uU2M3iRpx2lMbF5tLm1qKokwvQhFAvey6PSxVBjfY0OjgqRauray0TPyCC33-3/exec';
let sessionId=Math.random().toString(36).slice(2,10);

function boardSnapshot(){
  return[...board.front,...board.back].filter(Boolean).map(i=>({
    key:i.itemKey||i.id,
    tier:i.upgradeLevel||0,
    type:i.itemType||'',
    row:board.front.includes(i)?'front':'back'
  }));
}

function logEvent(data){
  try{
    data.session_id=sessionId;
    data.timestamp=Date.now();
    data.day=G.day;
    data.wins=G.wins;
    data.type=G.type||'typeless';
    data.honor=G.honor;
    navigator.sendBeacon(ANALYTICS_URL,JSON.stringify(data));
  }catch(e){
    console.log('analytics error',e);
  }
}

// ============================================================
// INIT
// ============================================================
const savedRivalName=localStorage.getItem('zorpRivalName');
if(savedRivalName)G.rivalName=savedRivalName;
treeState['head']=SKILLS.prestige[0];
activeSkills=[SKILLS.prestige[0]];
updateUI();renderBoard();renderSkillTree();renderTrack();
updateFoxImage();
logEvent({event:'run_start'});
showTitleScreen();
window.addEventListener('beforeunload',()=>{
  logEvent({event:'session_end',board:boardSnapshot(),skills:activeSkills.map(s=>s.id),gold:G.gold});
});
document.addEventListener('click',(e)=>{
  if(!e.target.closest('.ic')&&
     !e.target.closest('.ecard')&&
     !e.target.closest('.item-info-panel')){
    hideItemInfo();
  }
});
</script>
</body>
