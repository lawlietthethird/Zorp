<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZORP</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{--gold:#f0c040;--honor-red:#e84040;--bg:#0e0b14;--panel:#1a1525;--card:#221a30;--card-h:#2d2440;--border:#3a2f50;--glow:#6040a0;--text:#e8d8ff;--dim:#7a6a90;--potential:#40c0ff;--hp:#50e080;--shield:#40a0ff;--act:#a060ff;--broken-bg:#18121e;--broken-b:#2a2035;--front:#e05050;--back:#5090e0;--fatigue:#ff6020;--sel:#ffe040;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,40,120,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(40,60,120,.1) 0%,transparent 50%);}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:5px 12px;background:rgba(10,8,18,.96);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-shrink:0;height:44px;}
.ts{display:flex;align-items:center;gap:6px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:.05em;}
.gv{color:var(--gold);}
.hw{display:flex;flex-direction:column;align-items:center;gap:2px;}
.hl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;color:var(--dim);}
.hbar{width:100px;height:9px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative;}
.hfill{height:100%;background:linear-gradient(90deg,#c02020,#e84040);transition:width .5s;box-shadow:0 0 5px rgba(232,64,64,.4);}
.htxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:7px;font-weight:700;color:#fff;text-shadow:0 1px 2px #000;}
.pb{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.12em;color:var(--glow);background:rgba(96,64,160,.15);padding:2px 8px;border-radius:8px;border:1px solid rgba(96,64,160,.3);}
.page{display:flex;flex-direction:column;max-width:960px;margin:0 auto;padding:0;height:calc(100vh - 44px);overflow:hidden;}
/* ENCOUNTER */
.encounter{background:var(--panel);border:1px solid var(--border);border-radius:10px 10px 0 0;flex-shrink:0;height:auto;display:flex;flex-direction:column;padding:10px 12px;gap:6px;overflow:hidden;min-height:0;}
.enc-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.15em;color:var(--dim);margin-bottom:2px;}
.enc-body{flex:1;display:flex;flex-direction:column;gap:6px;overflow:hidden;}
.draft-row{display:flex;gap:8px;justify-content:center;}
.dc{flex:1;max-width:160px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .18s;}
.dc:hover{border-color:var(--glow);background:var(--card-h);box-shadow:0 0 10px rgba(96,64,160,.3);}
.dc.cant{opacity:.35;pointer-events:none;}
.di{font-size:26px;margin-bottom:4px;}.dn{font-family:'Cinzel',serif;font-size:8px;font-weight:700;letter-spacing:.05em;margin-bottom:2px;}
.dd{font-size:8px;color:var(--dim);line-height:1.4;margin-bottom:4px;}.dp{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);}
.dialogue{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text);line-height:1.6;font-style:italic;}
.dlg-name{font-family:'Cinzel',serif;font-size:10px;font-weight:700;font-style:normal;color:var(--gold);margin-bottom:3px;}
/* ENEMY BOARD */
.enemy-area{display:flex;gap:10px;align-items:flex-start;}
.enemy-info{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px;}
.enemy-icon{font-size:36px;}.enemy-name{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.1em;}
.enemy-tag{font-size:8px;color:var(--dim);}.enemy-board{flex:1;}
.eboard-row{display:flex;gap:5px;margin-bottom:5px;}
.enc-row-label{font-family:'Cinzel',serif;font-size:7px;writing-mode:vertical-rl;transform:rotate(180deg);width:10px;flex-shrink:0;color:var(--dim);}
/* BATTLE */
.battle-status{display:flex;align-items:center;gap:10px;}
.timer-box{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--gold);min-width:60px;}
.fatigue-wrap{flex:1;}.fatigue-track{height:5px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.fatigue-fill{height:100%;background:linear-gradient(90deg,#e06020,#ff2020);transition:width .3s;}
.fl{font-family:'Cinzel',serif;font-size:7px;color:var(--fatigue);letter-spacing:.1em;margin-bottom:1px;}
.battle-log{background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:6px;padding:5px 7px;height:64px;overflow-y:auto;font-size:9px;line-height:1.7;}
.battle-log::-webkit-scrollbar{width:3px;}.battle-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.lt{color:rgba(160,120,255,.5);margin-right:4px;}.ld{color:#e85050;}.lh{color:#50e080;}.ls{color:var(--shield);}.la{color:var(--act);}.lb{color:var(--fatigue);font-weight:700;}.lx{color:var(--dim);font-style:italic;}
/* TYPE / SKILL PICK */
.type-opts,.skill-opts{display:flex;gap:8px;justify-content:center;}
.to,.sk-card{flex:1;max-width:160px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .18s;}
.to:hover,.sk-card:hover{border-color:var(--glow);box-shadow:0 0 10px rgba(96,64,160,.3);}
.ti{font-size:20px;margin-bottom:4px;}.tn{font-family:'Cinzel',serif;font-size:8px;font-weight:700;letter-spacing:.05em;margin-bottom:2px;}.td{font-size:8px;color:var(--dim);line-height:1.3;}
.sk-icon{font-size:18px;margin-bottom:3px;}
.sk-name{font-family:'Cinzel',serif;font-size:8px;font-weight:700;letter-spacing:.05em;margin-bottom:2px;}
.sk-desc{font-size:8px;color:var(--dim);line-height:1.3;margin-bottom:4px;}
.sk-rarity{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;}
.rarity-beginner{color:#80c080;}.rarity-intermediate{color:#4080e0;}.rarity-advanced{color:#c060e0;}.rarity-mastered{color:#f0a020;}
/* WILD PICK */
.wild-pick{display:flex;gap:8px;justify-content:center;}
.wp{flex:1;max-width:160px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:all .18s;}
.wp:hover{border-color:#50c050;box-shadow:0 0 10px rgba(64,160,64,.3);}
.wpi{font-size:24px;margin-bottom:3px;}.wpn{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.05em;margin-bottom:2px;}.wpd{font-size:8px;color:var(--dim);line-height:1.3;}
/* RESULT */
.result-enc{text-align:center;padding:20px;}
.re-title{font-family:'Cinzel',serif;font-size:26px;font-weight:900;letter-spacing:.15em;margin-bottom:6px;}
.re-win{color:#50e080;}.re-lose{color:#e84040;}.re-flawless{color:var(--gold);text-shadow:0 0 20px rgba(240,192,64,.8),0 0 40px rgba(240,192,64,.4);}
.re-sub{color:var(--dim);font-size:12px;margin-bottom:16px;line-height:1.6;}
/* DAY TRACK */
.day-track{background:rgba(10,8,18,.8);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:4px 12px;display:flex;align-items:center;gap:0;overflow-x:auto;overflow-y:hidden;flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch;height:52px;}
.day-track::-webkit-scrollbar{display:none;}
.track-node{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:all .2s;position:relative;z-index:1;flex-shrink:0;}
.track-node.done .node-stamp{opacity:.5;border-color:var(--border);}
.track-node.done .node-stamp::after{content:'✓';position:absolute;top:-4px;right:-4px;font-size:9px;color:#50e080;background:var(--bg);border-radius:50%;padding:1px;}
.track-node.current .node-stamp{border-color:var(--gold);box-shadow:0 0 12px rgba(240,192,64,.4);animation:nodepulse 1.5s ease infinite;}
.track-node.locked .node-stamp{opacity:.25;cursor:default;}.track-node.locked{cursor:default;}
@keyframes nodepulse{0%,100%{box-shadow:0 0 8px rgba(240,192,64,.3)}50%{box-shadow:0 0 18px rgba(240,192,64,.6)}}
.node-stamp{width:32px;height:32px;border-radius:50%;background:var(--panel);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;position:relative;transition:all .2s;}
.node-label{font-family:'Cinzel',serif;font-size:5.5px;letter-spacing:.06em;color:var(--dim);white-space:nowrap;}
.track-node.current .node-label{color:var(--gold);}
.track-connector{flex:1;height:2px;background:var(--border);min-width:16px;max-width:40px;margin-top:-22px;position:relative;z-index:0;}
.track-connector.done-conn{background:rgba(80,224,128,.3);}
/* PLAYER SECTION */
.player-section{background:var(--panel);border:1px solid var(--border);border-radius:0 0 10px 10px;border-top:none;padding:8px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;height:340px;}
.player-header{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.zorp-mini{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:55px;}
.zorp-icon{font-size:22px;filter:drop-shadow(0 0 8px rgba(64,192,255,.4));animation:breathe 3s ease-in-out infinite;}
@keyframes breathe{0%,100%{filter:drop-shadow(0 0 6px rgba(64,192,255,.3))}50%{filter:drop-shadow(0 0 14px rgba(64,192,255,.7))}}
.zorp-name{font-family:'Cinzel',serif;font-size:9px;font-weight:900;letter-spacing:.1em;}
.type-badge{padding:2px 8px;border-radius:10px;font-family:'Cinzel',serif;font-size:7px;font-weight:700;letter-spacing:.1em;border:1px solid;}
.type-pot{background:rgba(64,192,255,.1);border-color:var(--potential);color:var(--potential);}
.skill-panel{flex:1;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;}
.sp-title{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.12em;color:var(--dim);margin-bottom:4px;}
.sp-svg{width:100%;height:70px;}
.board-area{display:flex;flex-direction:column;gap:4px;}
.board-row{display:flex;align-items:center;gap:4px;}
.rl{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.07em;writing-mode:vertical-rl;transform:rotate(180deg);width:11px;flex-shrink:0;}
.rl.f{color:var(--front);}.rl.b{color:var(--back);}
.slots{display:flex;gap:4px;flex:1;}
.swap-hint{font-size:9px;color:var(--dim);font-style:italic;text-align:right;}
/* ITEM CARD */
.ic{flex:1;min-width:0;aspect-ratio:1;border-radius:7px;border:1px solid var(--border);background:var(--card);position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.ic:hover:not(.locked){border-color:var(--glow);}
.ic.sel,.ecard.sel{border-color:var(--sel)!important;box-shadow:0 0 10px rgba(255,224,64,.35);}
.ic.locked{background:rgba(15,10,22,.5);border-style:dashed;opacity:.3;cursor:default;}
.ic.broken-c{background:var(--broken-bg);border-color:var(--broken-b);}
.ic.empty-s{border-style:dashed;opacity:.45;}
.card-df{position:absolute;inset:0;background:rgba(232,64,64,.28);z-index:5;opacity:0;pointer-events:none;border-radius:7px;transition:opacity .1s;}
.card-hf{position:absolute;inset:0;background:rgba(80,224,128,.18);z-index:5;opacity:0;pointer-events:none;border-radius:7px;transition:opacity .1s;}
.ci{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:4px 3px 14px;z-index:2;}
.cicon{font-size:32px;line-height:1;}.cname{font-family:'Cinzel',serif;font-size:6px;font-weight:700;text-align:center;line-height:1.2;}
.ctag{font-size:5px;color:var(--dim);font-style:italic;}.cstat{font-size:6px;color:var(--gold);font-family:'Cinzel',serif;}
.cshield{font-size:6px;color:var(--shield);font-family:'Cinzel',serif;}
.cbars{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:0 2px 2px;display:flex;flex-direction:column;gap:1px;}
.bt{height:4px;background:rgba(0,0,0,.5);border-radius:2px;overflow:hidden;}
.bf{height:100%;border-radius:2px;}
.hbf{background:linear-gradient(90deg,#30b060,var(--hp));}.sbf{background:linear-gradient(90deg,#2080c0,var(--shield));}.abf{background:linear-gradient(90deg,#6030c0,var(--act));}
.cbo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(100,80,120,.3);z-index:3;}
.clock{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--border);}
/* ENEMY CARDS */
.ecard{width:80px;height:80px;border-radius:6px;border:1px solid var(--border);background:var(--card);position:relative;overflow:hidden;flex-shrink:0;}
.ecard.ebroken{background:var(--broken-bg);border-color:var(--broken-b);}
.eci{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px 2px 12px;}
.eicon{font-size:22px;}.ename{font-family:'Cinzel',serif;font-size:6px;font-weight:700;text-align:center;}
.etag{font-size:5px;color:var(--dim);}
.ebrk{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(100,80,120,.3);}
.ebars{position:absolute;bottom:0;left:0;right:0;padding:0 2px 2px;display:flex;flex-direction:column;gap:1px;}
/* BUTTONS */
.btn{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.08em;padding:6px 14px;border-radius:5px;border:1px solid;cursor:pointer;transition:all .18s;}
.btn-p{background:rgba(80,40,140,.25);border-color:var(--glow);color:var(--text);}
.btn-p:hover:not(:disabled){background:rgba(80,40,140,.45);box-shadow:0 0 8px rgba(96,64,160,.35);}
.btn-d{background:rgba(160,30,30,.2);border-color:var(--honor-red);color:var(--honor-red);}
.btn-d:hover:not(:disabled){background:rgba(160,30,30,.35);}
.btn:disabled{opacity:.3;cursor:default;pointer-events:none;}
.btn-row{display:flex;gap:6px;justify-content:center;margin-top:8px;}
/* NOTIF */
.notif{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-6px);background:var(--panel);border:1px solid var(--glow);border-radius:7px;padding:6px 16px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.04em;z-index:300;opacity:0;transition:all .22s;pointer-events:none;}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0);}
.tree-tip{position:fixed;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:7px 10px;z-index:400;pointer-events:none;opacity:0;transition:opacity .12s;max-width:190px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.tree-tip.show{opacity:1;}
.tree-tip-name{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:var(--text);margin-bottom:2px;}
.tree-tip-sub{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.08em;margin-bottom:3px;}
.tree-tip-desc{font-size:8px;color:var(--dim);line-height:1.4;}
/* STATUS EFFECTS */
.sts{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;min-height:8px;margin-top:1px;}
.st-pill{font-size:5.5px;padding:1px 3px;border-radius:3px;font-family:'Cinzel',serif;line-height:1.5;white-space:nowrap;}
.st-haste{background:rgba(240,192,64,.2);color:#f0c040;border:1px solid rgba(240,192,64,.5);}
.st-slow{background:rgba(64,160,255,.2);color:#60b8ff;border:1px solid rgba(64,160,255,.5);}
.st-burn{background:rgba(255,120,40,.2);color:#ff8030;border:1px solid rgba(255,120,40,.5);}
.st-poison{background:rgba(80,220,80,.2);color:#50e060;border:1px solid rgba(80,220,80,.5);}
@keyframes burnpulse{0%,100%{box-shadow:inset 0 0 0 1px rgba(255,120,40,0)}50%{box-shadow:inset 0 0 0 1px rgba(255,120,40,.7),0 0 8px rgba(255,120,40,.3)}}
@keyframes poisonpulse{0%,100%{box-shadow:inset 0 0 0 1px rgba(80,220,80,0)}50%{box-shadow:inset 0 0 0 1px rgba(80,220,80,.7),0 0 8px rgba(80,220,80,.3)}}
.ic.burning{animation:burnpulse 1s ease infinite;}
.ic.poisoned{animation:poisonpulse 1.2s ease infinite;}
.ecard.burning{animation:burnpulse 1s ease infinite;}
.ecard.poisoned{animation:poisonpulse 1.2s ease infinite;}
.dc-info{font-size:8px;color:var(--dim);cursor:pointer;margin-top:3px;padding:1px 4px;border-radius:3px;border:1px solid var(--border);}
.dc-info:hover{color:var(--text);border-color:var(--glow);}
.item-info-panel{position:fixed;top:48px;left:0;right:0;z-index:200;padding:0 16px;pointer-events:none;}
.iip-inner{max-width:960px;margin:0 auto;background:var(--panel);border:1px solid var(--border);border-radius:0 0 10px 10px;border-top:none;padding:8px 14px 10px;pointer-events:all;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.iip-header{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.iip-icon{font-size:18px;}
.iip-name{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text);flex:1;}
.iip-rarity{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;padding:2px 6px;border-radius:4px;}
.iip-rarity-beginner{background:rgba(96,160,96,.15);color:#60a060;border:1px solid rgba(96,160,96,.3);}
.iip-rarity-intermediate{background:rgba(64,112,192,.15);color:#4070c0;border:1px solid rgba(64,112,192,.3);}
.iip-rarity-advanced{background:rgba(144,80,176,.15);color:#9050b0;border:1px solid rgba(144,80,176,.3);}
.iip-rarity-mastered{background:rgba(192,120,32,.15);color:#c07820;border:1px solid rgba(192,120,32,.3);}
.iip-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0 2px;line-height:1;margin-left:4px;}
.iip-close:hover{color:var(--text);}
.iip-meta{font-family:'Cinzel',serif;font-size:8px;color:var(--dim);margin-bottom:4px;letter-spacing:.04em;}
.iip-desc{font-size:10px;color:var(--text);line-height:1.5;margin-bottom:3px;}
.iip-flavor{font-size:9px;color:var(--dim);font-style:italic;margin-bottom:5px;}
.iip-status{display:flex;gap:5px;flex-wrap:wrap;}
.iip-stat{font-size:8px;padding:2px 6px;border-radius:3px;font-family:'Cinzel',serif;}
.iip-burn{background:rgba(255,112,48,.15);color:#ff7030;}
.iip-poison{background:rgba(80,224,80,.15);color:#50e050;}
.iip-haste{background:rgba(240,192,64,.15);color:#f0c040;}
.iip-slow{background:rgba(64,160,255,.15);color:#40a0ff;}
.tome-modal{position:fixed;inset:0;background:rgba(10,8,18,.85);z-index:500;display:flex;align-items:center;justify-content:center;}
.tome-inner{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px 28px;max-width:360px;width:90%;text-align:center;display:flex;flex-direction:column;gap:12px;box-shadow:0 12px 40px rgba(0,0,0,.6);}
.tome-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--gold);}
.tome-body{font-size:11px;color:var(--dim);line-height:1.7;font-style:italic;}
.tome-reaction{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.06em;color:var(--text);}
.ctag-technique{color:#c0a0ff;font-style:normal;font-family:'Cinzel',serif;font-size:6px;letter-spacing:.08em;}
.ctag-relic{color:#e0a040;font-style:normal;font-family:'Cinzel',serif;font-size:6px;letter-spacing:.08em;}
.iip-sell-row{margin-top:6px;display:none;}
.iip-sell-btn{font-family:'Cinzel',serif;font-size:8px;font-weight:700;letter-spacing:.06em;padding:4px 12px;background:rgba(220,60,60,.15);color:#dc4040;border:1px solid rgba(220,60,60,.4);border-radius:5px;cursor:pointer;}
.iip-sell-btn:hover{background:rgba(220,60,60,.3);border-color:rgba(220,60,60,.7);}
@media(max-width:600px){.item-info-panel{top:auto;bottom:0;}.iip-inner{border-radius:10px 10px 0 0;border-top:1px solid var(--border);border-bottom:none;}}
.battle-log-popup{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:90%;max-width:400px;z-index:300;}
.blp-inner{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.blp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}

<script>
// ============================================================
// SKILL TREE ARCHITECTURE

// Which nodes are unlocked (filled with a skill)
let treeState = {}; // nodeId → skill object or null
TREE_NODES.forEach(n => treeState[n.id] = null);

// SKILL POOLS by rarity

    {id:'phoenix_downed',name:'Phoenix Downed',icon:'🕊️',desc:'Once per battle, when an item would break, it is restored to 50% HP instead.',rarity:'advanced'},
    {id:'echo',name:'Echo',icon:'🔊',desc:'When a front row player item breaks, the back row item directly behind it activates immediately.',rarity:'advanced'},
    {id:'waterproof',name:'Waterproof',icon:'🧥',desc:'Your items cannot be Wet (Slowed).',rarity:'advanced'},
    {id:'grounded',name:'Grounded',icon:'⛺',desc:'Enemy items cannot be Jolted (Hasted).',rarity:'advanced'},
    {id:'immunity',name:'Immunity',icon:'💊',desc:'Poison ticks 50% slower on your items.',rarity:'advanced'},
    {id:'asbestos',name:'Asbestos',icon:'🧱',desc:'Burn stacks on your items are reduced by 2 extra each tick.',rarity:'advanced'},
    {id:'shatter',name:'Shatter',icon:'💥',desc:'When plating is applied to enemy items, it is halved.',rarity:'advanced'},
    {id:'war_chest',name:'War Chest',icon:'💰',desc:'Each battle starts with bonus damage equal to half your current gold.',rarity:'advanced'},
    {id:'desperation',name:'Desperation',icon:'😤',desc:'When a player item breaks, all remaining player items gain +50% effects for this battle.',rarity:'advanced'},
    {id:'predator',name:'Predator',icon:'🐺',desc:'Once 3 enemy items break this battle, all your effects are ×1.5 for the rest of the battle.',rarity:'advanced'},
    {id:'flow_state',name:'Flow State',icon:'🌀',desc:'After 20 seconds of battle have elapsed, all your effects are ×1.15 permanently.',rarity:'advanced'},
  ],
  mastered:[
    {id:'apotheosis',name:'Apotheosis',icon:'✨',desc:'Unupgraded items are treated as Mastered tier this battle. A reason to pivot late.',rarity:'mastered'},
    {id:'fizzle',name:'Fizzle',icon:'💨',desc:'At battle start, halve the effectAmt of all untargetable enemy passive items.',rarity:'mastered'},
  ],
};

// Active skills applied to player
let activeSkills=[];

// Battle-scoped state (initialized by initBattleState before each battle)
let battleState={};

function getSkillMods(){
  const m={
    maxHpBonus:0,
    speedMult:1.0,
    backSpeedMult:1.0,
    dmgBonus:0,
    platingMult:1.0,
    fatigueMult:1.0,
    globalMult:1.0,
    slot2SpeedMult:1.0,
    slot5SpeedMult:1.0,
  };
  activeSkills.forEach(sk=>{
    if(sk.id==='potential')      m.globalMult=Math.max(m.globalMult,1.25);
    if(sk.id==='thick_fur')      m.maxHpBonus+=20;
    if(sk.id==='quick_reflexes') m.speedMult*=0.90;
    if(sk.id==='scrappy')        m.dmgBonus+=6;
    if(sk.id==='epicenter'){     m.slot2SpeedMult*=0.75;m.slot5SpeedMult*=0.75;}
    if(sk.id==='assembled'&&battleState.assembledActive) m.speedMult*=0.82;
    // Advanced
    if(sk.id==='endurance')      m.fatigueMult*=0.6;
    if(sk.id==='flow_state'&&battleState.flowStateActive) m.globalMult*=1.15;
    if(sk.id==='predator'&&battleState.predatorActive)    m.globalMult*=1.5;
    if(sk.id==='war_chest')      m.dmgBonus+=(battleState.warChestBonus||0);
  });
  return m;
}

function initBattleState(){
  battleState={
    momentumBonus:0,
    fatigueDamageMultiplier:1,
    totalSidePlating:0,
    burnApplicationsToEnemy:0,
    fireworksThreshold:6,
    outbreakTriggered:false,
    slowProcsThisBattle:0,
    floodTriggered:false,
    wetDurationMult:1,
    joltCumulativeMs:0,
    thunderFired:false,
    poisonApplicationsToEnemy:0,
    phoenixDownAvailable:true,
    resilienceUsed:false,
    crescendoCount:0,
    crescendoReady:false,
    benedictionMs:0,
    kickstartCount:0,
    frictionCount:0,
    assembledActive:false,
    dualityApplied:false,
    // Advanced skills
    ironHideActive:activeSkills.some(s=>s.id==='iron_hide'),
    ironHideExpired:false,
    flowStateActive:false,
    predatorActive:false,
    warChestBonus:activeSkills.some(s=>s.id==='war_chest')?Math.max(0,Math.floor((G.gold||0)/2)):0,
  };
}

function registerSkillHandlers(){
  // Skill handlers registered here when new skills are implemented
  activeSkills.forEach(sk=>{
    // placeholder — handlers added per skill in future prompts
  });
}
function getNodeById(id){ return TREE_NODES.find(n=>n.id===id); }
function isNodeUnlockable(id){
  const node=getNodeById(id); if(!node)return false;
  if(!node.parent)return true; // head always unlockable
  return treeState[node.parent]!==null; // parent must be filled
}
function getAvailableNodes(){
  return TREE_NODES.filter(n=>{
    if(n.id==='head')return false;
    if(n.id==='front_shoulder'&&G.type!==null)return false;
    return treeState[n.id]===null&&isNodeUnlockable(n.id);
  });
}
function drawTreeLines(){
  const g=document.getElementById('treeLines'); if(!g)return; g.innerHTML='';
  // Node center positions matching SVG
  const pos={head:[20,28],front_shoulder:[70,28],back_shoulder:[150,28],front_foot:[70,58],back_foot:[150,58],tail_tip:[265,8]};
  TREE_NODES.forEach(n=>{
    if(!n.parent)return;
    const [x1,y1]=pos[n.parent]||[0,0]; const [x2,y2]=pos[n.id]||[0,0];
    const filled=treeState[n.id]!==null; const parentFilled=treeState[n.parent]!==null;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y1);line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('stroke',filled?'rgba(160,96,255,.6)':parentFilled?'rgba(96,64,160,.4)':'rgba(58,47,80,.4)');
    line.setAttribute('stroke-width','1.5');
    g.appendChild(line);
  });
}
function renderSkillTree(){
  drawTreeLines();
  TREE_NODES.forEach(n=>{
    const g=document.getElementById('tn-'+n.id); if(!g)return;
    const circ=g.querySelector('circle'); const txt=g.querySelector('text');
    const skill=treeState[n.id];
    const available=isNodeUnlockable(n.id)&&treeState[n.id]===null&&n.id!=='head';
    const rarityColors={prestige:'#8040c0',beginner:'#60a060',intermediate:'#4070c0',advanced:'#9050b0',mastered:'#c07820'};
    if(skill){
      circ.setAttribute('fill','rgba(96,48,160,.35)');
      circ.setAttribute('stroke',rarityColors[n.rarity]||'#6040a0');
      txt.textContent=skill.icon||'✦';txt.setAttribute('font-size','8');txt.setAttribute('fill','#e8d8ff');
      if(n.id==='tail_tip'){
        circ.setAttribute('r','10');
        circ.setAttribute('stroke','#c07820');
        circ.setAttribute('fill','rgba(192,120,32,.25)');
      }
    }else if(available){
      circ.setAttribute('fill','rgba(60,40,100,.3)');
      circ.setAttribute('stroke','rgba(96,64,160,.5)');
      txt.setAttribute('fill','rgba(96,64,160,.6)');
    }else{
      circ.setAttribute('fill','#1a1525');
      circ.setAttribute('stroke','#3a2f50');
      txt.setAttribute('fill','#2a1040');
    }
    g.style.cursor='pointer';
    g.onmouseenter=(e)=>showTreeTip(n,e);
    g.onmouseleave=()=>hideTreeTip();
  });
}

// STATE
// ============================================================

let bannedTypes=[];
let rivalRecord={wins:parseInt(localStorage.getItem('rivalWins')||'0'),losses:parseInt(localStorage.getItem('rivalLosses')||'0')};
let lastOfferedTypes=[];
let board={front:[null,null,null],back:[null,null,null]};
let enemyBoard={front:[null,null,null],back:[null,null,null]};
let pendingSecondWindBuff=null;
let pendingSecondWindRow=null;
let pendingSecondWindIdx=null;
let secondWindClarityPending=false;

const DAY1_NODES=[{id:'mom',icon:'🎁',label:"MOM'S GIFT"},{id:'shop1',icon:'🏪',label:'MARKET'},{id:'wild',icon:'⚔️',label:'WILD FIGHT'},{id:'shop2',icon:'🏪',label:'ROAD STALL'},{id:'rival',icon:'🏆',label:'RIVAL'}];
const DAY2_NODES=[{id:'shop1',icon:'🏪',label:'MARKET'},{id:'wild',icon:'⚔️',label:'WILD FIGHT'},{id:'shop2',icon:'🏪',label:'ROAD STALL'},{id:'rival',icon:'🏆',label:'TRAINER'}];
function getDayNodes(){return(G.rivalDefeated&&G.day>1)?DAY2_NODES:DAY1_NODES;}

// ITEMS
// ============================================================
let battleSpeed=1;

  return{id:key+'_'+Math.random().toString(36).slice(2,7),itemKey:key,name,icon,tag,maxHp,baseMaxHp:maxHp,actMs,baseActMs:actMs,

}

const UPGRADE_NAMES=['','UPGRADED','ADVANCED','MASTERED'];

function getTechniqueReading(key){
  const readings={
    solidarity:'You read to '+G.monsterName+' of the one who stood in the cold so another could be warm, who gave without keeping count, who asked for nothing back...',
    patience:'You read to '+G.monsterName+' of the one who rolled the boulder up the hill for eternity and found himself, whole...',
  };
  return readings[key]||'You read to '+G.monsterName+' from the tome...';
}

function getTechniqueReaction(key){
  const reactions={
    solidarity:G.monsterName+' leans into you slightly.',
    patience:G.monsterName+' feels oddly at ease.',
  };
  return reactions[key]||G.monsterName+' feels different.';
}

const PACIFIST_ITEMS={

  solidarity:()=>{
    const item=makeItem('solidarity','Solidarity','📜','Technique',0,0,
      'When a left or right neighbor is hit, deal 5 damage to the attacker.',
      null,4,null,5,'technique','beginner');
    item.isTechnique=true;

    item.flavorText='It feels every blow.';
    item.stats=[{icon:'⚔️',value:(i)=>i.effectAmt||5,cls:'dmg'}];
    item.sellPopup={
      title:'You close the Tome of Solidarity.',
      body:'Maturity costs something.',
      reaction:''
    };
    item.handleEvent=(event)=>{
      if(event.type!=='DAMAGE_RECEIVED')return;
      if(event.side!==item._side)return;
      const neighbors=getNeighbors(item);

function rollRarity(day){

  for(const[r,weight]of Object.entries(w)){for(let i=0;i<weight;i++)pool.push(r);}

}
function getItemsOfRarity(rarity,typeFilter){
  const all={...ITEMS,...TYPED_ITEMS,...PACIFIST_ITEMS,...HEADBUTT_ITEMS,...BURN_ITEMS,...WATER_ITEMS,...ELECTRIC_ITEMS,...STEEL_ITEMS,...POISON_ITEMS};

    if(rarity==='mastered')return getItemsOfRarity('advanced',typeFilter);
    if(rarity==='advanced')return getItemsOfRarity('intermediate',typeFilter);

}

  item.actMs=item.baseActMs;

  if(item.baseHitCount!==null&&item.baseHitCount!==undefined){

}

function checkAndBreak(item,side){
  if(item.hp<=0&&!item.broken){
    // Iron Hide — player items immune to breaking during first 10 seconds
    if(side==='player'&&battleState.ironHideActive){
      item.hp=1;
      log('s','🦏 Iron Hide saves '+item.name+'!');
      return;
    }
    // Phoenix Downed — once per battle, restore to 50% HP instead of breaking
    if(side==='player'&&battleState.phoenixDownAvailable&&activeSkills.some(s=>s.id==='phoenix_downed')){
      battleState.phoenixDownAvailable=false;
      item.hp=Math.max(1,Math.floor(item.maxHp*0.5));
      log('h','🕊️ Phoenix Downed! '+item.name+' restored to 50% HP!');
      return;
    }
    // Last Stand — each item survives breaking once per battle at 1 HP
    if(side==='player'&&!item._lastStandApplied&&activeSkills.some(s=>s.id==='last_stand')){
      item._lastStandApplied=true;
      item.hp=1;
      log('s','⚔️ Last Stand! '+item.name+' survives at 1 HP!');
      return;
    }
    // Fire ITEM_BROKEN before marking broken — handlers fire while item still exists
    fireEvent({type:'ITEM_BROKEN',item:item,side:side,value:0,source:null});
    item.broken=true;
    if(item.onBreak)item.onBreak(item);
    log('b',item.name+' BROKEN!');
    // Desperation — when player item breaks, boost all remaining player items' effects ×1.5
    if(side==='player'&&activeSkills.some(s=>s.id==='desperation')){
      [...board.front,...board.back].forEach(i=>{
        if(i&&!i.broken){
          i.effectAmt=Math.round((i.effectAmt||0)*1.5);
          i.baseEffect=Math.round((i.baseEffect||0)*1.5);
        }
      });
      log('s','😤 Desperation! Surviving items gain +50% effects!');
    }
    // Echo — if front row item breaks, the back row item directly behind it activates
    if(side==='player'&&activeSkills.some(s=>s.id==='echo')){
      const n=getNeighbors(item);
      if(n&&n.row==='front'&&n.behind&&!n.behind.broken&&n.behind.effectFn){
        log('a','🔊 Echo! '+n.behind.name+' activates!');
        n.behind.effectFn('player',n.behind.effectAmt||n.behind.baseEffect||0,n.behind);
        fireEvent({type:'ITEM_ACTIVATED',item:n.behind,side:'player',value:n.behind.effectAmt||0,source:null});
      }
    }
  }
}
function applyDmgTo(target,dmg,src,side){
  // Training Dummy — hitCount item, absorbs damage
  if(target.hitCount!==undefined&&target.hitCount!==null){
    target.hitCount--;
    log('d','Hit absorbed by '+target.name+' ('+target.hitCount+' hits remaining)');
    if(target.hitCount<=0){
      fireEvent({type:'ITEM_BROKEN',item:target,side:side,value:0,source:null});
      target.broken=true;
      if(target.onBreak)target.onBreak(target);
      log('b',target.name+' BROKEN!');
    }
    return; // damage absorbed, nothing passes through
  }
  const isPlayer=side==='player';
  // Resilience — first item hit each battle gains +70 plating
  if(isPlayer&&!battleState.resilienceUsed&&activeSkills.some(s=>s.id==='resilience')){
    target.shield=(target.shield||0)+70;
    target.maxShield=Math.max(target.maxShield||0,target.shield);
    battleState.resilienceUsed=true;
    log('s','Resilience! '+target.name+' gains +70 plating');
  }
  let r=dmg;
  if(target.shield>0){const a=Math.min(target.shield,r);target.shield-=a;r-=a;if(a>0)log('s',src+'→'+target.name+' plating -'+a);}
  if(r>0){
    target.hp=Math.max(0,target.hp-r);
    log('d',src+'→'+target.name+' -'+r+' ('+target.hp+'/'+target.maxHp+')');
    flashCard(target.id,side,'d');
    fireEvent({type:'DAMAGE_DEALT',item:target,side:side,value:r,source:null});
    fireEvent({type:'DAMAGE_RECEIVED',item:target,side:side,value:r,rawValue:dmg,source:null});
    if(target.hp<=0){
      checkAndBreak(target,side);
    }
  }
}
function dealDmg(side,base,src){
  // side = target side. side==='enemy' means player is attacking → apply player mods
  const attackerMods=side==='player'?null:getSkillMods();
  let dmg=Math.round(base);
  if(attackerMods){dmg=Math.round(dmg*attackerMods.globalMult+attackerMods.dmgBonus+battleState.momentumBonus);battleState.momentumBonus=0;}
  const b=getBoard(side);const fh=b.front.some(targetable);const pool=fh?b.front:b.back;
  let t=null;for(let i=0;i<pool.length;i++){if(targetable(pool[i])){t=pool[i];break;}}
  if(!t)return;applyDmgTo(t,dmg,src,side);
}
function dealDmgRandom(side,base,src){

function healItem(side,amount,src){
  const alive=aliveItems(side).filter(i=>i&&i.maxHp>0&&i.hp<i.maxHp);
  if(!alive.length)return;
  const t=alive.reduce((a,b)=>(a.hp/a.maxHp)<(b.hp/b.maxHp)?a:b);
  const actual=Math.min(t.maxHp-t.hp,Math.round(amount*(side==='player'?potMult():1)));
  if(actual<=0)return;
  t.hp+=actual;log('h',src+' heals '+t.name+' +'+actual);flashCard(t.id,side,'h');
  fireEvent({type:'ITEM_HEALED',item:t,side:side,value:actual,source:null});
}
function healAll(side,amount,src){
  const mult=side==='player'?potMult():1;
  aliveItems(side).filter(i=>i.maxHp>0).forEach(item=>{const actual=Math.min(item.maxHp-item.hp,Math.round(amount*mult));item.hp+=actual;});

}
function applyShield(side,amount,src,targetItem){
  const alive=aliveItems(side).filter(i=>i&&i.maxHp>0);if(!alive.length)return;
  const mods=side==='player'?getSkillMods():{globalMult:1,platingMult:1};

  if(side==='player'&&activeSkills.some(s=>s.id==='fortified')){
    actual+=Math.round(7*mods.globalMult);
  }
  // Shatter — halve plating applied to enemy items
  if(side==='enemy'&&activeSkills.some(s=>s.id==='shatter')){
    actual=Math.floor(actual/2);
  }
  const t=targetItem&&!targetItem.broken?targetItem:alive.reduce((a,b)=>(a.hp/a.maxHp)<(b.hp/b.maxHp)?a:b);
  t.shield=(t.shield||0)+actual;t.maxShield=Math.max(t.maxShield||0,t.shield);
  if(side==='player')battleState.totalSidePlating+=actual;
  log('s',src+' plates '+t.name+' +'+actual);
}

  });
}

function renderStatRow(stats,item){
  if(!stats||!stats.length)return'';
  return'<div class="stat-row">'+stats.map(s=>{
    const cls='stat-pip stat-'+(s.cls||'dmg');
    const val=typeof s.value==='function'?s.value(item):s.value;
    return'<span class="'+cls+'">'+s.icon+' '+val+'</span>';
  }).join('')+'</div>';
}
function getItemIcon(item){
  const key=item.itemKey||item.id||'';
  const broken=item.broken||false;
  const img=(src)=>'<img src="'+src+'" style="width:54px;height:54px;object-fit:contain;display:block;margin:0 auto"/>';
  if(key==='worn_locket'&&WORN_LOCKET_GOLD.startsWith('https://')){
    return img(broken?WORN_LOCKET_SILVER:WORN_LOCKET_GOLD);
  }
  if(key==='heavy_walking_stick'&&HEAVY_WALKING_STICK.startsWith('https://')){
    return img(broken?HEAVY_WALKING_STICK_BROKEN:HEAVY_WALKING_STICK);
  }
  if(key==='sharpening_stone'&&SHARPENING_STONE.startsWith('https://')){
    return img(broken?SHARPENING_STONE_BROKEN:SHARPENING_STONE);
  }
  return'<span>'+(item.icon||'?')+'</span>';
}
function renderBoard(){renderRow('frontSlots',board.front,'front',maxFrontSlots());renderRow('backSlots',board.back,'back',maxBackSlots());}
function renderRow(cid,slots,rowType,maxSlots){
  const el=document.getElementById(cid);el.innerHTML='';
  const max=maxSlots;
  slots.forEach((item,idx)=>{
    const card=document.createElement('div');card.className='ic';
    card.dataset.row=rowType;card.dataset.idx=idx;
    if(idx>=max){card.classList.add('locked');card.innerHTML='<div class="clock">🔒</div>';}
    else if(!item){card.classList.add('empty-s');card.innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--border);font-family:Cinzel,serif;font-size:7px;letter-spacing:.1em">EMPTY</div>';card.onclick=()=>{if(G.battleRunning)return;if(G.selectedSlot!==null){handleSlotClick(rowType,idx,null);hideItemInfo();}};}
    else if(item.broken){card.classList.add('broken-c');card.dataset.itemId=item.id;card.innerHTML='<div class="cbo">✕</div><div class="ci" style="opacity:.25"><div class="cicon" id="cicon-'+item.id+'">'+getItemIcon(item)+'</div><div class="cname">'+item.name+'</div></div><div class="card-df"></div>';card.onclick=(e)=>{e.stopPropagation();showItemInfo(item,false,null,null);};}
    else{
      const rarityClass=item.itemRarity?'rarity-'+item.itemRarity:'';
      card.className='ic '+rarityClass;
      if(G.selectedSlot&&G.selectedSlot.row===rowType&&G.selectedSlot.idx===idx)card.classList.add('sel');
      card.dataset.itemId=item.id;
      const hp=item.maxHp>0?(item.hp/item.maxHp*100):100;
      const sh=(item.maxShield>0&&item.shield>0)?(item.shield/item.maxShield*100):0;
      const act=item.actPct||0;
      const hc=hp>60?'#50e080':hp>30?'#e0a030':'#e84040';
      const upgLabel=item.upgradeLevel>0?'<span style="font-size:6px;color:var(--gold)"> ['+UPGRADE_NAMES[item.upgradeLevel]+']</span>':'';
      card.innerHTML='<div class="card-df"></div><div class="card-hf"></div><div class="ci"><div class="cicon" id="cicon-'+item.id+'">'+getItemIcon(item)+'</div>'+renderStatRow(item.stats,item)+'<div class="cname">'+item.name+upgLabel+'</div><div class="ctag'+(item.isTechnique?' ctag-technique':(item.tag==='Relic'?' ctag-relic':''))+'">'+item.tag+'</div>'+(item.maxHp===0&&item.uses!==null?'<div class="cstat" id="cst-'+item.id+'">'+item.uses+'/'+item.maxUses+' uses</div>':'')+'<div class="cshield" id="csh-'+item.id+'" style="'+(item.shield>0?'':'display:none')+'">🛡'+item.shield+'</div><div class="sts" id="sts-'+item.id+'"></div></div><div class="cbars"><div class="bt"><div class="bf sbf" id="sh-'+item.id+'" style="width:'+sh+'%"></div></div>'+(item.maxHp>0?'<div class="bt"><div class="bf hbf" id="hp-'+item.id+'" style="width:'+hp+'%;background:'+hc+'"></div></div>':'')+(item.hitCount!==null?'<div class="hit-counter" style="font-family:Cinzel,serif;font-size:7px;color:var(--gold);text-align:center;padding:1px 0">'+item.hitCount+' hits</div>':'')+'<div class="bt"><div class="bf abf" id="act-'+item.id+'" style="width:'+act+'%"></div></div></div>';
      card.onclick=(e)=>{
        e.stopPropagation();
        if(G.battleRunning){
          // During battle — info panel only, no swap
          showItemInfo(item,false,null,null);
          return;
        }

        // If a different slot is already selected — complete the swap
        if(G.selectedSlot!==null&&
          !(G.selectedSlot.row===rowType&&G.selectedSlot.idx===idx)){
          handleSlotClick(rowType,idx,item);
          showItemInfo(item,true,rowType,idx);
          return;
        }

        // If this item is already selected — deselect and close panel
        if(G.selectedSlot!==null&&
          G.selectedSlot.row===rowType&&G.selectedSlot.idx===idx){
          hideItemInfo();
          return;
        }

        // Fresh click — select this item, open panel, highlight card
        G.selectedSlot={row:rowType,idx:idx};
        showItemInfo(item,true,rowType,idx);
        renderBoard();
      };
    }
    el.appendChild(card);
  });
}

function updateBattleBars(){
  let needRebuild=false;
  [...board.front,...board.back].forEach(item=>{
    if(!item)return;
    const actEl=document.getElementById('act-'+item.id);
    const hpEl=document.getElementById('hp-'+item.id);
    const shEl=document.getElementById('sh-'+item.id);
    const cstEl=document.getElementById('cst-'+item.id);
    const cshEl=document.getElementById('csh-'+item.id);
    if(actEl)actEl.style.width=(item.actPct||0)+'%';
    if(hpEl&&item.maxHp>0){const p=item.hp/item.maxHp*100;hpEl.style.width=p+'%';hpEl.style.background=p>60?'#50e080':p>30?'#e0a030':'#e84040';}
    if(shEl){const sp=item.maxShield>0?item.shield/item.maxShield*100:0;shEl.style.width=sp+'%';}
    if(cstEl&&item.maxHp>0)cstEl.textContent=item.hp+'/'+item.maxHp;
    if(cstEl&&item.hitCount!==null&&item.hitCount!==undefined)cstEl.textContent=item.hitCount+' hits';
    if(cshEl){if(item.shield>0){cshEl.style.display='';cshEl.textContent='🛡'+item.shield;}else{cshEl.style.display='none';}}
    // Update hitCount display
    if(item.hitCount!==null&&item.hitCount!==undefined){
      const card=document.querySelector('.ic[data-item-id="'+item.id+'"]');
      if(card){const hitEl=card.querySelector('.hit-counter');if(hitEl)hitEl.textContent=item.hitCount+' hits';}
    }
    updateStatusDisplay(item,'');
    if(item.broken){const cards=document.querySelectorAll('[data-item-id="'+item.id+'"]');cards.forEach(c=>{if(!c.classList.contains('broken-c'))needRebuild=true;});}
  });
  if(needRebuild)renderBoard();
  // Update custom art icon if item broke this tick
  [...board.front,...board.back].forEach(item=>{
    if(!item)return;
    const iconEl=document.getElementById('cicon-'+item.id);
    if(iconEl){const newIcon=getItemIcon(item);if(iconEl.innerHTML!==newIcon)iconEl.innerHTML=newIcon;}
  });
  if(currentInfoItem)updateItemInfoStatus(currentInfoItem);
}

function handleSlotClick(row,idx,item){
  if(G.battleRunning)return;
  if(G.selectedSlot===null){if(!item)return;G.selectedSlot={row,idx};showNotif(item.name+' selected — click slot to swap');}
  else{
    const from=G.selectedSlot;
    if(from.row===row&&from.idx===idx){G.selectedSlot=null;}
    else{
      const fa=from.row==='front'?board.front:board.back;const ta=row==='front'?board.front:board.back;
      if(idx>=(row==='front'?maxFrontSlots():maxBackSlots())){G.selectedSlot=null;renderBoard();return;}
      const tmp=fa[from.idx];fa[from.idx]=ta[idx];ta[idx]=tmp;G.selectedSlot=null;showNotif('Swapped!');
    }
  }
  renderBoard();
}

function renderTrack(){
  const track=document.getElementById('dayTrack');track.innerHTML='';
  const nodes=getDayNodes();
  nodes.forEach((node,i)=>{
    const state=i<G.dayStep?'done':i===G.dayStep?'current':'locked';
    const tn=document.createElement('div');tn.className='track-node '+state;
    tn.innerHTML='<div class="node-stamp">'+node.icon+'</div><div class="node-label">'+node.label+'</div>';
    if(state==='current')tn.onclick=()=>activateCurrentNode();
    track.appendChild(tn);
    if(i<nodes.length-1){const conn=document.createElement('div');conn.className='track-connector'+(i<G.dayStep?' done-conn':'');track.appendChild(conn);}
  });
  setTimeout(()=>{
    const currentNode=document.querySelector('.track-node.current');
    if(currentNode)currentNode.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },50);
}
function activateCurrentNode(){
  const node=getDayNodes()[G.dayStep];
  if(node.id==='mom')showEncounterShop(0);
  else if(node.id==='shop1')showEncounterShop(1);
  else if(node.id==='wild')showEncounterWildPick();
  else if(node.id==='shop2')showEncounterShop(2);
  else if(node.id==='rival')showEncounterBattle('rival');
}

function setEncTitle(t){document.getElementById('encTitle').textContent=t;}

function showEncounterShop(poolIdx){
  const isMom=poolIdx===0&&!G.rivalDefeated;
  const isLocalStall=poolIdx===2&&G.day===1;
  const isRoadsideStall=poolIdx===2&&G.day>1;
  const isMarket=poolIdx===1;

  shopItemCache={};

  if(isMom){
    if(!G.momGiftGiven){
      setEncTitle("MOM'S FAREWELL GIFT");
      const momKeys=Object.keys(MOM_ITEMS);
      const shuffled=[...momKeys].sort(()=>Math.random()-.5).slice(0,3);

        const t=MOM_ITEMS[key]();shopItemCache[key]=t;
        return '<div class="dc" onclick="buyMomItem(\''+key+'\',true,false)"><div class="di">'+getItemIcon(t)+'</div><div class="dn">'+t.name+'</div><div class="dd">'+t.desc+'</div>'+(t.flavorText?'<div style="font-size:7px;color:var(--dim);font-style:italic;margin-top:2px">'+t.flavorText+'</div>':'')+'<div class="dp">✦ FREE</div><div class="dc-info" onclick="event.stopPropagation();showItemInfo(shopItemCache[\''+key+'\'])">ℹ</div></div>';
      }).join('');
      setEncBody(dialogue+'<div class="draft-row">'+cards+'</div>');
    }else{
      setEncTitle('MOM CHECKS IN');
      const conKeys=Object.keys(MOM_CONSOLATION_ITEMS);
      const shuffled=[...conKeys].sort(()=>Math.random()-.5).slice(0,3);
      const dialogue='<div class="dialogue"><div class="dlg-name">MOM</div>"I told you, you weren\'t ready. Here — wipe the dust off."</div>';
      const cards=shuffled.map(key=>{
        const t=MOM_CONSOLATION_ITEMS[key]();shopItemCache[key]=t;
        return '<div class="dc" onclick="buyMomItem(\''+key+'\',true,true)"><div class="di">'+getItemIcon(t)+'</div><div class="dn">'+t.name+'</div><div class="dd">'+t.desc+'</div>'+(t.flavorText?'<div style="font-size:7px;color:var(--dim);font-style:italic;margin-top:2px">'+t.flavorText+'</div>':'')+'<div class="dp">✦ FREE</div><div class="dc-info" onclick="event.stopPropagation();showItemInfo(shopItemCache[\''+key+'\'])">ℹ</div></div>';
      }).join('');
      setEncBody(dialogue+'<div class="draft-row">'+cards+'</div>'+'<div class="btn-row"><button class="btn btn-d" onclick="skipShop()">SKIP →</button></div>');
    }
    return;
  }

  if(isLocalStall){
    setEncTitle('LOCAL STALL');
    const dialogue='<div class="dialogue"><div class="dlg-name">SHOPKEEPER</div>"So kid, you\'re going off on an adventure? I know exactly what you need."</div>';
    const boardItems=[...board.front,...board.back].filter(Boolean);
    const MOM_KEYS=new Set([...Object.keys(MOM_ITEMS),...Object.keys(MOM_CONSOLATION_ITEMS)]);
    const upgradeKeys=[];
    boardItems.forEach(item=>{
      const key=item.itemKey||item.id;
      if(MOM_KEYS.has(key))return; // exclude Mom items from upgrade pool
      if(item.upgradeLevel<3&&!upgradeKeys.includes(key)){upgradeKeys.push(key);}
    });
    let slots=[];
    if(upgradeKeys.length>0){
      slots=upgradeKeys.slice(0,3);
    }else{
      const ownedKeys=new Set(boardItems.map(i=>i.itemKey||i.id));
      const pool=getItemsOfRarity('beginner',['weapon','armor']).filter(k=>!ownedKeys.has(k));
      slots=[...pool].sort(()=>Math.random()-.5).slice(0,3);
    }
    const cards=slots.map(key=>{
      const f=getItemFactory(key);if(!f)return'';
      const t=f();shopItemCache[key]=t;const can=G.gold>=t.cost;
      const existing=[...board.front,...board.back].find(i=>i&&(i.itemKey===key||i.id===key));
      const label=existing?'⬆ UPGRADE':'NEW';
      return '<div class="dc '+((!can&&t.cost>0)?'cant':'')+'" data-item-cost="'+t.cost+'" onclick="buyItem(\''+key+'\',false)"><div class="di">'+getItemIcon(t)+'</div><div class="dn">'+t.name+'</div><div style="font-size:6px;font-family:Cinzel,serif;color:var(--gold);margin-bottom:2px">'+label+'</div><div class="dd">'+t.desc+'</div><div class="dp">🪙 '+t.cost+'</div></div>';
    }).join('');
    setEncBody(dialogue+'<div class="draft-row">'+cards+'</div><div class="btn-row"><button class="btn btn-d" onclick="skipShop()">✕ LEAVE</button></div>');
    return;
  }

  if(isRoadsideStall){
    setEncTitle('ROADSIDE STALL');
    const slots=generateShopSlots(G.day);
    const hasProvision=slots.some(k=>{const f=getItemFactory(k);return f&&f().itemType==='provision';});
    if(!hasProvision&&slots.length>0){
      const provPool=getItemsOfRarity(rollRarity(G.day),['provision']).filter(k=>!slots.includes(k));
      if(provPool.length)slots[slots.length-1]=provPool[Math.floor(Math.random()*provPool.length)];
    }
    const cards=slots.map(key=>{
      const f=getItemFactory(key);if(!f)return'';
      const t=f();shopItemCache[key]=t;const can=G.gold>=t.cost;
      return '<div class="dc '+((!can&&t.cost>0)?'cant':'')+'" data-item-cost="'+t.cost+'" onclick="buyItem(\''+key+'\',false)"><div class="di">'+getItemIcon(t)+'</div><div class="dn">'+t.name+'</div><div class="dd">'+t.desc+'</div><div class="dp">🪙 '+t.cost+'</div><div class="dc-info" onclick="event.stopPropagation();showItemInfo(shopItemCache[\''+key+'\'])">ℹ</div></div>';
    }).join('');
    setEncBody('<div class="draft-row">'+cards+'</div><div class="btn-row"><button class="btn btn-d" onclick="skipShop()">✕ LEAVE</button></div>');
    return;
  }

  if(isMarket){
    setEncTitle('TOWN MARKET');
    const typeFilter=G.day<=1?['weapon','armor']:null;
    const slots=generateShopSlots(G.day,[],typeFilter);
    const cards=slots.map(key=>{
      const f=getItemFactory(key);if(!f)return'';
      const t=f();shopItemCache[key]=t;const can=G.gold>=t.cost;
      return '<div class="dc '+((!can&&t.cost>0)?'cant':'')+'" data-item-cost="'+t.cost+'" onclick="buyItem(\''+key+'\',false)"><div class="di">'+getItemIcon(t)+'</div><div class="dn">'+t.name+'</div><div class="dd">'+t.desc+'</div><div class="dp">🪙 '+t.cost+'</div><div class="dc-info" onclick="event.stopPropagation();showItemInfo(shopItemCache[\''+key+'\'])">ℹ</div></div>';
    }).join('');
    setEncBody('<div class="draft-row">'+cards+'</div><div class="btn-row"><button class="btn btn-d" onclick="skipShop()">✕ LEAVE</button></div>');
    return;
  }
}
function buyMomItem(key,free,isConsolation){
  const pool=isConsolation?MOM_CONSOLATION_ITEMS:MOM_ITEMS;
  const f=pool[key];if(!f)return;
  const t=f();
  if(!isConsolation)G.momGiftGiven=true;
  const item={...t,hp:t.maxHp,shield:0,maxShield:0,actElapsed:0,actPct:0,
    broken:false,uses:t.maxUses,hasteMs:0,slowMs:0,
    burnStack:0,burnTickMs:0,poisonStack:0,poisonTickMs:0,
    _side:'player'};
  const maxFront=maxFrontSlots();const maxBack=maxBackSlots();let placed=false;
  for(let i=0;i<maxFront&&!placed;i++){if(!board.front[i]){board.front[i]=item;placed=true;}}
  if(!placed)for(let i=0;i<maxBack&&!placed;i++){if(!board.back[i]){board.back[i]=item;placed=true;}}
  if(!placed){showNotif('Board full! Open an item and hit SELL to make room.',4000);return;}
  showNotif(item.name+' received!');
  logEvent({event:'mom_pick',item_key:key,is_consolation:isConsolation});
  updateUI();
  renderBoard();
  skipShop();
}
function buyItem(key,free){
  const f=getItemFactory(key);if(!f)return;
  const t=f();if(!free&&G.gold<t.cost)return;if(!free)G.gold-=t.cost;
  const allSlots=[...board.front,...board.back];
  const existing=allSlots.find(i=>i&&(i.itemKey===key||i.id===key)&&i.upgradeLevel<3);
  if(existing){
    upgradeItem(existing);
    showNotif(existing.name+' upgraded to '+UPGRADE_NAMES[existing.upgradeLevel]+'!');
    updateUI();renderBoard();
    // Refresh info panel if showing this item
    if(currentInfoItem&&(currentInfoItem===existing)){
      showItemInfo(existing,true,
        board.front.includes(existing)?'front':'back',
        board.front.includes(existing)?board.front.indexOf(existing):board.back.indexOf(existing)
      );
    }
    skipShop();
    return;
  }
  const item={...t,baseMaxHp:t.maxHp,baseActMs:t.actMs,upgradeLevel:0,hp:t.maxHp,shield:0,maxShield:0,actElapsed:0,actPct:0,broken:false,uses:t.maxUses,
    hasteMs:0,slowMs:0,burnStack:0,burnTickMs:0,poisonStack:0,poisonTickMs:0,_side:'player'};
  const maxFront=maxFrontSlots();const maxBack=maxBackSlots();let placed=false;
  for(let i=0;i<maxFront&&!placed;i++){if(!board.front[i]){board.front[i]=item;placed=true;}}
  if(!placed)for(let i=0;i<maxBack&&!placed;i++){if(!board.back[i]){board.back[i]=item;placed=true;}}
  if(!placed){showNotif('Board full! Open an item and hit SELL, or swap positions.',4000);return;}
  showNotif(item.name+' added!');
  logEvent({event:'shop_buy',item_key:key,item_rarity:t.itemRarity||'',item_type:t.itemType||'',gold_spent:t.cost,gold_remaining:G.gold,upgraded:!!existing});
  updateUI();renderBoard();
  // Technique tome — show popup before advancing
  if(item.isTechnique){
    const tomeName='Tome of '+item.name;
    const readingText=getTechniqueReading(item.itemKey||item.id);
    const reactionText=getTechniqueReaction(item.itemKey||item.id);
    showTomeModal(tomeName,readingText,reactionText,()=>{
      skipShop();
    });
    return; // don't call skipShop yet — modal callback handles it
  }
  skipShop();
}
function skipShop(){logEvent({event:'shop_skip',gold:G.gold});G.dayStep++;updateUI();renderTrack();activateCurrentNode();}
function generateShopSlots(day,excludeKeys,typeFilter){
  excludeKeys=excludeKeys||[];
  const slots=[];
  for(let i=0;i<3;i++){
    const rarity=rollRarity(day);
    const pool=getItemsOfRarity(rarity,typeFilter||null).filter(k=>!excludeKeys.includes(k)&&!slots.includes(k));
    if(!pool.length)continue;
    slots.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  return slots;
}

let firingEvent=false;

function fireEvent(event){
  if(firingEvent)return;
  firingEvent=true;
  // Notify skill handlers
  activeSkills.forEach(sk=>{
    if(sk._battleHandler){
      try{sk._battleHandler(event);}
      catch(e){console.error('skill handler error',e);}
    }
  });
  // Notify item handlers
  [...board.front,...board.back,...enemyBoard.front,...enemyBoard.back].forEach(item=>{
    if(item&&!item.broken&&item.handleEvent){
      try{item.handleEvent(event);}
      catch(e){console.error('handleEvent error on '+item.name,e);}
    }
  });
  firingEvent=false;
}

function getNeighbors(item){
  const boards=[{b:board,side:'player'},{b:enemyBoard,side:'enemy'}];
  for(const {b,side} of boards){
    for(const row of ['front','back']){
      const idx=b[row].indexOf(item);
      if(idx===-1)continue;
      const otherRow=row==='front'?'back':'front';
      return{
        side,row,index:idx,
        left:b[row][idx-1]||null,
        right:b[row][idx+1]||null,
        behind:b[otherRow][idx]||null,
        inFront:b[otherRow][idx]||null,
      };
    }
  }
  return null;
}

let battleInterval=null,fatigueInterval=null,battleMs=0,currentBattleType='rival';
function runBattle(type){
  if(G.battleRunning)return;G.battleRunning=true;currentBattleType=type;
  // Collapse dialogue to save vertical space during battle
  const dlg=document.querySelector('.dialogue');
  if(dlg)dlg.style.display='none';
  const sb=document.getElementById('startBattleBtn');if(sb)sb.disabled=true;
  const speedBtn=document.getElementById('speedBtn');if(speedBtn)speedBtn.disabled=true;
  resetItemBattleState(board);resetItemBattleState(enemyBoard);
  // Fizzle — halve effectAmt of untargetable enemy passive items at battle start
  if(activeSkills.some(s=>s.id==='fizzle')){
    [...enemyBoard.front,...enemyBoard.back].forEach(i=>{
      if(i&&!i.broken&&i.maxHp===0){
        i.effectAmt=Math.floor((i.effectAmt||0)/2);
        i.baseEffect=Math.floor((i.baseEffect||0)/2);
        log('s','💨 Fizzle weakens '+i.name+' (effectAmt → '+i.effectAmt+')');
      }
    });
  }
  registerSkillHandlers();
  fireEvent({type:'BATTLE_START',item:null,side:null,value:null,source:null});
  clearLog();hideItemInfo();log('x','Battle starts!');battleMs=0;
  const TICK=100,FATIGUE_START=30000;
  battleInterval=setInterval(()=>{
    const step=TICK*battleSpeed;
    battleMs+=step;const rem=Math.max(0,FATIGUE_START-battleMs);
    const tt=document.getElementById('timerTxt');if(tt)tt.textContent=(rem/1000).toFixed(1)+'s';
    tickSide(board,'player',step);tickSide(enemyBoard,'enemy',step);
    // Iron Hide — expires after 10 seconds
    if(battleState.ironHideActive&&battleMs>=10000){
      battleState.ironHideActive=false;
      battleState.ironHideExpired=true;
      log('s','🦏 Iron Hide expired.');
    }
    // Predator — 3 enemy items broken → globalMult ×1.5
    if(!battleState.predatorActive&&activeSkills.some(s=>s.id==='predator')){
      const brokenCount=[...enemyBoard.front,...enemyBoard.back].filter(i=>i&&i.broken).length;
      if(brokenCount>=3){
        battleState.predatorActive=true;
        log('s','🐺 Predator activated! All effects ×1.5!');
      }
    }
    // Flow State — activates after 20 seconds of battle
    if(!battleState.flowStateActive&&battleMs>=20000&&activeSkills.some(s=>s.id==='flow_state')){
      battleState.flowStateActive=true;
      log('s','🌀 Flow State activated! All effects ×1.15!');
    }
    // Benediction — heal back row every 5 seconds
    if(activeSkills.some(s=>s.id==='benediction')){
      battleState.benedictionMs=(battleState.benedictionMs||0)+step;
      if(battleState.benedictionMs>=5000){
        battleState.benedictionMs=0;
        [...board.back].forEach(item=>{
          if(item&&!item.broken&&item.maxHp>0&&item.hp<item.maxHp){
            const actual=Math.min(item.maxHp-item.hp,15);
            item.hp+=actual;
            if(actual>0)log('h','✨ Benediction heals '+item.name+' +'+actual);
          }
        });
      }
    }
    updateBattleBars();updateEnemyBars();
    const pKO=checkKO('player'),eKO=checkKO('enemy');
    if(pKO&&eKO){endBattle('win');return;}
    if(pKO){endBattle('lose');return;}if(eKO){endBattle('win');return;}
    if(battleMs>=FATIGUE_START&&!fatigueInterval)startFatigue();
  },TICK);
}
function resetItemBattleState(b){
  const isPlayer=b===board;
  if(isPlayer)initBattleState(); // initialize battleState before per-item processing
  const mods=getSkillMods();
  [...b.front,...b.back].forEach(item=>{
    if(!item)return;
    if(isPlayer&&item.baseMaxHp>0){
      const ul=item.upgradeLevel||0;
      item.maxHp=Math.round(item.baseMaxHp*(UPGRADE_MULTS[ul]||1))+mods.maxHpBonus;
      item.effectAmt=Math.round((item.baseEffect||0)*(UPGRADE_MULTS[ul]||1));
    }
    item.actMs=item.baseActMs||item.actMs; // always reset to base speed
    item.hp=item.maxHp;item.shield=0;item.maxShield=0;item.actElapsed=0;item.actPct=0;item.broken=false;item.uses=item.maxUses;
    item.hasteMs=0;item.slowMs=0;item.burnStack=0;item.burnTickMs=0;item.poisonStack=0;item.poisonTickMs=0;
    item._side=b===board?'player':'enemy';
    if(item.baseHitCount!==null&&item.baseHitCount!==undefined){
      item.hitCount=Math.round(item.baseHitCount*(UPGRADE_MULTS[item.upgradeLevel||0]||1));
    }
    if(item._firstActivation!==undefined)item._firstActivation=true;
    if(item._spiteCounter!==undefined)item._spiteCounter=1;
    if(item._blazeCounter!==undefined)item._blazeCounter=1;
    if(item._mithridateCount!==undefined)item._mithridateCount=0;
    if(item._miasmaTriggerCount!==undefined)item._miasmaTriggerCount=0;
    item._lastStandApplied=false;
    // Apotheosis — unupgraded player items scale to Mastered tier
    if(isPlayer&&activeSkills.some(s=>s.id==='apotheosis')){
      if((item.upgradeLevel||0)===0){
        const m=UPGRADE_MULTS[3]||2.0;
        if(item.baseMaxHp>0){item.maxHp=Math.round(item.baseMaxHp*m);item.hp=item.maxHp;}
        if(item.baseEffect){item.effectAmt=Math.round(item.baseEffect*m);}
        if(item.baseHitCount){item.hitCount=Math.round(item.baseHitCount*m);}
      }
    }
    // Refrigeration — +1 use to all provisions
    if(isPlayer&&activeSkills.some(s=>s.id==='refrigeration')){
      if(item.itemType==='provision'&&item.uses!==null){
        item.uses++;item.maxUses++;
      }
    }
  });
  // Duality — odd slots +10 effectAmt, even slots +25 maxHp (second pass so all items are reset first)
  if(isPlayer&&activeSkills.some(s=>s.id==='duality')&&!battleState.dualityApplied){
    battleState.dualityApplied=true;
    [board.front[0],board.front[2],board.back[1]].forEach(item=>{
      if(item){item.effectAmt=(item.effectAmt||0)+10;item.baseEffect=(item.baseEffect||0)+10;}
    });
    [board.front[1],board.back[0],board.back[2]].forEach(item=>{
      if(item){item.maxHp+=25;item.baseMaxHp+=25;item.hp=item.maxHp;}
    });
  }
  // Assembled — check if all 6 slots filled
  if(isPlayer){
    const allFilled=[...board.front,...board.back].every(i=>i!==null);
    battleState.assembledActive=allFilled&&activeSkills.some(s=>s.id==='assembled');
  }
  firingEvent=false;
}
function tickSide(b,side,tickMs){
  const mods=side==='player'?getSkillMods():null;
  const isBack=i=>b.back.includes(i);
  [...b.front,...b.back].forEach(item=>{
    if(!item||item.broken)return;
    // Count down haste/slow timers
    if(item.hasteMs>0)item.hasteMs=Math.max(0,item.hasteMs-tickMs);
    if(item.slowMs>0)item.slowMs=Math.max(0,item.slowMs-tickMs);
    // Status speed modifier: haste=0.5x threshold (faster), slow=2.0x (slower), both=1.0x
    let statusSpeedMult=1.0;
    if(item.hasteMs>0&&item.slowMs===0)statusSpeedMult=0.5;
    else if(item.slowMs>0&&item.hasteMs===0)statusSpeedMult=2.0;
    // Determine slot number for per-slot speed mods
    const frontIdx=b.front.indexOf(item);
    const backIdx=b.back.indexOf(item);
    let slotNum=-1;
    if(frontIdx===0)slotNum=1;
    else if(frontIdx===1)slotNum=2;
    else if(frontIdx===2)slotNum=3;
    else if(backIdx===0)slotNum=4;
    else if(backIdx===1)slotNum=5;
    else if(backIdx===2)slotNum=6;
    // Skill speed modifiers
    let speedMult=statusSpeedMult;
    if(mods){
      speedMult*=mods.speedMult;
      if(isBack(item))speedMult*=mods.backSpeedMult;
      if(slotNum===2)speedMult*=(mods.slot2SpeedMult||1.0);
      if(slotNum===5)speedMult*=(mods.slot5SpeedMult||1.0);
    }
    const effectiveActMs=(item.baseActMs||item.actMs)*speedMult;
    if(effectiveActMs<=0)return; // technique items — no activation timer, effects via handleEvent only
    item.actElapsed+=tickMs;item.actPct=Math.min(100,item.actElapsed/effectiveActMs*100);
    if(item.actElapsed>=effectiveActMs){
      item.actElapsed=0;item.actPct=0;
      log('a',item.icon+' '+item.name+' activates!');
      // Crescendo — every 5th player activation doubles effects
      if(side==='player'&&activeSkills.some(s=>s.id==='crescendo')){
        battleState.crescendoCount++;
        if(battleState.crescendoCount>=5){battleState.crescendoCount=0;battleState.crescendoReady=true;}
      }
      const crescendoMult=(side==='player'&&battleState.crescendoReady)?2:1;
      battleState.crescendoReady=false;
      item.effectFn(side,Math.round((item.effectAmt||item.baseEffect||0)*crescendoMult),item);
      fireEvent({type:'ITEM_ACTIVATED',item:item,side:side,value:item.effectAmt||item.baseEffect||0,source:null});
      // Momentum — +4 damage to next attack
      if(side==='player'&&activeSkills.some(s=>s.id==='momentum')){
        battleState.momentumBonus+=4;
      }
      // Kickstart and Friction — slot 6 triggers
      if(side==='player'&&slotNum===6){
        if(activeSkills.some(s=>s.id==='kickstart')&&battleState.kickstartCount<3){
          battleState.kickstartCount++;
          const alive=[...board.front,...board.back].filter(i=>i&&!i.broken);
          if(alive.length){
            const t=alive[Math.floor(Math.random()*alive.length)];
            applyHaste(t,2000,'Kickstart');
            log('s','⚡ Kickstart — Jolted '+t.name+' 2s ('+battleState.kickstartCount+'/3)');
          }
        }
        if(activeSkills.some(s=>s.id==='friction')&&battleState.frictionCount<3){
          battleState.frictionCount++;
          const et=[...enemyBoard.front,...enemyBoard.back].filter(i=>i&&!i.broken&&i.maxHp>0);
          if(et.length){
            const t=et[Math.floor(Math.random()*et.length)];
            applySlow(t,2000,'Friction');
            log('s','💧 Friction — Wet '+t.name+' 2s ('+battleState.frictionCount+'/3)');
          }
        }
      }
      if(item.uses!==null){item.uses--;if(item.uses<=0){item.broken=true;if(item.onBreak)item.onBreak(item);log('b',item.name+' consumed!');}}
    }
    // Burn tick — every 500ms. shield*2 reduces damage first, remainder to HP
    if(item.burnStack>0){
      item.burnTickMs+=tickMs;
      while(item.burnTickMs>=500&&item.burnStack>0){
        item.burnTickMs-=500;
        if(item.hitCount!==undefined&&item.hitCount!==null){
          item.hitCount--;
          log('d','Burn hit absorbed by '+item.name+' ('+item.hitCount+' hits remaining)');
          if(item.hitCount<=0){
            fireEvent({type:'ITEM_BROKEN',item:item,side:side,value:0,source:null});
            item.broken=true;
            if(item.onBreak)item.onBreak(item);
            log('b',item.name+' BROKEN by burn!');
          }
          item.burnStack--;
          continue;
        }
        const shieldReduction=(item.shield||0)*2;
        const hpDmg=Math.max(0,item.burnStack-shieldReduction);
        if(hpDmg>0){item.hp=Math.max(0,item.hp-hpDmg);log('d','🔥 Burn '+item.name+' -'+hpDmg+' HP');}
        else{log('d','🔥 Burn '+item.name+' absorbed by plating');}
        item.burnStack--;
        // Asbestos — extra -2 burn stacks per tick on player items
        if(side==='player'&&activeSkills.some(s=>s.id==='asbestos')){
          item.burnStack=Math.max(0,item.burnStack-2);
        }
        if(item.hp<=0&&!item.broken){checkAndBreak(item,side);}
      }
    }
    // Poison tick — every 1000ms (2000ms if Immunity active on player side). bypasses shield
    if(item.poisonStack>0){
      item.poisonTickMs+=tickMs;
      const poisonInterval=(side==='player'&&activeSkills.some(s=>s.id==='immunity'))?2000:1000;
      while(item.poisonTickMs>=poisonInterval&&item.poisonStack>0){
        item.poisonTickMs-=poisonInterval;
        if(item.hitCount!==undefined&&item.hitCount!==null){
          item.hitCount--;
          log('d','Poison hit absorbed by '+item.name+' ('+item.hitCount+' hits remaining)');
          if(item.hitCount<=0){
            fireEvent({type:'ITEM_BROKEN',item:item,side:side,value:0,source:null});
            item.broken=true;
            if(item.onBreak)item.onBreak(item);
            log('b',item.name+' BROKEN by poison!');
          }
          continue;
        }
        const pdmg=item.poisonStack;
        item.hp=Math.max(0,item.hp-pdmg);
        log('d','☠️ Poison '+item.name+' -'+pdmg+' HP');
        if(item.hp<=0&&!item.broken){checkAndBreak(item,side);}
      }
    }
  });
  if(side==='player'){
    const joltedCount=[...board.front,...board.back]
      .filter(i=>i&&!i.broken&&(i.hasteMs||0)>0).length;
    if(joltedCount>0){
      battleState.joltCumulativeMs+=(tickMs*joltedCount);
      checkThunder();
    }
  }
}
function startFatigue(){
  fireEvent({type:'FATIGUE_START',item:null,side:null,value:null,source:null});
  let fMs=0;const fw=document.getElementById('fatigueWrap');if(fw)fw.style.display='block';
  fatigueInterval=setInterval(()=>{
    fMs+=500;const baseDmg=Math.min(40,2+Math.floor(fMs/2000)*3);
    const mods=getSkillMods();
    const playerDmg=Math.round(baseDmg*mods.fatigueMult);
    const dmg=baseDmg;
    const tt=document.getElementById('timerTxt');if(tt)tt.textContent='FATIGUE +'+playerDmg+'/'+(baseDmg);
    const ff=document.getElementById('fatigueFill');if(ff)ff.style.width=Math.min(100,fMs/12000*100)+'%';
    const actualPlayerDmg=G.steadfastActive?Math.round(playerDmg*0.5):playerDmg;
    [...board.front,...board.back].forEach(item=>{if(item&&item.maxHp>0&&!item.broken)applyDmgTo(item,actualPlayerDmg,'Fatigue','player');});
    [...enemyBoard.front,...enemyBoard.back].forEach(item=>{if(item&&item.maxHp>0&&!item.broken)applyDmgTo(item,Math.round(dmg*battleState.fatigueDamageMultiplier),'Fatigue','enemy');});
    updateBattleBars();updateEnemyBars();
    const pKO=checkKO('player'),eKO=checkKO('enemy');
    if(pKO&&eKO)endBattle('win');else if(pKO)endBattle('lose');else if(eKO)endBattle('win');
  },500);
}
function stopBattle(){if(battleInterval){clearInterval(battleInterval);battleInterval=null;}if(fatigueInterval){clearInterval(fatigueInterval);fatigueInterval=null;}G.battleRunning=false;battleSpeed=1;firingEvent=false;
  // Restore dialogue visibility
  const dlg=document.querySelector('.dialogue');
  if(dlg)dlg.style.display='';
}
function checkKO(side){return aliveItems(side).filter(i=>i.maxHp>0).length===0;}

function endBattle(result){
  stopBattle();G.lastResult=result;
  let title,sub,btnText='CONTINUE →',btnOnclick='continueAfterResult()';
  if(result==='win'){
    if(currentBattleType==='wild'){
      const roll=Math.random();const reward=roll<0.25?4:roll<0.75?5:6;
      const butcher=reward===4?'"You really beat the meat on this one." Coins in your hand, pity in his eyes.':reward===5?'"Decent enough." Coins on the counter, no further conversation.':'"Near perfect condition. They grade these now, you know. PSA 10, this one." You walk out richer than expected.';
      const monsterName=G.wildChoice===-1?DAY1_WILD.name:WILD_MONSTERS[G.wildChoice||0].name;
      G.gold+=reward;title='MONSTER DEFEATED';
      sub='You haul the '+monsterName+' to the butcher.<br><br><em>'+butcher+'</em><br><br>Earned 🪙'+reward+' gold.';
      logEvent({event:'wild_battle',result:'win',wild_monster:monsterName,gold_reward:reward,board:boardSnapshot(),battle_duration_ms:battleMs});
    }else{
      G.wins++;G.rivalDefeated=true;title='VICTORY';
      if(G.wins>=6){
        rivalRecord.wins++;localStorage.setItem('rivalWins',rivalRecord.wins);
        const isPerfect=G.honor===13;
        if(isPerfect){title='FLAWLESS';sub='Six wins. Zero losses. Kip knew all along.';}
        else{sub='Six wins. The run is complete.';}
        btnText='PLAY AGAIN';btnOnclick='resetRun()';
        logEvent({event:'run_complete',wins:G.wins,honor:G.honor,perfect:isPerfect,board:boardSnapshot(),skills:activeSkills.map(s=>s.id)});
      }else{
        const trainerWinner=TRAINER_DATA[G.wins]||TRAINER_DATA[1];
        const afterWinDlg=trainerWinner.dialogueAfterWin||'';
        sub='"'+afterWinDlg.replace(/\n/g,'<br>')+'"<br><br>— '+trainerWinner.name+'<br><br>Win '+G.wins+' of 6.';
      }
      logEvent({event:'trainer_battle',result:'win',win_number:G.wins,board:boardSnapshot(),skills:activeSkills.map(s=>s.id),battle_duration_ms:battleMs,fatigue_triggered:fatigueInterval!==null});
    }
  }else{
    if(currentBattleType==='wild'){
      title='DEFEATED';
      const monsterName=G.wildChoice===-1?DAY1_WILD.name:WILD_MONSTERS[G.wildChoice||0].name;
      logEvent({event:'wild_battle',result:'lose',wild_monster:monsterName,board:boardSnapshot(),battle_duration_ms:battleMs});
      if(G.day===1){
        sub='You are literally in the tutorial. We\'re going to pretend that didn\'t happen.';btnText='MOVE ON →';
      }else{
        sub='Nothing for the butcher today.';btnText='MOVE ON →';
      }
    }else{
      const hl=G.day;G.honor=Math.max(0,G.honor-hl);title='DEFEATED';
      const trainerLoser=TRAINER_DATA[G.wins+1]||TRAINER_DATA[1];
      const afterLossDlg=trainerLoser.getDialogueAfterLoss?trainerLoser.getDialogueAfterLoss():trainerLoser.dialogueAfterLoss||'';
      if(G.wins===5){rivalRecord.losses++;localStorage.setItem('rivalLosses',rivalRecord.losses);}
      sub='"'+afterLossDlg.replace(/\n/g,'<br>')+'"<br><br>— '+trainerLoser.name+'<br><br>Lost '+hl+' honor. '+G.honor+' remaining.'+(G.honor<=0?' SECOND WIND!':'');
      btnText=G.honor<=0?'SECOND WIND...':'TRY AGAIN →';
      logEvent({event:'trainer_battle',result:'lose',win_number:G.wins,honor_lost:hl,board:boardSnapshot(),skills:activeSkills.map(s=>s.id),battle_duration_ms:battleMs,fatigue_triggered:fatigueInterval!==null});
    }
  }
  updateUI();setEncTitle(title);
  const titleClass=title==='FLAWLESS'?'re-flawless':result==='win'?'re-win':'re-lose';
  setEncBody('<div class="result-enc"><div class="re-title '+titleClass+'">'+title+'</div><div class="re-sub">'+sub+'</div><div class="btn-row"><button class="btn btn-p" onclick="'+btnOnclick+'">'+btnText+'</button></div></div>');
}

function continueAfterResult(){
  resetItemBattleState(board);
  renderBoard();
  if(G.lastResult==='win'){
    if(currentBattleType==='wild'){
      G.dayStep++;updateUI();renderBoard();renderTrack();activateCurrentNode();
    }else{
      postTrainerWin();
    }
  }else{
    if(currentBattleType==='wild'){
      G.dayStep++;updateUI();renderBoard();renderTrack();activateCurrentNode();
    }else{
      if(G.honor<=0&&!G.secondWindUsed){
        renderBoard();updateUI();renderTrack();
        showSecondWind();
      }else if(G.honor<=0&&G.secondWindUsed){
        setEncTitle('DEFEATED');
        setEncBody('<div class="result-enc"><div class="re-title re-lose">DEFEATED</div><div class="re-sub">Kip gave everything.<br><br>'+G.wins+' wins.</div><div class="btn-row"><button class="btn btn-p" onclick="resetRun()">PLAY AGAIN</button></div></div>');
      }else{
        advanceDay();
      }
    }
  }
}

  if(G.type===null){
    showTypeSelect();
  }else{
    showSkillPick();
  }
}
