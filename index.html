<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZORP</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{--gold:#f0c040;--honor-red:#e84040;--bg:#0e0b14;--panel:#1a1525;--card:#221a30;--card-h:#2d2440;--border:#3a2f50;--glow:#6040a0;--text:#e8d8ff;--dim:#7a6a90;--potential:#40c0ff;--hp:#50e080;--shield:#40a0ff;--act:#a060ff;--broken-bg:#18121e;--broken-b:#2a2035;--front:#e05050;--back:#5090e0;--fatigue:#ff6020;--sel:#ffe040;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;min-height:100vh;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,40,120,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(40,60,120,.1) 0%,transparent 50%);}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 18px;background:rgba(10,8,18,.96);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.ts{display:flex;align-items:center;gap:6px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:.05em;}
.gv{color:var(--gold);}
.hw{display:flex;flex-direction:column;align-items:center;gap:2px;}
.hl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;color:var(--dim);}
.hbar{width:160px;height:11px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative;}
.hfill{height:100%;background:linear-gradient(90deg,#c02020,#e84040);transition:width .5s;box-shadow:0 0 5px rgba(232,64,64,.4);}
.htxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:7px;font-weight:700;color:#fff;text-shadow:0 1px 2px #000;}
.pb{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.12em;color:var(--glow);background:rgba(96,64,160,.15);padding:2px 8px;border-radius:8px;border:1px solid rgba(96,64,160,.3);}
.page{display:flex;flex-direction:column;max-width:960px;margin:0 auto;padding:10px 16px;gap:0;}
/* ENCOUNTER */
.encounter{background:var(--panel);border:1px solid var(--border);border-radius:10px 10px 0 0;min-height:240px;display:flex;flex-direction:column;padding:14px;gap:10px;}
.enc-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.15em;color:var(--dim);margin-bottom:2px;}
.enc-body{flex:1;display:flex;flex-direction:column;gap:8px;}
.draft-row{display:flex;gap:8px;justify-content:center;}
.dc{flex:1;max-width:160px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .18s;}
.dc:hover{border-color:var(--glow);background:var(--card-h);box-shadow:0 0 10px rgba(96,64,160,.3);}
.dc.cant{opacity:.35;pointer-events:none;}
.di{font-size:26px;margin-bottom:4px;}.dn{font-family:'Cinzel',serif;font-size:8px;font-weight:700;letter-spacing:.05em;margin-bottom:2px;}
.dd{font-size:8px;color:var(--dim);line-height:1.4;margin-bottom:4px;}.dp{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);}
.dialogue{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text);line-height:1.6;font-style:italic;}
.dlg-name{font-family:'Cinzel',serif;font-size:10px;font-weight:700;font-style:normal;color:var(--gold);margin-bottom:3px;}
/* ENEMY BOARD */
.enemy-area{display:flex;gap:10px;align-items:flex-start;}
.enemy-info{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px;}
.enemy-icon{font-size:36px;}.enemy-name{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.1em;}
.enemy-tag{font-size:8px;color:var(--dim);}.enemy-board{flex:1;}
.eboard-row{display:flex;gap:5px;margin-bottom:5px;}
.enc-row-label{font-family:'Cinzel',serif;font-size:7px;writing-mode:vertical-rl;transform:rotate(180deg);width:10px;flex-shrink:0;color:var(--dim);}
/* BATTLE */
.battle-status{display:flex;align-items:center;gap:10px;}
.timer-box{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--gold);min-width:60px;}
.fatigue-wrap{flex:1;}.fatigue-track{height:5px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.fatigue-fill{height:100%;background:linear-gradient(90deg,#e06020,#ff2020);transition:width .3s;}
.fl{font-family:'Cinzel',serif;font-size:7px;color:var(--fatigue);letter-spacing:.1em;margin-bottom:1px;}
.battle-log{background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:6px;padding:5px 7px;height:64px;overflow-y:auto;font-size:9px;line-height:1.7;}
.battle-log::-webkit-scrollbar{width:3px;}.battle-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.lt{color:rgba(160,120,255,.5);margin-right:4px;}.ld{color:#e85050;}.lh{color:#50e080;}.ls{color:var(--shield);}.la{color:var(--act);}.lb{color:var(--fatigue);font-weight:700;}.lx{color:var(--dim);font-style:italic;}
/* TYPE / SKILL PICK */
.type-opts,.skill-opts{display:flex;gap:8px;justify-content:center;}
.to,.sk-card{flex:1;max-width:160px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .18s;}
.to:hover,.sk-card:hover{border-color:var(--glow);box-shadow:0 0 10px rgba(96,64,160,.3);}
.ti{font-size:20px;margin-bottom:4px;}.tn{font-family:'Cinzel',serif;font-size:8px;font-weight:700;letter-spacing:.05em;margin-bottom:2px;}.td{font-size:8px;color:var(--dim);line-height:1.3;}
.sk-icon{font-size:18px;margin-bottom:3px;}
.sk-name{font-family:'Cinzel',serif;font-size:8px;font-weight:700;letter-spacing:.05em;margin-bottom:2px;}
.sk-desc{font-size:8px;color:var(--dim);line-height:1.3;margin-bottom:4px;}
.sk-rarity{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;}
.rarity-beginner{color:#80c080;}.rarity-intermediate{color:#4080e0;}.rarity-advanced{color:#c060e0;}.rarity-mastered{color:#f0a020;}
/* WILD PICK */
.wild-pick{display:flex;gap:8px;justify-content:center;}
.wp{flex:1;max-width:160px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:all .18s;}
.wp:hover{border-color:#50c050;box-shadow:0 0 10px rgba(64,160,64,.3);}
.wpi{font-size:24px;margin-bottom:3px;}.wpn{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.05em;margin-bottom:2px;}.wpd{font-size:8px;color:var(--dim);line-height:1.3;}
/* RESULT */
.result-enc{text-align:center;padding:20px;}
.re-title{font-family:'Cinzel',serif;font-size:26px;font-weight:900;letter-spacing:.15em;margin-bottom:6px;}
.re-win{color:#50e080;}.re-lose{color:#e84040;}
.re-sub{color:var(--dim);font-size:12px;margin-bottom:16px;line-height:1.6;}
/* DAY TRACK */
.day-track{background:rgba(10,8,18,.8);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:0;position:relative;}
.track-node{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .2s;position:relative;z-index:1;}
.track-node.done .node-stamp{opacity:.5;border-color:var(--border);}
.track-node.done .node-stamp::after{content:'✓';position:absolute;top:-4px;right:-4px;font-size:9px;color:#50e080;background:var(--bg);border-radius:50%;padding:1px;}
.track-node.current .node-stamp{border-color:var(--gold);box-shadow:0 0 12px rgba(240,192,64,.4);animation:nodepulse 1.5s ease infinite;}
.track-node.locked .node-stamp{opacity:.25;cursor:default;}.track-node.locked{cursor:default;}
@keyframes nodepulse{0%,100%{box-shadow:0 0 8px rgba(240,192,64,.3)}50%{box-shadow:0 0 18px rgba(240,192,64,.6)}}
.node-stamp{width:46px;height:46px;border-radius:50%;background:var(--panel);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;transition:all .2s;}
.node-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.08em;color:var(--dim);white-space:nowrap;}
.track-node.current .node-label{color:var(--gold);}
.track-connector{flex:1;height:2px;background:var(--border);min-width:16px;max-width:40px;margin-top:-22px;position:relative;z-index:0;}
.track-connector.done-conn{background:rgba(80,224,128,.3);}
/* PLAYER SECTION */
.player-section{background:var(--panel);border:1px solid var(--border);border-radius:0 0 10px 10px;border-top:none;padding:12px;}
.player-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.zorp-mini{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:70px;}
.zorp-icon{font-size:28px;filter:drop-shadow(0 0 8px rgba(64,192,255,.4));animation:breathe 3s ease-in-out infinite;}
@keyframes breathe{0%,100%{filter:drop-shadow(0 0 6px rgba(64,192,255,.3))}50%{filter:drop-shadow(0 0 14px rgba(64,192,255,.7))}}
.zorp-name{font-family:'Cinzel',serif;font-size:11px;font-weight:900;letter-spacing:.1em;}
.type-badge{padding:2px 8px;border-radius:10px;font-family:'Cinzel',serif;font-size:7px;font-weight:700;letter-spacing:.1em;border:1px solid;}
.type-pot{background:rgba(64,192,255,.1);border-color:var(--potential);color:var(--potential);}
.skill-panel{flex:1;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;}
.sp-title{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.12em;color:var(--dim);margin-bottom:4px;}
.sp-svg{width:100%;height:56px;}
.board-area{display:flex;flex-direction:column;gap:5px;}
.board-row{display:flex;align-items:center;gap:5px;}
.rl{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.07em;writing-mode:vertical-rl;transform:rotate(180deg);width:11px;flex-shrink:0;}
.rl.f{color:var(--front);}.rl.b{color:var(--back);}
.slots{display:flex;gap:5px;flex:1;}
.swap-hint{font-size:9px;color:var(--dim);font-style:italic;text-align:right;}
/* ITEM CARD */
.ic{flex:1;min-width:0;height:108px;border-radius:7px;border:1px solid var(--border);background:var(--card);position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.ic:hover:not(.locked){border-color:var(--glow);}
.ic.sel,.ecard.sel{border-color:var(--sel)!important;box-shadow:0 0 10px rgba(255,224,64,.35);}
.ic.locked{background:rgba(15,10,22,.5);border-style:dashed;opacity:.3;cursor:default;}
.ic.broken-c{background:var(--broken-bg);border-color:var(--broken-b);}
.ic.empty-s{border-style:dashed;opacity:.45;}
.card-df{position:absolute;inset:0;background:rgba(232,64,64,.28);z-index:5;opacity:0;pointer-events:none;border-radius:7px;transition:opacity .1s;}
.card-hf{position:absolute;inset:0;background:rgba(80,224,128,.18);z-index:5;opacity:0;pointer-events:none;border-radius:7px;transition:opacity .1s;}
.ci{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:4px 3px 18px;z-index:2;}
.cicon{font-size:20px;line-height:1;}.cname{font-family:'Cinzel',serif;font-size:7px;font-weight:700;text-align:center;line-height:1.2;}
.ctag{font-size:6px;color:var(--dim);font-style:italic;}.cstat{font-size:7px;color:var(--gold);font-family:'Cinzel',serif;}
.cshield{font-size:7px;color:var(--shield);font-family:'Cinzel',serif;}
.cbars{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:0 2px 2px;display:flex;flex-direction:column;gap:1px;}
.bt{height:4px;background:rgba(0,0,0,.5);border-radius:2px;overflow:hidden;}
.bf{height:100%;border-radius:2px;}
.hbf{background:linear-gradient(90deg,#30b060,var(--hp));}.sbf{background:linear-gradient(90deg,#2080c0,var(--shield));}.abf{background:linear-gradient(90deg,#6030c0,var(--act));}
.cbo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(100,80,120,.3);z-index:3;}
.clock{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--border);}
/* ENEMY CARDS */
.ecard{flex:1;min-width:0;height:80px;border-radius:6px;border:1px solid var(--border);background:var(--card);position:relative;overflow:hidden;}
.ecard.ebroken{background:var(--broken-bg);border-color:var(--broken-b);}
.eci{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:3px 2px 14px;}
.eicon{font-size:15px;}.ename{font-family:'Cinzel',serif;font-size:6px;font-weight:700;text-align:center;}
.etag{font-size:5px;color:var(--dim);}
.ebrk{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(100,80,120,.3);}
.ebars{position:absolute;bottom:0;left:0;right:0;padding:0 2px 2px;display:flex;flex-direction:column;gap:1px;}
/* BUTTONS */
.btn{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.08em;padding:6px 14px;border-radius:5px;border:1px solid;cursor:pointer;transition:all .18s;}
.btn-p{background:rgba(80,40,140,.25);border-color:var(--glow);color:var(--text);}
.btn-p:hover:not(:disabled){background:rgba(80,40,140,.45);box-shadow:0 0 8px rgba(96,64,160,.35);}
.btn-d{background:rgba(160,30,30,.2);border-color:var(--honor-red);color:var(--honor-red);}
.btn-d:hover:not(:disabled){background:rgba(160,30,30,.35);}
.btn:disabled{opacity:.3;cursor:default;pointer-events:none;}
.btn-row{display:flex;gap:6px;justify-content:center;margin-top:8px;}
/* NOTIF */
.notif{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-6px);background:var(--panel);border:1px solid var(--glow);border-radius:7px;padding:6px 16px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.04em;z-index:300;opacity:0;transition:all .22s;pointer-events:none;}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0);}
.tree-tip{position:fixed;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:7px 10px;z-index:400;pointer-events:none;opacity:0;transition:opacity .12s;max-width:190px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.tree-tip.show{opacity:1;}
.tree-tip-name{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:var(--text);margin-bottom:2px;}
.tree-tip-sub{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.08em;margin-bottom:3px;}
.tree-tip-desc{font-size:8px;color:var(--dim);line-height:1.4;}
/* STATUS EFFECTS */
.sts{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;min-height:8px;margin-top:1px;}
.st-pill{font-size:5.5px;padding:1px 3px;border-radius:3px;font-family:'Cinzel',serif;line-height:1.5;white-space:nowrap;}
.st-haste{background:rgba(240,192,64,.2);color:#f0c040;border:1px solid rgba(240,192,64,.5);}
.st-slow{background:rgba(64,160,255,.2);color:#60b8ff;border:1px solid rgba(64,160,255,.5);}
.st-burn{background:rgba(255,120,40,.2);color:#ff8030;border:1px solid rgba(255,120,40,.5);}
.st-poison{background:rgba(80,220,80,.2);color:#50e060;border:1px solid rgba(80,220,80,.5);}
@keyframes burnpulse{0%,100%{box-shadow:inset 0 0 0 1px rgba(255,120,40,0)}50%{box-shadow:inset 0 0 0 1px rgba(255,120,40,.7),0 0 8px rgba(255,120,40,.3)}}
@keyframes poisonpulse{0%,100%{box-shadow:inset 0 0 0 1px rgba(80,220,80,0)}50%{box-shadow:inset 0 0 0 1px rgba(80,220,80,.7),0 0 8px rgba(80,220,80,.3)}}
.ic.burning{animation:burnpulse 1s ease infinite;}
.ic.poisoned{animation:poisonpulse 1.2s ease infinite;}
.ecard.burning{animation:burnpulse 1s ease infinite;}
.ecard.poisoned{animation:poisonpulse 1.2s ease infinite;}
.sell-confirm{position:absolute;inset:0;background:rgba(10,8,18,.93);z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:7px;padding:6px;}
.sell-confirm-name{font-family:'Cinzel',serif;font-size:7px;font-weight:700;color:var(--text);text-align:center;}
.sell-confirm-price{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);}
.sell-confirm-btns{display:flex;gap:5px;}
.dc-info{font-size:8px;color:var(--dim);cursor:pointer;margin-top:3px;padding:1px 4px;border-radius:3px;border:1px solid var(--border);}
.dc-info:hover{color:var(--text);border-color:var(--glow);}
.item-info-panel{position:fixed;top:48px;left:0;right:0;z-index:200;padding:0 16px;pointer-events:none;}
.iip-inner{max-width:960px;margin:0 auto;background:var(--panel);border:1px solid var(--border);border-radius:0 0 10px 10px;border-top:none;padding:8px 14px 10px;pointer-events:all;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.iip-header{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.iip-icon{font-size:18px;}
.iip-name{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text);flex:1;}
.iip-rarity{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;padding:2px 6px;border-radius:4px;}
.iip-rarity-beginner{background:rgba(96,160,96,.15);color:#60a060;border:1px solid rgba(96,160,96,.3);}
.iip-rarity-intermediate{background:rgba(64,112,192,.15);color:#4070c0;border:1px solid rgba(64,112,192,.3);}
.iip-rarity-advanced{background:rgba(144,80,176,.15);color:#9050b0;border:1px solid rgba(144,80,176,.3);}
.iip-rarity-mastered{background:rgba(192,120,32,.15);color:#c07820;border:1px solid rgba(192,120,32,.3);}
.iip-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0 2px;line-height:1;margin-left:4px;}
.iip-close:hover{color:var(--text);}
.iip-meta{font-family:'Cinzel',serif;font-size:8px;color:var(--dim);margin-bottom:4px;letter-spacing:.04em;}
.iip-desc{font-size:10px;color:var(--text);line-height:1.5;margin-bottom:3px;}
.iip-flavor{font-size:9px;color:var(--dim);font-style:italic;margin-bottom:5px;}
.iip-status{display:flex;gap:5px;flex-wrap:wrap;}
.iip-stat{font-size:8px;padding:2px 6px;border-radius:3px;font-family:'Cinzel',serif;}
.iip-burn{background:rgba(255,112,48,.15);color:#ff7030;}
.iip-poison{background:rgba(80,224,80,.15);color:#50e050;}
.iip-haste{background:rgba(240,192,64,.15);color:#f0c040;}
.iip-slow{background:rgba(64,160,255,.15);color:#40a0ff;}
@media(max-width:600px){.item-info-panel{top:auto;bottom:0;}.iip-inner{border-radius:10px 10px 0 0;border-top:1px solid var(--border);border-bottom:none;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="ts">🪙 <span class="gv" id="goldDisplay">8</span> GOLD</div>
  <div class="hw">
    <div class="hl">HONOR</div>
    <div class="hbar"><div class="hfill" id="honorFill" style="width:100%"></div><div class="htxt" id="honorText">20/20</div></div>
  </div>
  <div class="ts" style="gap:10px">
    <span id="winsDisplay" style="color:var(--gold);font-size:11px">WINS: 0/10</span>
    <span class="pb" id="phaseBadge">DAY 1</span>
    <button class="btn btn-d" style="font-size:8px;padding:4px 10px" onclick="resetRun()">↺ RESET</button>
  </div>
</div>
<div id="itemInfoPanel" class="item-info-panel" style="display:none">
  <div class="iip-inner">
    <div class="iip-header">
      <span class="iip-icon" id="iipIcon"></span>
      <span class="iip-name" id="iipName"></span>
      <span class="iip-rarity" id="iipRarity"></span>
      <button class="iip-close" onclick="hideItemInfo()">✕</button>
    </div>
    <div class="iip-meta" id="iipMeta"></div>
    <div class="iip-desc" id="iipDesc"></div>
    <div class="iip-flavor" id="iipFlavor"></div>
    <div class="iip-status" id="iipStatus"></div>
  </div>
</div>
<div class="notif" id="notif"></div>
<div class="tree-tip" id="treeTip"><div class="tree-tip-name" id="treeTipName"></div><div class="tree-tip-sub" id="treeTipSub"></div><div class="tree-tip-desc" id="treeTipDesc"></div></div>
<div class="page">
  <div class="encounter" id="encounterArea">
    <div class="enc-title" id="encTitle">LOADING...</div>
    <div class="enc-body" id="encBody"></div>
  </div>

// Active skills applied to player
let activeSkills = [];

// Battle-scoped state for complex skills
let battleState = {
  momentumBonus:0, ironHideActive:false,
  resilienceUsed:false, unbreakableUsed:{},
};

function getSkillMods(){
  const m={
    maxHpBonus:0, speedMult:1.0, backSpeedMult:1.0,
    dmgBonus:0, platingMult:1.0, fatigueMult:1.0, globalMult:1.0,
  };
  activeSkills.forEach(sk=>{
    if(sk.id==='potential')    m.globalMult=Math.max(m.globalMult,1.25);
    if(sk.id==='alpha')        m.globalMult=Math.max(m.globalMult,1.30);
    if(sk.id==='thick_fur')    m.maxHpBonus+=20;
    if(sk.id==='battle_hardened') m.maxHpBonus+=15;
    if(sk.id==='quick_reflex') m.speedMult*=0.92;
    if(sk.id==='scrappy')      m.dmgBonus+=3;
    if(sk.id==='apex_strike')  m.dmgBonus+=8;
    if(sk.id==='dense_coat')   m.platingMult*=1.4;
    if(sk.id==='pack_rhythm')  m.backSpeedMult*=0.85;
    if(sk.id==='endurance')    m.fatigueMult*=0.6;
  });
  return m;
}

function initBattleState(){
  battleState={
    momentumBonus:0,
    ironHideActive:activeSkills.some(s=>s.id==='iron_hide'),
    ironHideExpired:false,
    resilienceUsed:false,
    unbreakableUsed:{},
  };
}

function registerSkillHandlers(){
  activeSkills.forEach(sk=>{
    if(sk.id==='momentum'){
      sk._battleHandler=(event)=>{
        if(event.type==='ITEM_ACTIVATED'&&event.side==='player'){
          battleState.momentumBonus+=4;
        }
      };
    }
    if(sk.id==='resilience'){
      sk._battleHandler=(event)=>{
        if(event.type==='DAMAGE_RECEIVED'&&event.side==='player'&&!battleState.resilienceUsed){
          event.item.shield=(event.item.shield||0)+15;
          event.item.maxShield=Math.max(event.item.maxShield||0,event.item.shield);
          battleState.resilienceUsed=true;
          log('s','Resilience! '+event.item.name+' gains +15 plating');
        }
      };
    }
    if(sk.id==='last_stand'){
      sk._battleHandler=(event)=>{
        if(event.type==='ITEM_BROKEN'&&event.side==='player'){
          const alive=aliveItems('player').filter(i=>i.maxHp>0);
          if(alive.length===1&&!alive[0]._lastStandApplied){
            alive[0].maxHp+=50;
            alive[0].hp=Math.min(alive[0].hp+50,alive[0].maxHp);
            alive[0]._lastStandApplied=true;
            log('s','Last Stand! '+alive[0].name+' surges!');
          }
        }
      };
    }
  });
}
function getNodeById(id){ return TREE_NODES.find(n=>n.id===id); }
function isNodeUnlockable(id){
  const node=getNodeById(id); if(!node)return false;
  if(!node.parent)return true; // head always unlockable
  return treeState[node.parent]!==null; // parent must be filled
}
function getAvailableNodes(){
  return TREE_NODES.filter(n=>n.id!=='head'&&treeState[n.id]===null&&isNodeUnlockable(n.id));
}
function drawTreeLines(){
  const g=document.getElementById('treeLines'); if(!g)return; g.innerHTML='';
  // Node center positions matching SVG
  const pos={head:[30,22],neck:[60,22],spine1:[95,22],spine2:[135,22],front_upper:[95,38],spine3:[165,22],back_upper:[135,38],front_foot:[95,53],tail:[260,8],back_foot:[135,53]};
  TREE_NODES.forEach(n=>{
    if(!n.parent)return;
    const [x1,y1]=pos[n.parent]||[0,0]; const [x2,y2]=pos[n.id]||[0,0];
    const filled=treeState[n.id]!==null; const parentFilled=treeState[n.parent]!==null;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y1);line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('stroke',filled?'rgba(160,96,255,.6)':parentFilled?'rgba(96,64,160,.4)':'rgba(58,47,80,.4)');
    line.setAttribute('stroke-width','1.5');
    g.appendChild(line);
  });
}
function renderSkillTree(){
  drawTreeLines();
  TREE_NODES.forEach(n=>{
    const g=document.getElementById('tn-'+n.id); if(!g)return;
    const circ=g.querySelector('circle'); const txt=g.querySelector('text');
    const skill=treeState[n.id];
    const available=isNodeUnlockable(n.id)&&treeState[n.id]===null&&n.id!=='head';
    const rarityColors={prestige:'#8040c0',beginner:'#60a060',intermediate:'#4070c0',advanced:'#9050b0',mastered:'#c07820'};
    if(skill){
      circ.setAttribute('fill','rgba(96,48,160,.35)');
      circ.setAttribute('stroke',rarityColors[n.rarity]||'#6040a0');
      txt.textContent=skill.icon||'✦';txt.setAttribute('font-size','8');txt.setAttribute('fill','#e8d8ff');
    }else if(available){
      circ.setAttribute('fill','rgba(60,40,100,.3)');
      circ.setAttribute('stroke','rgba(96,64,160,.5)');
      txt.setAttribute('fill','rgba(96,64,160,.6)');
    }else{
      circ.setAttribute('fill','#1a1525');
      circ.setAttribute('stroke','#3a2f50');
      txt.setAttribute('fill','#2a1040');
    }
    g.style.cursor='pointer';
    g.onmouseenter=(e)=>showTreeTip(n,e);
    g.onmouseleave=()=>hideTreeTip();
  });
}

const RARITY_WEIGHTS={
  1: {beginner:100,intermediate:0,  advanced:0,  mastered:0},
  2: {beginner:80, intermediate:20, advanced:0,  mastered:0},
  3: {beginner:70, intermediate:30, advanced:0,  mastered:0},
  4: {beginner:55, intermediate:40, advanced:5,  mastered:0},
  5: {beginner:40, intermediate:45, advanced:15, mastered:0},
  6: {beginner:25, intermediate:45, advanced:30, mastered:0},
  7: {beginner:15, intermediate:40, advanced:40, mastered:5},
  8: {beginner:5,  intermediate:35, advanced:50, mastered:10},
  9: {beginner:0,  intermediate:30, advanced:55, mastered:15},
  10:{beginner:0,  intermediate:20, advanced:55, mastered:25},
};
function rollRarity(day){
  const w=RARITY_WEIGHTS[Math.min(day,10)];
  const pool=[];
  for(const[r,weight]of Object.entries(w)){for(let i=0;i<weight;i++)pool.push(r);}
  return pool[Math.floor(Math.random()*pool.length)];
}
function getItemsOfRarity(rarity,typeFilter){
  const all={...ITEMS,...TYPED_ITEMS};
  const filtered=Object.keys(all).filter(key=>{
    const t=all[key]();
    if(t.itemRarity!==rarity)return false;
    if(typeFilter&&typeFilter.length>0&&!typeFilter.includes(t.itemType))return false;
    if(TYPED_ITEMS[key]){
      if(!G.type)return false;
      const playerPool=TYPED_ITEM_POOLS[G.type]||[];
      if(!playerPool.includes(key))return false;
    }
    return true;
  });
  if(filtered.length===0){
    if(rarity==='mastered')return getItemsOfRarity('advanced',typeFilter);
    if(rarity==='advanced')return getItemsOfRarity('intermediate',typeFilter);
    if(rarity==='intermediate')return getItemsOfRarity('beginner',typeFilter);
    return[];
  }
  return filtered;
}
function getSellValue(item){
  if(item.sellOverride!==null&&item.sellOverride!==undefined)return item.sellOverride;
  const base={beginner:1,intermediate:2,advanced:4,mastered:8};
  const tierBonus=[0,1,2,4];
  return (base[item.itemRarity]||1)+(tierBonus[item.upgradeLevel]||0);
}
function upgradeItem(item){
  if(item.upgradeLevel>=3)return false;
  item.upgradeLevel++;
  const m=UPGRADE_MULTS[item.upgradeLevel];
  if(item.baseMaxHp>0)item.maxHp=Math.round(item.baseMaxHp*m);
  // actMs stays at baseActMs — no speed change on upgrade
  item.actMs=item.baseActMs;
  item.effectAmt=Math.round((item.baseEffect||0)*m);
  item.hp=item.maxHp;
  return true;
}

// ============================================================
// HELPERS
// ============================================================
function opp(s){return s==='player'?'enemy':'player';}
function getBoard(s){return s==='player'?board:enemyBoard;}
function allSlots(s){return[...getBoard(s).front,...getBoard(s).back];}
function aliveItems(s){return allSlots(s).filter(i=>i&&!i.broken);}
function potMult(){
  // Check active skills
  if(activeSkills.find(s=>s.id==='potential'))return 1.25;
  if(activeSkills.find(s=>s.id==='alpha'))return 1.3;
  return 1.0;
}
function maxActiveSlots(){if(G.day<=2)return 2;if(G.day<=4)return 3;if(G.day<=6)return 4;return 5;}
function targetable(i){return i&&!i.broken&&i.maxHp>0;}

// ============================================================
// DAMAGE / HEAL / SHIELD
// ============================================================
function checkAndBreak(item,side){
  if(item.hp<=0&&!item.broken){
    if(side==='player'&&battleState.ironHideActive){
      item.hp=1;
      return;
    }
    if(side==='player'&&activeSkills.some(s=>s.id==='unbreakable')&&!battleState.unbreakableUsed[item.id]){
      item.hp=1;
      battleState.unbreakableUsed[item.id]=true;
      log('s','Unbreakable! '+item.name+' survives!');
      return;
    }
    // Fire ITEM_BROKEN before marking broken — handlers fire while item still exists
    fireEvent({type:'ITEM_BROKEN',item:item,side:side,value:0,source:null});
    item.broken=true;
    log('b',item.name+' BROKEN!');
  }
}
function applyDmgTo(target,dmg,src,side){
  // Iron hide — player items can't break in first 10s
  if(side==='player'&&battleState.ironHideActive){
    // still take damage, just won't break
  }
  // Unbreakable — each item gets one free break
  const isPlayer=side==='player';
  let r=dmg;
  if(target.shield>0){const a=Math.min(target.shield,r);target.shield-=a;r-=a;if(a>0)log('s',src+'→'+target.name+' plating -'+a);}
  if(r>0){
    target.hp=Math.max(0,target.hp-r);
    log('d',src+'→'+target.name+' -'+r+' ('+target.hp+'/'+target.maxHp+')');
    flashCard(target.id,side,'d');
    fireEvent({type:'DAMAGE_DEALT',item:target,side:side,value:r,source:null});
    fireEvent({type:'DAMAGE_RECEIVED',item:target,side:side,value:r,source:null});
    if(target.hp<=0){
      checkAndBreak(target,side);
    }
  }
}
function dealDmg(side,base,src){
  // side = target side. side==='enemy' means player is attacking → apply player mods
  const attackerMods=side==='player'?null:getSkillMods();
  let dmg=Math.round(base);
  if(attackerMods){dmg=Math.round(dmg*attackerMods.globalMult+attackerMods.dmgBonus+battleState.momentumBonus);battleState.momentumBonus=0;}
  const b=getBoard(side);const fh=b.front.some(targetable);const pool=fh?b.front:b.back;
  let t=null;for(let i=0;i<pool.length;i++){if(targetable(pool[i])){t=pool[i];break;}}
  if(!t)return;applyDmgTo(t,dmg,src,side);
}
function dealDmgRandom(side,base,src){
  const attackerMods=side==='player'?null:getSkillMods();
  let dmg=Math.round(base);
  if(attackerMods){dmg=Math.round(dmg*attackerMods.globalMult+attackerMods.dmgBonus+battleState.momentumBonus);battleState.momentumBonus=0;}
  const b=getBoard(side);const ft=b.front.filter(targetable);const pool=ft.length>0?ft:b.back.filter(targetable);
  if(!pool.length)return;const t=pool[Math.floor(Math.random()*pool.length)];applyDmgTo(t,dmg,src,side);
}
function healItem(side,amount,src){
  const alive=aliveItems(side).filter(i=>i.maxHp>0);if(!alive.length)return;
  const t=alive.reduce((a,b)=>(a.hp/a.maxHp)<(b.hp/b.maxHp)?a:b);
  const actual=Math.min(t.maxHp-t.hp,Math.round(amount*(side==='player'?potMult():1)));
  t.hp+=actual;log('h',src+' heals '+t.name+' +'+actual);flashCard(t.id,side,'h');
  fireEvent({type:'ITEM_HEALED',item:t,side:side,value:actual,source:null});
}
function healAll(side,amount,src){
  const mult=side==='player'?potMult():1;
  aliveItems(side).filter(i=>i.maxHp>0).forEach(item=>{const actual=Math.min(item.maxHp-item.hp,Math.round(amount*mult));item.hp+=actual;});
  log('h',src+' heals all +'+amount);
  fireEvent({type:'ITEM_HEALED',item:null,side:side,value:amount,source:null});
}
function applyShield(side,amount,src){
  const alive=aliveItems(side).filter(i=>i.maxHp>0);if(!alive.length)return;
  const t=alive[Math.floor(Math.random()*alive.length)];
  const mods=side==='player'?getSkillMods():{globalMult:1,platingMult:1};
  const actual=Math.round(amount*mods.globalMult*mods.platingMult);
  t.shield=(t.shield||0)+actual;t.maxShield=Math.max(t.maxShield||0,t.shield);
  log('s',src+' plates '+t.name+' +'+actual);
  fireEvent({type:'ITEM_SHIELDED',item:t,side:side,value:actual,source:null});
}
function dealDmgTwoRandom(side,base,src){
  const attackerMods=side==='player'?null:getSkillMods();
  let dmg=Math.round(base);
  if(attackerMods){dmg=Math.round(dmg*attackerMods.globalMult+attackerMods.dmgBonus+battleState.momentumBonus);battleState.momentumBonus=0;}
  const oSide=opp(side);
  for(let i=0;i<2;i++){
    const targets=aliveItems(oSide).filter(t=>t.maxHp>0);
    if(!targets.length)break;
    const t=targets[Math.floor(Math.random()*targets.length)];
    applyDmgTo(t,dmg,src,oSide);
  }
}
function dealDmgBackRow(side,base,src){
  const attackerMods=side==='player'?null:getSkillMods();
  let dmg=Math.round(base);
  if(attackerMods){dmg=Math.round(dmg*attackerMods.globalMult+attackerMods.dmgBonus+battleState.momentumBonus);battleState.momentumBonus=0;}
  const oSide=opp(side);
  const b=oSide==='player'?board:enemyBoard;
  const back=b.back.filter(i=>i&&!i.broken&&i.maxHp>0);
  if(!back.length){dealDmgRandom(side,base,src);return;}
  const t=back[Math.floor(Math.random()*back.length)];
  applyDmgTo(t,dmg,src,oSide);
}
function dealDmgWithStatus(side,base,src,statusType,statusVal){
  const attackerMods=side==='player'?null:getSkillMods();
  let dmg=Math.round(base);
  if(attackerMods){dmg=Math.round(dmg*attackerMods.globalMult+attackerMods.dmgBonus+battleState.momentumBonus);battleState.momentumBonus=0;}
  const oSide=opp(side);
  const targets=aliveItems(oSide).filter(t=>t.maxHp>0);
  if(!targets.length)return;
  const t=targets[Math.floor(Math.random()*targets.length)];
  if(dmg>0)applyDmgTo(t,dmg,src,oSide);
  if(statusType==='burn')applyBurn(t,statusVal,src);
  else if(statusType==='poison')applyPoison(t,statusVal,src);
  else if(statusType==='slow')applySlow(t,statusVal,src);
}
function applyShieldAll(side,amount,src){
  const mods=side==='player'?getSkillMods():{globalMult:1,platingMult:1};
  const actual=Math.round(amount*mods.globalMult*mods.platingMult);
  aliveItems(side).filter(i=>i.maxHp>0).forEach(i=>{i.shield=(i.shield||0)+actual;i.maxShield=Math.max(i.maxShield||0,i.shield);});
  log('s',src+' plates ALL +'+actual);
}
// Status effect applicators
function applyHaste(item,durationMs,src){
  if(!item||item.broken)return;
  item.hasteMs=Math.max(item.hasteMs,durationMs);
  log('a','⚡ '+src+' HASTE '+item.name+' '+(durationMs/1000).toFixed(1)+'s');

}
function applySlow(item,durationMs,src){
  if(!item||item.broken)return;
  item.slowMs=Math.max(item.slowMs,durationMs);
  log('s','💧 '+src+' SLOW '+item.name+' '+(durationMs/1000).toFixed(1)+'s');
  fireEvent({type:'SLOW_APPLIED',item:item,side:item._side||null,value:durationMs,source:null});
}
function applyBurn(item,stacks,src){

  log('d','🔥 '+src+' BURN '+item.name+' +'+stacks);

}
function applyPoison(item,stacks,src){
  if(!item||item.broken)return;
  item.poisonStack=(item.poisonStack||0)+stacks;
  log('d','☠️ '+src+' POISON '+item.name+' +'+stacks);

// Pick a random living enemy item to target for debuffs
function randomEnemyItem(side){
  const alive=aliveItems(side).filter(i=>i.maxHp>0);
  if(!alive.length)return null;
  return alive[Math.floor(Math.random()*alive.length)];

function updateStatusDisplay(item,elemPrefix){
  const stsEl=document.getElementById(elemPrefix+'sts-'+item.id);
  if(!stsEl)return;
  let pills='';
  if(item.hasteMs>0)pills+='<span class="st-pill st-haste">⚡'+(item.hasteMs/1000).toFixed(1)+'s</span>';
  if(item.slowMs>0)pills+='<span class="st-pill st-slow">💧'+(item.slowMs/1000).toFixed(1)+'s</span>';
  if(item.burnStack>0)pills+='<span class="st-pill st-burn">🔥'+item.burnStack+'</span>';
  if(item.poisonStack>0)pills+='<span class="st-pill st-poison">☠️'+item.poisonStack+'</span>';
  stsEl.innerHTML=pills;
  // Card border
  const card=stsEl.closest('.ic,.ecard');
  if(card){card.classList.toggle('burning',item.burnStack>0);card.classList.toggle('poisoned',item.poisonStack>0);}
  // Activation bar color
  const actEl=document.getElementById((elemPrefix==='e'?'e':'')+'act-'+item.id);
  if(actEl){
    if(item.hasteMs>0&&item.slowMs===0)actEl.style.background='linear-gradient(90deg,#b08000,#f0c040)';
    else if(item.slowMs>0&&item.hasteMs===0)actEl.style.background='linear-gradient(90deg,#2060c0,#60b8ff)';
    else actEl.style.background='';
  }
}
const flashTimers={};
function flashCard(itemId,side,type){
  document.querySelectorAll('[data-item-id="'+itemId+'"]').forEach(el=>{
    const cls=type==='d'?'card-df':'card-hf';const f=el.querySelector('.'+cls);if(!f)return;
    f.style.opacity='1';clearTimeout(flashTimers[itemId]);flashTimers[itemId]=setTimeout(()=>{f.style.opacity='0';},140);
  });
}

// ============================================================
// RENDER — full board rebuild (used outside battle)
// ============================================================
function renderBoard(){renderRow('frontSlots',board.front,'front');renderRow('backSlots',board.back,'back');}
function renderRow(cid,slots,rowType){
  const el=document.getElementById(cid);el.innerHTML='';
  const max=maxActiveSlots();
  slots.forEach((item,idx)=>{
    const card=document.createElement('div');card.className='ic';
    card.dataset.row=rowType;card.dataset.idx=idx;
    if(idx>=max){card.classList.add('locked');card.innerHTML='<div class="clock">🔒</div>';}
    else if(!item){card.classList.add('empty-s');card.innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--border);font-family:Cinzel,serif;font-size:7px;letter-spacing:.1em">EMPTY</div>';card.onclick=()=>{if(G.battleRunning)return;if(G.selectedSlot!==null){handleSlotClick(rowType,idx,null);hideItemInfo();}};}
    else if(item.broken){card.classList.add('broken-c');card.dataset.itemId=item.id;card.innerHTML='<div class="cbo">✕</div><div class="ci" style="opacity:.25"><div class="cicon">'+item.icon+'</div><div class="cname">'+item.name+'</div></div><div class="card-df"></div>';card.onclick=()=>handleSlotClick(rowType,idx,item);}
    else{
      if(G.selectedSlot&&G.selectedSlot.row===rowType&&G.selectedSlot.idx===idx)card.classList.add('sel');
      card.dataset.itemId=item.id;
      const hp=item.maxHp>0?(item.hp/item.maxHp*100):100;
      const sh=(item.maxShield>0&&item.shield>0)?(item.shield/item.maxShield*100):0;
      const act=item.actPct||0;
      const hc=hp>60?'#50e080':hp>30?'#e0a030':'#e84040';
      const upgLabel=item.upgradeLevel>0?'<span style="font-size:6px;color:var(--gold)"> ['+UPGRADE_NAMES[item.upgradeLevel]+']</span>':'';
      card.innerHTML='<div class="card-df"></div><div class="card-hf"></div><div class="ci"><div class="cicon">'+item.icon+'</div><div class="cname">'+item.name+upgLabel+'</div><div class="ctag">'+item.tag+'</div><div class="cstat" id="cst-'+item.id+'">'+(item.maxHp>0?item.hp+'/'+item.maxHp:item.uses!==null?item.uses+'/'+item.maxUses+' use':'food')+'</div><div class="cshield" id="csh-'+item.id+'" style="'+(item.shield>0?'':'display:none')+'">🛡'+item.shield+'</div><div class="sts" id="sts-'+item.id+'"></div></div><div class="cbars"><div class="bt"><div class="bf sbf" id="sh-'+item.id+'" style="width:'+sh+'%"></div></div>'+(item.maxHp>0?'<div class="bt"><div class="bf hbf" id="hp-'+item.id+'" style="width:'+hp+'%;background:'+hc+'"></div></div>':'')+'<div class="bt"><div class="bf abf" id="act-'+item.id+'" style="width:'+act+'%"></div></div></div>';
      card.onclick=(e)=>{
        e.stopPropagation();
        if(G.battleRunning)return;

        // If a different slot is already selected — complete the swap
        if(G.selectedSlot!==null&&
          !(G.selectedSlot.row===rowType&&G.selectedSlot.idx===idx)){
          handleSlotClick(rowType,idx,item);
          showItemInfo(item);
          return;
        }

        // If this item is already selected — deselect and close panel
        if(G.selectedSlot!==null&&
          G.selectedSlot.row===rowType&&G.selectedSlot.idx===idx){
          hideItemInfo();
          return;
        }

        // Fresh click — select this item, open panel, highlight card
        G.selectedSlot={row:rowType,idx:idx};
        showItemInfo(item);
        renderBoard();
      };
      card.oncontextmenu=(e)=>{
        e.preventDefault();
        if(G.battleRunning)return;
        showSellConfirm(rowType,idx,item);
      };
    }
    el.appendChild(card);
  });
}

function updateBattleBars(){
  let needRebuild=false;
  [...board.front,...board.back].forEach(item=>{
    if(!item)return;
    const actEl=document.getElementById('act-'+item.id);
    const hpEl=document.getElementById('hp-'+item.id);
    const shEl=document.getElementById('sh-'+item.id);
    const cstEl=document.getElementById('cst-'+item.id);
    const cshEl=document.getElementById('csh-'+item.id);
    if(actEl)actEl.style.width=(item.actPct||0)+'%';
    if(hpEl&&item.maxHp>0){const p=item.hp/item.maxHp*100;hpEl.style.width=p+'%';hpEl.style.background=p>60?'#50e080':p>30?'#e0a030':'#e84040';}
    if(shEl){const sp=item.maxShield>0?item.shield/item.maxShield*100:0;shEl.style.width=sp+'%';}
    if(cstEl&&item.maxHp>0)cstEl.textContent=item.hp+'/'+item.maxHp;
    if(cshEl){if(item.shield>0){cshEl.style.display='';cshEl.textContent='🛡'+item.shield;}else{cshEl.style.display='none';}}
    updateStatusDisplay(item,'');
    if(item.broken){const cards=document.querySelectorAll('[data-item-id="'+item.id+'"]');cards.forEach(c=>{if(!c.classList.contains('broken-c'))needRebuild=true;});}
  });
  if(needRebuild)renderBoard();
  if(currentInfoItem)updateItemInfoStatus(currentInfoItem);
}

function handleSlotClick(row,idx,item){
  if(G.battleRunning)return;
  if(G.selectedSlot===null){if(!item)return;G.selectedSlot={row,idx};showNotif(item.name+' selected — click slot to swap');}
  else{
    const from=G.selectedSlot;
    if(from.row===row&&from.idx===idx){G.selectedSlot=null;}
    else{
      const fa=from.row==='front'?board.front:board.back;const ta=row==='front'?board.front:board.back;
      if(idx>=maxActiveSlots()){G.selectedSlot=null;renderBoard();return;}
      const tmp=fa[from.idx];fa[from.idx]=ta[idx];ta[idx]=tmp;G.selectedSlot=null;showNotif('Swapped!');
    }
  }
  renderBoard();
}

function renderTrack(){
  const track=document.getElementById('dayTrack');track.innerHTML='';
  const nodes=getDayNodes();
  nodes.forEach((node,i)=>{
    const state=i<G.dayStep?'done':i===G.dayStep?'current':'locked';

    tn.innerHTML='<div class="node-stamp">'+node.icon+'</div><div class="node-label">'+node.label+'</div>';

function activateCurrentNode(){
  const node=getDayNodes()[G.dayStep];
  if(node.id==='mom')showEncounterShop(0);
  else if(node.id==='shop1')showEncounterShop(1);
  else if(node.id==='wild')showEncounterWildPick();
  else if(node.id==='shop2')showEncounterShop(2);

}

function showEncounterShop(poolIdx){
  const isMom=poolIdx===0&&!G.rivalDefeated;
  const isLocalStall=poolIdx===2&&G.day===1;
  const isRoadsideStall=poolIdx===2&&G.day>1;
  const isMarket=poolIdx===1;

    }else{
      setEncTitle('MOM CHECKS IN');
      const conKeys=Object.keys(MOM_CONSOLATION_ITEMS);
      const shuffled=[...conKeys].sort(()=>Math.random()-.5).slice(0,3);
      const dialogue='<div class="dialogue"><div class="dlg-name">MOM</div>"I told you, you weren\'t ready. Here — wipe the dust off."</div>';
      const cards=shuffled.map(key=>{
        const t=MOM_CONSOLATION_ITEMS[key]();shopItemCache[key]=t;
        return '<div class="dc" onclick="buyMomItem(\''+key+'\',true,true)"><div class="di">'+t.icon+'</div><div class="dn">'+t.name+'</div><div class="dd">'+t.desc+'</div>'+(t.flavorText?'<div style="font-size:7px;color:var(--dim);font-style:italic;margin-top:2px">'+t.flavorText+'</div>':'')+'<div class="dp">✦ FREE</div><div class="dc-info" onclick="event.stopPropagation();showItemInfo(shopItemCache[\''+key+'\'])">ℹ</div></div>';
      }).join('');
      setEncBody(dialogue+'<div class="draft-row">'+cards+'</div>');
    }
    return;
  }

  if(isLocalStall){
    setEncTitle('LOCAL STALL');
    const dialogue='<div class="dialogue"><div class="dlg-name">SHOPKEEPER</div>"So kid, you\'re going off on an adventure? I know exactly what you need."</div>';
    const boardItems=[...board.front,...board.back].filter(Boolean);
    const ownedTypes=new Set(boardItems.map(i=>i.itemType));
    const typeFilter=[];
    if(!ownedTypes.has('weapon'))typeFilter.push('weapon');
    if(!ownedTypes.has('armor'))typeFilter.push('armor');
    // provision intentionally excluded from Local Stall day 1
    if(typeFilter.length===0)typeFilter.push('weapon');
    const ownedKeys=new Set(boardItems.map(i=>i.itemKey));
    const pool=getItemsOfRarity('beginner',typeFilter).filter(k=>!ownedKeys.has(k));
    const shuffled=[...pool].sort(()=>Math.random()-.5).slice(0,3);
    const cards=shuffled.map(key=>{
      const f=getItemFactory(key);if(!f)return'';
      const t=f();shopItemCache[key]=t;const can=G.gold>=t.cost;
      return '<div class="dc '+((!can&&t.cost>0)?'cant':'')+'" onclick="buyItem(\''+key+'\',false)"><div class="di">'+t.icon+'</div><div class="dn">'+t.name+'</div><div class="dd">'+t.desc+'</div><div class="dp">🪙 '+t.cost+'</div><div class="dc-info" onclick="event.stopPropagation();showItemInfo(shopItemCache[\''+key+'\'])">ℹ</div></div>';
    }).join('');

    return;
  }

  if(isRoadsideStall){
    setEncTitle('ROADSIDE STALL');
    const slots=generateShopSlots(G.day);
    const hasProvision=slots.some(k=>{const f=getItemFactory(k);return f&&f().itemType==='provision';});
    if(!hasProvision&&slots.length>0){
      const provPool=getItemsOfRarity(rollRarity(G.day),['provision']).filter(k=>!slots.includes(k));
      if(provPool.length)slots[slots.length-1]=provPool[Math.floor(Math.random()*provPool.length)];
    }
    const cards=slots.map(key=>{
      const f=getItemFactory(key);if(!f)return'';
      const t=f();shopItemCache[key]=t;const can=G.gold>=t.cost;
      return '<div class="dc '+((!can&&t.cost>0)?'cant':'')+'" onclick="buyItem(\''+key+'\',false)"><div class="di">'+t.icon+'</div><div class="dn">'+t.name+'</div><div class="dd">'+t.desc+'</div><div class="dp">🪙 '+t.cost+'</div><div class="dc-info" onclick="event.stopPropagation();showItemInfo(shopItemCache[\''+key+'\'])">ℹ</div></div>';
    }).join('');
    setEncBody('<div class="draft-row">'+cards+'</div><div class="btn-row"><button class="btn btn-d" onclick="skipShop()">✕ LEAVE</button></div>');
    return;
  }

  if(isMarket){
    setEncTitle('TOWN MARKET');
    const slots=generateShopSlots(G.day);
    const cards=slots.map(key=>{
      const f=getItemFactory(key);if(!f)return'';
      const t=f();shopItemCache[key]=t;const can=G.gold>=t.cost;
      return '<div class="dc '+((!can&&t.cost>0)?'cant':'')+'" onclick="buyItem(\''+key+'\',false)"><div class="di">'+t.icon+'</div><div class="dn">'+t.name+'</div><div class="dd">'+t.desc+'</div><div class="dp">🪙 '+t.cost+'</div><div class="dc-info" onclick="event.stopPropagation();showItemInfo(shopItemCache[\''+key+'\'])">ℹ</div></div>';
    }).join('');
    setEncBody('<div class="draft-row">'+cards+'</div><div class="btn-row"><button class="btn btn-d" onclick="skipShop()">✕ LEAVE</button></div>');

  }

function buyMomItem(key,free,isConsolation){
  const pool=isConsolation?MOM_CONSOLATION_ITEMS:MOM_ITEMS;
  const f=pool[key];if(!f)return;
  const t=f();
  if(!isConsolation)G.momGiftGiven=true;
  const item={...t,hp:t.maxHp,shield:0,maxShield:0,actElapsed:0,actPct:0,
    broken:false,uses:t.maxUses,hasteMs:0,slowMs:0,
    burnStack:0,burnTickMs:0,poisonStack:0,poisonTickMs:0,
    _side:'player'};
  const max=maxActiveSlots();let placed=false;
  for(let i=0;i<max&&!placed;i++){if(!board.front[i]){board.front[i]=item;placed=true;}}
  if(!placed)for(let i=0;i<max&&!placed;i++){if(!board.back[i]){board.back[i]=item;placed=true;}}
  if(!placed){showNotif('Board full! Sell something first.');return;}
  showNotif(item.name+' received!');
  updateUI();
  renderBoard();
  skipShop();
}
function buyItem(key,free){
  const f=getItemFactory(key);if(!f)return;
  const t=f();if(!free&&G.gold<t.cost)return;if(!free)G.gold-=t.cost;
  const allSlots=[...board.front,...board.back];
  const existing=allSlots.find(i=>i&&i.itemKey===key&&i.upgradeLevel<3);
  if(existing){
    upgradeItem(existing);
    showNotif(existing.name+' upgraded to '+UPGRADE_NAMES[existing.upgradeLevel]+'!');
    updateUI();renderBoard();skipShop();
    return;
  }
  const item={...t,baseMaxHp:t.maxHp,baseActMs:t.actMs,upgradeLevel:0,hp:t.maxHp,shield:0,maxShield:0,actElapsed:0,actPct:0,broken:false,uses:t.maxUses,
    hasteMs:0,slowMs:0,burnStack:0,burnTickMs:0,poisonStack:0,poisonTickMs:0,_side:'player'};
  const max=maxActiveSlots();let placed=false;
  for(let i=0;i<max&&!placed;i++){if(!board.front[i]){board.front[i]=item;placed=true;}}
  if(!placed)for(let i=0;i<max&&!placed;i++){if(!board.back[i]){board.back[i]=item;placed=true;}}
  if(!placed){showNotif('Board full! Swap items first.');return;}
  showNotif(item.name+' added!');updateUI();renderBoard();skipShop();
}
function skipShop(){G.dayStep++;updateUI();renderTrack();activateCurrentNode();}
function generateShopSlots(day,typeFilter,excludeKeys){
  excludeKeys=excludeKeys||[];
  const slots=[];
  for(let i=0;i<3;i++){
    const rarity=rollRarity(day);
    const pool=getItemsOfRarity(rarity,typeFilter).filter(k=>!excludeKeys.includes(k)&&!slots.includes(k));
    if(!pool.length)continue;
    slots.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  return slots;
}
function showSellConfirm(rowType,idx,item){

  const cardEl=document.querySelector('.ic[data-row="'+rowType+'"][data-idx="'+idx+'"]');

}

let firingEvent=false;

function fireEvent(event){
  if(firingEvent)return;
  firingEvent=true;
  // Notify skill handlers
  activeSkills.forEach(sk=>{
    if(sk._battleHandler){
      try{sk._battleHandler(event);}
      catch(e){console.error('skill handler error',e);}
    }
  });
  // Notify item handlers
  [...board.front,...board.back,...enemyBoard.front,...enemyBoard.back].forEach(item=>{
    if(item&&!item.broken&&item.handleEvent){
      try{item.handleEvent(event);}
      catch(e){console.error('handleEvent error on '+item.name,e);}
    }
  });
  firingEvent=false;
}

function getNeighbors(item){
  const boards=[{b:board,side:'player'},{b:enemyBoard,side:'enemy'}];
  for(const {b,side} of boards){
    for(const row of ['front','back']){
      const idx=b[row].indexOf(item);
      if(idx===-1)continue;
      const otherRow=row==='front'?'back':'front';
      return{
        side,row,index:idx,
        left:b[row][idx-1]||null,
        right:b[row][idx+1]||null,
        behind:b[otherRow][idx]||null,
        inFront:b[otherRow][idx]||null,
      };
    }
  }
  return null;
}

let battleInterval=null,fatigueInterval=null,battleMs=0,currentBattleType='rival';
function runBattle(type){
  if(G.battleRunning)return;G.battleRunning=true;currentBattleType=type;
  const sb=document.getElementById('startBattleBtn');if(sb)sb.disabled=true;
  const speedBtn=document.getElementById('speedBtn');if(speedBtn)speedBtn.disabled=true;
  resetItemBattleState(board);resetItemBattleState(enemyBoard);
  registerSkillHandlers();
  fireEvent({type:'BATTLE_START',item:null,side:null,value:null,source:null});
  clearLog();hideItemInfo();log('x','Battle starts!');battleMs=0;
  const TICK=100,FATIGUE_START=30000;
  battleInterval=setInterval(()=>{
    const step=TICK*battleSpeed;
    battleMs+=step;const rem=Math.max(0,FATIGUE_START-battleMs);
    const tt=document.getElementById('timerTxt');if(tt)tt.textContent=(rem/1000).toFixed(1)+'s';
    tickSide(board,'player',step);tickSide(enemyBoard,'enemy',step);
    updateBattleBars();updateEnemyBars();
    const pKO=checkKO('player'),eKO=checkKO('enemy');
    if(pKO&&eKO){endBattle('win');return;}
    if(pKO){endBattle('lose');return;}if(eKO){endBattle('win');return;}
    if(battleMs>=FATIGUE_START&&!fatigueInterval)startFatigue();
  },TICK);
}
function resetItemBattleState(b){
  const mods=getSkillMods();
  const isPlayer=b===board;
  [...b.front,...b.back].forEach(item=>{
    if(!item)return;
    if(isPlayer&&item.baseMaxHp>0){
      item.maxHp=Math.round(item.baseMaxHp*(UPGRADE_MULTS[item.upgradeLevel||0]||1))+mods.maxHpBonus;
    }
    item.actMs=item.baseActMs||item.actMs; // always reset to base speed
    item.hp=item.maxHp;item.shield=0;item.maxShield=0;item.actElapsed=0;item.actPct=0;item.broken=false;item.uses=item.maxUses;item._lastStandApplied=false;
    item.hasteMs=0;item.slowMs=0;item.burnStack=0;item.burnTickMs=0;item.poisonStack=0;item.poisonTickMs=0;
    item._side=b===board?'player':'enemy';
    if(item._firstActivation!==undefined)item._firstActivation=true;
  });
  firingEvent=false;
  if(isPlayer)initBattleState();
}
function tickSide(b,side,tickMs){
  const mods=side==='player'?getSkillMods():null;
  const isBack=i=>b.back.includes(i);
  if(side==='player'&&battleState.ironHideActive&&battleMs>=10000){
    battleState.ironHideActive=false;battleState.ironHideExpired=true;
  }
  [...b.front,...b.back].forEach(item=>{
    if(!item||item.broken)return;
    // Count down haste/slow timers
    if(item.hasteMs>0)item.hasteMs=Math.max(0,item.hasteMs-tickMs);
    if(item.slowMs>0)item.slowMs=Math.max(0,item.slowMs-tickMs);
    // Status speed modifier: haste=0.5x threshold (faster), slow=2.0x (slower), both=1.0x
    let statusSpeedMult=1.0;
    if(item.hasteMs>0&&item.slowMs===0)statusSpeedMult=0.5;
    else if(item.slowMs>0&&item.hasteMs===0)statusSpeedMult=2.0;
    // Skill speed modifiers
    let speedMult=statusSpeedMult;
    if(mods){speedMult*=mods.speedMult;if(isBack(item))speedMult*=mods.backSpeedMult;}
    const effectiveActMs=(item.baseActMs||item.actMs)*speedMult;
    item.actElapsed+=tickMs;item.actPct=Math.min(100,item.actElapsed/effectiveActMs*100);
    if(item.actElapsed>=effectiveActMs){
      item.actElapsed=0;item.actPct=0;
      log('a',item.icon+' '+item.name+' activates!');
      item.effectFn(side,item.effectAmt||item.baseEffect||0,item);
      fireEvent({type:'ITEM_ACTIVATED',item:item,side:side,value:item.effectAmt||item.baseEffect||0,source:null});
      if(item.uses!==null){item.uses--;if(item.uses<=0){item.broken=true;log('b',item.name+' consumed!');}}
    }
    // Burn tick — every 500ms. shield*2 reduces damage first, remainder to HP
    if(item.burnStack>0){
      item.burnTickMs+=tickMs;
      while(item.burnTickMs>=500&&item.burnStack>0){
        item.burnTickMs-=500;
        const shieldReduction=(item.shield||0)*2;
        const hpDmg=Math.max(0,item.burnStack-shieldReduction);
        if(hpDmg>0){item.hp=Math.max(0,item.hp-hpDmg);log('d','🔥 Burn '+item.name+' -'+hpDmg+' HP');}
        else{log('d','🔥 Burn '+item.name+' absorbed by plating');}
        item.burnStack--;
        if(item.hp<=0&&!item.broken){checkAndBreak(item,side);}
      }
    }
    // Poison tick — every 1000ms. bypasses shield, straight to HP
    if(item.poisonStack>0){
      item.poisonTickMs+=tickMs;
      while(item.poisonTickMs>=1000&&item.poisonStack>0){
        item.poisonTickMs-=1000;
        const pdmg=item.poisonStack;
        item.hp=Math.max(0,item.hp-pdmg);
        log('d','☠️ Poison '+item.name+' -'+pdmg+' HP');
        item.poisonStack--;
        if(item.hp<=0&&!item.broken){checkAndBreak(item,side);}
      }
    }
  });
}
function startFatigue(){
  fireEvent({type:'FATIGUE_START',item:null,side:null,value:null,source:null});
  let fMs=0;const fw=document.getElementById('fatigueWrap');if(fw)fw.style.display='block';
  fatigueInterval=setInterval(()=>{
    fMs+=500;const baseDmg=Math.min(40,2+Math.floor(fMs/2000)*3);
    const mods=getSkillMods();
    const playerDmg=Math.round(baseDmg*mods.fatigueMult);
    const dmg=baseDmg;
    const tt=document.getElementById('timerTxt');if(tt)tt.textContent='FATIGUE +'+playerDmg+'/'+(baseDmg);
    const ff=document.getElementById('fatigueFill');if(ff)ff.style.width=Math.min(100,fMs/12000*100)+'%';
    [...board.front,...board.back].forEach(item=>{if(item&&item.maxHp>0&&!item.broken)applyDmgTo(item,playerDmg,'Fatigue','player');});
    [...enemyBoard.front,...enemyBoard.back].forEach(item=>{if(item&&item.maxHp>0&&!item.broken)applyDmgTo(item,dmg,'Fatigue','enemy');});
    updateBattleBars();updateEnemyBars();
    const pKO=checkKO('player'),eKO=checkKO('enemy');
    if(pKO&&eKO)endBattle('win');else if(pKO)endBattle('lose');else if(eKO)endBattle('win');
  },500);
}
function stopBattle(){if(battleInterval){clearInterval(battleInterval);battleInterval=null;}if(fatigueInterval){clearInterval(fatigueInterval);fatigueInterval=null;}G.battleRunning=false;battleSpeed=1;firingEvent=false;}
function checkKO(side){return aliveItems(side).filter(i=>i.maxHp>0).length===0;}

// BATTLE END
// ============================================================
function endBattle(result){
  stopBattle();G.lastResult=result;
  let title,sub,btnText='CONTINUE →';
  if(result==='win'){
    if(currentBattleType==='wild'){
      const roll=Math.random();const reward=roll<0.25?4:roll<0.75?5:6;
      const butcher=reward===4?'"You really beat the meat on this one." Coins in your hand, pity in his eyes.':reward===5?'"Decent enough." Coins on the counter, no further conversation.':'"Near perfect condition. They grade these now, you know. PSA 10, this one." You walk out richer than expected.';
      G.gold+=reward;title='MONSTER DEFEATED';
      sub='You haul the '+WILD_MONSTERS[G.wildChoice||0].name+' to the butcher.<br><br><em>'+butcher+'</em><br><br>Earned 🪙'+reward+' gold.';
    }else{
      G.wins++;G.rivalDefeated=true;title='VICTORY';
      if(G.wins>=10){sub='10 wins. The run is complete.';btnText='PLAY AGAIN';}
      else{sub='Win '+G.wins+' of 10.';}
    }
  }else{
    if(currentBattleType==='wild'){
      title='DEFEATED';
      if(G.day===1){
        sub='You are literally in the tutorial. We\'re going to pretend that didn\'t happen.';btnText='TRY AGAIN →';
      }else{
        sub='Nothing for the butcher today.';btnText='MOVE ON →';
      }
    }else{
      const hl=G.day;G.honor=Math.max(0,G.honor-hl);title='DEFEATED';
      sub='Lost '+hl+' honor. '+G.honor+' remaining.'+(G.honor<=0?' SECOND WIND!':'');
      btnText=G.honor<=0?'SECOND WIND...':'TRY AGAIN →';
    }
  }
  updateUI();setEncTitle(title);
  setEncBody('<div class="result-enc"><div class="re-title '+(result==='win'?'re-win':'re-lose')+'">'+title+'</div><div class="re-sub">'+sub+'</div><div class="btn-row"><button class="btn btn-p" onclick="continueAfterResult()">'+btnText+'</button></div></div>');
}

function continueAfterResult(){
  if(G.lastResult==='win'){
    if(currentBattleType==='wild'){
      G.dayStep++;updateUI();renderBoard();renderTrack();activateCurrentNode();
    }else{
      if(G.wins>=10){resetRun();return;}
      postTrainerWin();
    }
  }else{
    if(currentBattleType==='wild'){
      if(G.day===1){
        // Tutorial retry
        renderBoard();updateUI();renderTrack();activateCurrentNode();
      }else{
        // Day 2+ wild loss: advance past wild node, no retry, no gold
        G.dayStep++;updateUI();renderBoard();renderTrack();activateCurrentNode();
      }
    }else{
      // Trainer loss: retry
      renderBoard();updateUI();renderTrack();activateCurrentNode();
    }
  }
}

function postTrainerWin(){
  if(G.type===null){
    showTypeSelect();
  }else{
    showSkillPick();
  }
}

function selectNode(nodeId){
  G.pendingSkillNode=nodeId;

function pickSkill(nodeId,skillId){

  treeState[nodeId]=skill;
  activeSkills.push(skill);
  renderSkillTree();
  showNotif(skill.name+' learned!');

}

  tip.classList.add('show');
}
function hideTreeTip(){document.getElementById('treeTip').classList.remove('show');}
let notifTimer;
function showNotif(msg){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');clearTimeout(notifTimer);notifTimer=setTimeout(()=>el.classList.remove('show'),2400);}

// ============================================================
// RESET
// ============================================================
function resetRun(){
  stopBattle();
  G.gold=8;G.honor=20;G.wins=0;G.day=1;G.type=null;G.rivalDefeated=false;G.dayStep=0;G.selectedSlot=null;G.battleRunning=false;G.lastResult=null;G.wildChoice=null;G.pendingSkillNode=null;G.momGiftGiven=false;
  board={front:[null,null,null,null,null],back:[null,null,null,null,null]};
  enemyBoard={front:[null,null,null,null,null],back:[null,null,null,null,null]};
  TREE_NODES.forEach(n=>treeState[n.id]=null);
  activeSkills.forEach(sk=>{sk._battleHandler=null;});
  activeSkills=[];bannedTypes=[];lastOfferedTypes=[];
  // Pre-fill HEAD with Potential — Zorp starts with it
  treeState['head']=SKILLS.prestige[0];
  activeSkills=[SKILLS.prestige[0]];
  const badge=document.getElementById('typeBadge');
  badge.textContent='✦ POTENTIAL';badge.className='type-badge type-pot';badge.style.cssText='';
  updateUI();renderBoard();renderSkillTree();renderTrack();activateCurrentNode();
}

// ============================================================
// INIT
// ============================================================
treeState['head']=SKILLS.prestige[0];
activeSkills=[SKILLS.prestige[0]];
updateUI();renderBoard();renderSkillTree();renderTrack();activateCurrentNode();
document.addEventListener('click',(e)=>{
  if(!e.target.closest('.ic')&&
     !e.target.closest('.ecard')&&
     !e.target.closest('.item-info-panel')){
    hideItemInfo();
  }
});
</script>
